<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0d0d14" />
  <title>FamilyOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #0d0d14;
      --surface: #13131d;
      --surface-2: #1a1a28;
      --surface-3: #222234;
      --border: rgba(255,255,255,0.06);
      --border-hi: rgba(255,255,255,0.12);
      --text-1: #eeeef5;
      --text-2: #8888a4;
      --text-3: #55556e;
      --ran: #6366f1;
      --itai: #10b981;
      --noga: #f59e0b;
      --alon: #f43f5e;
      --rinat: #ef4444;
      --all: #7878a0;
      --nav-h: 64px;
      --header-h: 56px;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Heebo', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      direction: rtl;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── HEADER ───────────────────────────────────────── */
    .app-header {
      height: var(--header-h);
      padding-top: var(--safe-t);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-inline: 18px;
      flex-shrink: 0;
      background: rgba(13,13,20,0.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: relative;
      z-index: 20;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.8px;
      background: linear-gradient(135deg, #818cf8 0%, #c084fc 40%, #fb7185 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-status {
      width: 7px;
      height: 7px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(16,185,129,0.6);
      animation: pulse-dot 3s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.75); }
    }

    .header-meta {
      font-size: 11px;
      color: var(--text-3);
      background: var(--surface-2);
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-weight: 400;
    }

    /* ── TAB AREA ─────────────────────────────────────── */
    .tab-area {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .tab-panel {
      display: none;
      height: 100%;
      overflow-y: auto;
      padding: 16px 16px calc(16px + var(--safe-b));
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      scrollbar-width: none;
    }
    .tab-panel::-webkit-scrollbar { display: none; }

    .tab-panel.active {
      display: block;
      animation: fadeSlideIn 0.25s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── BOTTOM NAV ───────────────────────────────────── */
    .bottom-nav {
      flex-shrink: 0;
      height: calc(var(--nav-h) + var(--safe-b));
      padding-bottom: var(--safe-b);
      background: rgba(13,13,20,0.96);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-3);
      padding: 0;
      position: relative;
      transition: color 0.2s ease;
      -webkit-user-select: none;
      user-select: none;
      min-height: 44px;
      min-width: 44px;
    }

    .nav-btn.active { color: var(--text-1); }

    .nav-indicator {
      position: absolute;
      top: 0;
      left: 50%;
      width: 28px;
      height: 3px;
      background: linear-gradient(90deg, #818cf8, #c084fc);
      border-radius: 0 0 4px 4px;
      transform: translateX(-50%) scaleX(0);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    .nav-btn.active .nav-indicator { transform: translateX(-50%) scaleX(1); }

    .nav-icon {
      width: 22px;
      height: 22px;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }

    .nav-btn.active .nav-icon { transform: scale(1.12) translateY(-1px); }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .nav-badge {
      position: absolute;
      top: 5px;
      left: calc(50% + 5px);
      background: #ef4444;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      border: 2px solid var(--bg);
      line-height: 1;
      pointer-events: none;
    }

    /* ── CARD ──────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: 14px;
      border: 1px solid var(--border);
      margin-bottom: 10px;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      transition: transform 0.15s ease, border-color 0.15s ease;
      cursor: pointer;
    }

    .card:active { transform: scale(0.98); }

    .card.is-unread {
      background: var(--surface-2);
      border-color: var(--border-hi);
    }

    .card-strip {
      width: 4px;
      flex-shrink: 0;
    }

    .card-content {
      flex: 1;
      padding: 14px;
      min-width: 0;
    }

    /* ── MESSAGE CARD ─────────────────────────────────── */
    .msg-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
    }

    .msg-tags {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
      flex-wrap: wrap;
    }

    .child-tag {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }

    .tag-pin {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .unread-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .msg-time {
      font-size: 11px;
      color: var(--text-3);
      flex-shrink: 0;
      font-weight: 400;
    }

    .msg-sender {
      font-size: 12px;
      color: var(--text-2);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .msg-body {
      font-size: 14px;
      color: var(--text-1);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card.is-unread .msg-body {
      font-weight: 500;
      color: #f5f5ff;
    }

    /* ── RINAT PRIORITY SECTION ───────────────────────── */
    .rinat-zone {
      background: linear-gradient(135deg, rgba(239,68,68,0.10) 0%, rgba(239,68,68,0.03) 100%);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 14px;
      position: sticky;
      top: 0;
      z-index: 5;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 0 30px rgba(239,68,68,0.06), 0 0 0 1px rgba(239,68,68,0.08);
    }

    .rinat-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 700;
      color: #f87171;
    }

    .rinat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 0 0 rgba(239,68,68,0.6);
      animation: rinat-ping 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes rinat-ping {
      0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.6); }
      70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    }

    .rinat-zone .card {
      margin-bottom: 8px;
      background: rgba(239,68,68,0.06);
      border-color: rgba(239,68,68,0.15);
    }
    .rinat-zone .card:last-child { margin-bottom: 0; }

    /* ── SECTION DIVIDER ──────────────────────────────── */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .section-divider:first-child { margin-top: 4px; }

    .section-divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── EVENT / ACADEMIC CARDS ────────────────────────── */
    .item-title {
      font-size: 14.5px;
      font-weight: 500;
      color: var(--text-1);
      margin-bottom: 7px;
      line-height: 1.45;
    }

    .item-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .child-tag-sm {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .meta-date {
      font-size: 12px;
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .meta-date svg {
      width: 13px;
      height: 13px;
      opacity: 0.6;
    }

    .meta-group {
      font-size: 11px;
      color: var(--text-3);
      background: var(--surface-3);
      padding: 2px 9px;
      border-radius: 20px;
    }

    .type-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-2);
      background: var(--surface-3);
      border: 1px solid var(--border);
      padding: 2px 9px;
      border-radius: 20px;
    }

    /* ── EMPTY STATE ───────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 72px 24px;
      text-align: center;
      gap: 8px;
    }

    .empty-icon {
      width: 56px;
      height: 56px;
      color: var(--text-3);
      margin-bottom: 8px;
      opacity: 0.4;
    }

    .empty-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-2);
    }

    .empty-sub {
      font-size: 13px;
      color: var(--text-3);
      line-height: 1.6;
    }

    /* ── LOADING ───────────────────────────────────────── */
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 72px 24px;
      color: var(--text-3);
      font-size: 14px;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: #818cf8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOCUS/A11Y ────────────────────────────────────── */
    :focus-visible {
      outline: 2px solid #818cf8;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
<div id="app">

  <header class="app-header">
    <div class="header-brand">
      <span class="header-logo">FamilyOS</span>
      <div class="header-status" aria-hidden="true"></div>
    </div>
    <div id="header-meta" class="header-meta">...</div>
  </header>

  <div class="tab-area">
    <section id="tab-feed" class="tab-panel active" role="tabpanel"><div class="loading-state"><div class="spinner"></div></div></section>
    <section id="tab-academics" class="tab-panel" role="tabpanel"><div class="loading-state"><div class="spinner"></div></div></section>
    <section id="tab-calendar" class="tab-panel" role="tabpanel"><div class="loading-state"><div class="spinner"></div></div></section>
    <section id="tab-pinned" class="tab-panel" role="tabpanel"><div class="loading-state"><div class="spinner"></div></div></section>
  </div>

  <nav class="bottom-nav" role="tablist" aria-label="ניווט ראשי">
    <button class="nav-btn active" data-tab="feed" role="tab" aria-selected="true" aria-label="פיד הודעות">
      <div class="nav-indicator"></div>
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
      <span class="nav-label">פיד</span>
    </button>
    <button class="nav-btn" data-tab="academics" role="tab" aria-selected="false" aria-label="לימודים ומטלות">
      <div class="nav-indicator"></div>
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
      <span class="nav-label">לימודים</span>
    </button>
    <button class="nav-btn" data-tab="calendar" role="tab" aria-selected="false" aria-label="לוח שנה">
      <div class="nav-indicator"></div>
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
      <span class="nav-label">לוח שנה</span>
    </button>
    <button class="nav-btn" data-tab="pinned" role="tab" aria-selected="false" aria-label="הודעות נעוצות">
      <div class="nav-indicator"></div>
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="17" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>
      <span class="nav-label">נעוצים</span>
    </button>
  </nav>

</div>
<script>
// ── SVG ICONS (inline Lucide) ────────────────────────────────────────────
const ICONS = {
  pin: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="17" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>',
  calendar: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>',
  chat: '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>',
  book: '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>',
  calendarBig: '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>',
  pinBig: '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="17" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>',
  alert: '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>',
};

// ── CHILDREN ─────────────────────────────────────────────────────────────
const CHILDREN = {
  ran:   { name: '\u05E8\u05DF',    color: '#6366f1' },
  itai:  { name: '\u05D0\u05D9\u05EA\u05D9', color: '#10b981' },
  noga:  { name: '\u05E0\u05D5\u05D2\u05D4', color: '#f59e0b' },
  alon:  { name: '\u05D0\u05DC\u05D5\u05DF', color: '#f43f5e' },
  rinat: { name: '\u05E8\u05D9\u05E0\u05EA', color: '#ef4444' },
  all:   { name: '\u05DB\u05D5\u05DC\u05DD', color: '#7878a0' },
};

function child(key) {
  return CHILDREN[key] || { name: key, color: '#7878a0' };
}

// ── UTILS ────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function rgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── TIME ─────────────────────────────────────────────────────────────────
function fmtTime(iso) {
  const d = new Date(iso), now = new Date();
  const diffH = (now - d) / 36e5;
  if (diffH < 24)  return d.toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' });
  if (diffH < 168) return d.toLocaleDateString('he-IL', { weekday:'short' });
  return d.toLocaleDateString('he-IL', { day:'numeric', month:'numeric' });
}

function fmtDateLabel(iso) {
  const d = new Date(iso), now = new Date();
  const today  = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const msgDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff   = Math.round((msgDay - today) / 864e5);
  if (diff === 0) return '\u05D4\u05D9\u05D5\u05DD';
  if (diff === 1) return '\u05DE\u05D7\u05E8';
  if (diff === -1) return '\u05D0\u05EA\u05DE\u05D5\u05DC';
  return d.toLocaleDateString('he-IL', { weekday:'long', day:'numeric', month:'long' });
}

function dateKey(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function groupByDate(items) {
  const map = new Map();
  for (const item of items) {
    const k = dateKey(item.date);
    if (!map.has(k)) map.set(k, { label: fmtDateLabel(item.date), items: [] });
    map.get(k).items.push(item);
  }
  return [...map.entries()].sort(([a],[b]) => a.localeCompare(b));
}

// ── FILTERS ──────────────────────────────────────────────────────────────
function isEmojiOnly(text) {
  const stripped = text
    .replace(/[\u{1F000}-\u{1FFFF}]/gu, '')
    .replace(/[\u{2600}-\u{27BF}]/gu, '')
    .replace(/[\u{FE00}-\u{FEFF}]/gu, '')
    .replace(/[\u{1F900}-\u{1FAFF}]/gu, '')
    .replace(/\uFE0F/g, '')
    .replace(/[!\s.,;:'"()\-_*#@\u200f\u200e]/g, '');
  return stripped.length === 0;
}

function shouldShow(msg) {
  if (msg.isRinat) return true;
  const t = (msg.summary || msg.text || '').trim();
  if (!t || isEmojiOnly(t)) return false;
  return t.trim().split(/\s+/).filter(Boolean).length >= 3;
}

// ── HTML BUILDERS ────────────────────────────────────────────────────────
function sectionDivider(text) {
  return `<div class="section-divider"><span>${esc(text)}</span><div class="section-divider-line"></div></div>`;
}

function msgCard(msg) {
  const c = child(msg.child);
  const txt = msg.summary || msg.text || '';
  const bg = rgba(c.color, 0.14);
  const cls = ['card', !msg.read ? 'is-unread' : ''].filter(Boolean).join(' ');

  return `
    <div class="${cls}" data-id="${msg.id}">
      <div class="card-strip" style="background:${c.color}"></div>
      <div class="card-content">
        <div class="msg-header">
          <div class="msg-tags">
            <span class="child-tag" style="background:${bg};color:${c.color}">${c.name}</span>
            ${msg.pinned ? `<span class="tag-pin" style="color:${c.color}">${ICONS.pin} \u05E0\u05E2\u05D5\u05E5</span>` : ''}
            ${!msg.read ? `<span class="unread-indicator" style="background:${c.color}"></span>` : ''}
          </div>
          <span class="msg-time">${fmtTime(msg.time)}</span>
        </div>
        <div class="msg-sender">${esc(msg.from || msg.group || '')}</div>
        <div class="msg-body">${esc(txt)}</div>
      </div>
    </div>`;
}

function eventCard(ev) {
  const c = child(ev.child);
  const bg = rgba(c.color, 0.14);
  return `
    <div class="card">
      <div class="card-strip" style="background:${c.color}"></div>
      <div class="card-content">
        <div class="item-title">${esc(ev.title)}</div>
        <div class="item-meta">
          <span class="child-tag-sm" style="background:${bg};color:${c.color}">${c.name}</span>
          <span class="meta-date">${ICONS.calendar} ${fmtDateLabel(ev.date)}</span>
          ${ev.group ? `<span class="meta-group">${esc(ev.group)}</span>` : ''}
        </div>
      </div>
    </div>`;
}

function academicCard(item) {
  const c = child(item.child);
  const bg = rgba(c.color, 0.14);
  return `
    <div class="card">
      <div class="card-strip" style="background:${c.color}"></div>
      <div class="card-content">
        <div class="item-title">${esc(item.title)}</div>
        <div class="item-meta">
          <span class="child-tag-sm" style="background:${bg};color:${c.color}">${c.name}</span>
          ${item.type ? `<span class="type-badge">${esc(item.type)}</span>` : ''}
          <span class="meta-date">${ICONS.calendar} ${fmtDateLabel(item.date)}</span>
        </div>
      </div>
    </div>`;
}

function emptyState(icon, title, sub) {
  return `<div class="empty-state">
    <div class="empty-icon">${icon}</div>
    <div class="empty-title">${esc(title)}</div>
    <div class="empty-sub">${esc(sub)}</div>
  </div>`;
}

// ── RENDER ───────────────────────────────────────────────────────────────
function renderFeed(data) {
  const tab = document.getElementById('tab-feed');
  const msgs = (data.messages || []).filter(shouldShow);
  const rinat = msgs.filter(m => m.isRinat);
  const normal = msgs.filter(m => !m.isRinat);
  let html = '';

  if (rinat.length > 0) {
    html += `<div class="rinat-zone">
      <div class="rinat-title"><div class="rinat-dot"></div>\u05D4\u05D5\u05D3\u05E2\u05D5\u05EA \u05DE\u05E8\u05D9\u05E0\u05EA</div>
      ${rinat.map(msgCard).join('')}
    </div>`;
  }

  if (normal.length === 0 && rinat.length === 0) {
    html += emptyState(ICONS.chat, '\u05D0\u05D9\u05DF \u05D4\u05D5\u05D3\u05E2\u05D5\u05EA \u05E2\u05D3\u05D9\u05D9\u05DF', '\u05D4\u05D5\u05D3\u05E2\u05D5\u05EA \u05DE\u05E7\u05D1\u05D5\u05E6\u05D5\u05EA \u05D4-WhatsApp \u05D9\u05D5\u05E4\u05D9\u05E2\u05D5 \u05DB\u05D0\u05DF');
  } else {
    html += normal.map(msgCard).join('');
  }

  tab.innerHTML = html;

  const unread = msgs.filter(m => !m.read).length;
  const btn = document.querySelector('[data-tab="feed"]');
  btn.querySelector('.nav-badge')?.remove();
  if (unread > 0) btn.insertAdjacentHTML('beforeend', `<span class="nav-badge">${unread}</span>`);
}

function renderAcademics(data) {
  const tab = document.getElementById('tab-academics');
  const items = data.academics || [];

  if (items.length === 0) {
    tab.innerHTML = emptyState(ICONS.book, '\u05D0\u05D9\u05DF \u05DE\u05D8\u05DC\u05D5\u05EA \u05E7\u05E8\u05D5\u05D1\u05D5\u05EA', '\u05DE\u05D1\u05D7\u05E0\u05D9\u05DD, \u05D4\u05DB\u05EA\u05D1\u05D5\u05EA \u05D5\u05E9\u05D9\u05E2\u05D5\u05E8\u05D9 \u05D1\u05D9\u05EA \u05D9\u05D5\u05E4\u05D9\u05E2\u05D5 \u05DB\u05D0\u05DF');
    return;
  }

  const sorted = [...items].sort((a,b) => new Date(a.date) - new Date(b.date));
  let html = '';
  for (const [, { label, items: grp }] of groupByDate(sorted)) {
    html += sectionDivider(label) + grp.map(academicCard).join('');
  }
  tab.innerHTML = html;
}

function renderCalendar(data) {
  const tab = document.getElementById('tab-calendar');
  const events = data.events || [];

  if (events.length === 0) {
    tab.innerHTML = emptyState(ICONS.calendarBig, '\u05D0\u05D9\u05DF \u05D0\u05D9\u05E8\u05D5\u05E2\u05D9\u05DD \u05E7\u05E8\u05D5\u05D1\u05D9\u05DD', '\u05D0\u05D9\u05E8\u05D5\u05E2\u05D9 \u05DC\u05D5\u05D7 \u05D4\u05E9\u05E0\u05D4 \u05D9\u05D5\u05E4\u05D9\u05E2\u05D5 \u05DB\u05D0\u05DF');
    return;
  }

  const sorted = [...events].sort((a,b) => new Date(a.date) - new Date(b.date));
  let html = '';
  for (const [, { label, items }] of groupByDate(sorted)) {
    html += sectionDivider(label) + items.map(eventCard).join('');
  }
  tab.innerHTML = html;
}

function renderPinned(data) {
  const tab = document.getElementById('tab-pinned');
  const pinned = (data.messages || []).filter(m => m.pinned);

  const btn = document.querySelector('[data-tab="pinned"]');
  btn.querySelector('.nav-badge')?.remove();
  if (pinned.length > 0) btn.insertAdjacentHTML('beforeend', `<span class="nav-badge">${pinned.length}</span>`);

  if (pinned.length === 0) {
    tab.innerHTML = emptyState(ICONS.pinBig, '\u05D0\u05D9\u05DF \u05D4\u05D5\u05D3\u05E2\u05D5\u05EA \u05E0\u05E2\u05D5\u05E6\u05D5\u05EA', '\u05D4\u05D5\u05D3\u05E2\u05D5\u05EA \u05D7\u05E9\u05D5\u05D1\u05D5\u05EA \u05E9\u05EA\u05E0\u05E2\u05E5 \u05D9\u05D5\u05E4\u05D9\u05E2\u05D5 \u05DB\u05D0\u05DF');
    return;
  }

  tab.innerHTML = pinned.map(msgCard).join('');
}

// ── TAB SWITCHING ────────────────────────────────────────────────────────
let activeTab = 'feed';

function switchTab(id) {
  if (id === activeTab) return;
  document.querySelector('.tab-panel.active')?.classList.remove('active');
  document.getElementById('tab-' + id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => {
    const isActive = b.dataset.tab === id;
    b.classList.toggle('active', isActive);
    b.setAttribute('aria-selected', isActive);
  });
  activeTab = id;
}

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ── INIT ─────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('./data.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    const meta = document.getElementById('header-meta');
    meta.textContent = data.updated_at ? ('\u05E2\u05D5\u05D3\u05DB\u05DF ' + fmtTime(data.updated_at)) : '';

    renderFeed(data);
    renderAcademics(data);
    renderCalendar(data);
    renderPinned(data);
  } catch (err) {
    console.error(err);
    document.getElementById('tab-feed').innerHTML = emptyState(ICONS.alert, '\u05E9\u05D2\u05D9\u05D0\u05D4 \u05D1\u05D8\u05E2\u05D9\u05E0\u05D4', err.message);
    document.getElementById('header-meta').textContent = '\u05E9\u05D2\u05D9\u05D0\u05D4';
  }
}

init();
</script>

</html>
