<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0d0d14" />
  <title>FamilyOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #0d0d14;
      --surface: #12121f;
      --surface-2: #181830;
      --surface-3: #1e1e3a;
      --surface-hover: #1a1a32;
      --border: rgba(255,255,255,0.06);
      --border-hi: rgba(255,255,255,0.12);
      --text-1: #eeeef5;
      --text-2: #8888a4;
      --text-3: #55556e;
      --accent: #818cf8;
      --accent-dim: rgba(129,140,248,0.12);
      --ran: #6366f1;
      --itai: #10b981;
      --noga: #f59e0b;
      --alon: #f43f5e;
      --rinat: #ef4444;
      --all: #7878a0;
      --nav-h: 64px;
      --header-h: 56px;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
      --radius-card: 16px;
      --radius-pill: 20px;
      --shadow-card: 0 1px 3px rgba(0,0,0,0.3), 0 4px 12px rgba(0,0,0,0.15);
      --shadow-card-hi: 0 2px 8px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.2);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Heebo', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      direction: rtl;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 500px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* ── HEADER ──────────────────────────────────────── */
    .app-header {
      height: calc(var(--header-h) + var(--safe-t));
      padding-top: var(--safe-t);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-inline: 20px;
      flex-shrink: 0;
      background: rgba(13,13,20,0.92);
      backdrop-filter: blur(40px) saturate(1.6);
      -webkit-backdrop-filter: blur(40px) saturate(1.6);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 20;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      font-size: 23px;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #818cf8 0%, #a78bfa 50%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-pulse {
      width: 7px;
      height: 7px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(16,185,129,0.6);
      animation: pulse-glow 3s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(16,185,129,0.6); }
      50% { opacity: 0.35; box-shadow: 0 0 4px rgba(16,185,129,0.2); }
    }

    .header-meta {
      font-size: 11px;
      color: var(--text-3);
      font-weight: 400;
    }

    /* ── CHILD FILTER CHIPS ──────────────────────────── */
    .filter-bar {
      display: none;
      flex-shrink: 0;
      padding: 10px 16px;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-bar.visible { display: flex; }

    .filter-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-2);
      font-family: inherit;
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.2s cubic-bezier(0.22,1,0.36,1);
      min-height: 36px;
    }

    .filter-chip .chip-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }

    .filter-chip:active { transform: scale(0.95); }

    .filter-chip.active {
      border-color: var(--chip-color, var(--accent));
      background: var(--chip-bg, var(--accent-dim));
      color: var(--text-1);
      box-shadow: 0 0 12px var(--chip-glow, rgba(129,140,248,0.15));
    }

    .filter-chip.active .chip-dot { transform: scale(1.2); }

    /* ── TAB PANELS ──────────────────────────────────── */
    .tab-area {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .tab-panel {
      display: none;
      height: 100%;
      overflow-y: auto;
      padding: 12px 14px calc(12px + var(--safe-b));
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      scrollbar-width: none;
    }
    .tab-panel::-webkit-scrollbar { display: none; }

    .tab-panel.active {
      display: block;
      animation: panelIn 0.25s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    @keyframes panelIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── BOTTOM NAV ──────────────────────────────────── */
    .bottom-nav {
      flex-shrink: 0;
      height: calc(var(--nav-h) + var(--safe-b));
      padding-bottom: var(--safe-b);
      background: rgba(13,13,20,0.96);
      backdrop-filter: blur(40px) saturate(1.6);
      -webkit-backdrop-filter: blur(40px) saturate(1.6);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-3);
      padding: 0;
      position: relative;
      transition: color 0.25s cubic-bezier(0.22,1,0.36,1);
      -webkit-user-select: none;
      user-select: none;
      min-height: 48px;
      min-width: 48px;
    }

    .nav-btn:active { transform: scale(0.92); }

    .nav-btn.active { color: var(--accent); }

    .nav-pip {
      position: absolute;
      top: 0;
      left: 50%;
      width: 24px;
      height: 3px;
      background: var(--accent);
      border-radius: 0 0 4px 4px;
      transform: translateX(-50%) scaleX(0);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    .nav-btn.active .nav-pip { transform: translateX(-50%) scaleX(1); }

    .nav-icon {
      width: 22px;
      height: 22px;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }

    .nav-btn.active .nav-icon { transform: scale(1.1) translateY(-1px); }

    .nav-label {
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .nav-badge {
      position: absolute;
      top: 4px;
      left: calc(50% + 7px);
      background: var(--rinat);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      min-width: 17px;
      height: 17px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      border: 2px solid var(--bg);
      line-height: 1;
      pointer-events: none;
      box-shadow: 0 2px 6px rgba(239,68,68,0.3);
    }

    /* ── CARDS ────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius-card);
      border: 1px solid var(--border);
      margin-bottom: 8px;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      transition: transform 0.15s cubic-bezier(0.22,1,0.36,1), box-shadow 0.15s ease;
      cursor: pointer;
      box-shadow: var(--shadow-card);
    }

    .card:active { transform: scale(0.98); }

    .card.is-unread {
      background: var(--surface-2);
      border-color: var(--border-hi);
      box-shadow: var(--shadow-card-hi);
    }

    .card-strip {
      width: 4px;
      flex-shrink: 0;
      border-radius: 0 4px 4px 0;
    }

    .card-body {
      flex: 1;
      padding: 12px 14px;
      min-width: 0;
    }

    /* ── MESSAGE CARD ────────────────────────────────── */
    .msg-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 5px;
    }

    .msg-pills {
      display: flex;
      align-items: center;
      gap: 7px;
      flex: 1;
      min-width: 0;
      flex-wrap: wrap;
    }

    .child-pill {
      font-size: 11.5px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: var(--radius-pill);
      flex-shrink: 0;
    }

    .pin-tag {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 600;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .dot-unread {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 6px currentColor;
    }

    .msg-time {
      font-size: 11px;
      color: var(--text-3);
      flex-shrink: 0;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
    }

    .msg-from {
      font-size: 12.5px;
      color: var(--text-2);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .msg-source-badge {
      font-size: 9.5px;
      font-weight: 600;
      color: var(--text-3);
      background: var(--surface-3);
      padding: 1px 6px;
      border-radius: 8px;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }

    .msg-text {
      font-size: 14.5px;
      color: var(--text-1);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card.is-unread .msg-text {
      font-weight: 500;
      color: #f5f5ff;
    }

    /* ── RINAT ZONE ──────────────────────────────────── */
    .rinat-zone {
      background: linear-gradient(135deg, rgba(239,68,68,0.08) 0%, rgba(239,68,68,0.02) 100%);
      border: 1.5px solid rgba(239,68,68,0.20);
      border-radius: 18px;
      padding: 12px;
      margin-bottom: 12px;
      position: sticky;
      top: 0;
      z-index: 5;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      box-shadow:
        0 0 40px rgba(239,68,68,0.06),
        0 0 0 1px rgba(239,68,68,0.04),
        inset 0 1px 0 rgba(255,255,255,0.03);
      animation: rinat-border-glow 3s ease-in-out infinite;
    }

    @keyframes rinat-border-glow {
      0%, 100% { border-color: rgba(239,68,68,0.20); box-shadow: 0 0 40px rgba(239,68,68,0.06), 0 0 0 1px rgba(239,68,68,0.04), inset 0 1px 0 rgba(255,255,255,0.03); }
      50% { border-color: rgba(239,68,68,0.32); box-shadow: 0 0 50px rgba(239,68,68,0.10), 0 0 0 1px rgba(239,68,68,0.08), inset 0 1px 0 rgba(255,255,255,0.03); }
    }

    .rinat-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 12.5px;
      font-weight: 700;
      color: #f87171;
    }

    .rinat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 0 0 rgba(239,68,68,0.5);
      animation: rinat-pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes rinat-pulse {
      0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
      70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    }

    .rinat-zone .card {
      margin-bottom: 6px;
      background: rgba(239,68,68,0.06);
      border-color: rgba(239,68,68,0.12);
    }
    .rinat-zone .card:last-child { margin-bottom: 0; }

    /* ── SECTION DIVIDER ─────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 18px 0 8px;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--text-3);
      letter-spacing: 0.05em;
    }

    .divider:first-child { margin-top: 2px; }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── EVENT / ACADEMIC CARDS ──────────────────────── */
    .item-title {
      font-size: 14.5px;
      font-weight: 500;
      color: var(--text-1);
      margin-bottom: 7px;
      line-height: 1.5;
    }

    .item-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .child-pill-sm {
      font-size: 10.5px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: var(--radius-pill);
      flex-shrink: 0;
    }

    .meta-date {
      font-size: 11.5px;
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .meta-date svg { width: 13px; height: 13px; opacity: 0.5; }

    .meta-group {
      font-size: 10.5px;
      color: var(--text-3);
      background: var(--surface-3);
      padding: 2px 8px;
      border-radius: var(--radius-pill);
    }

    .type-badge {
      font-size: 10.5px;
      font-weight: 600;
      color: var(--text-2);
      background: var(--surface-3);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: var(--radius-pill);
    }

    /* ── EMPTY STATE ──────────────────────────────────── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 28px;
      text-align: center;
      gap: 8px;
    }

    .empty-icon {
      width: 56px;
      height: 56px;
      color: var(--text-3);
      margin-bottom: 10px;
      opacity: 0.25;
    }

    .empty-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-2);
    }

    .empty-sub {
      font-size: 13.5px;
      color: var(--text-3);
      line-height: 1.65;
    }

    /* ── SKELETON LOADING ────────────────────────────── */
    .skeleton-wrap { padding: 4px 0; }

    .skeleton-card {
      background: var(--surface);
      border-radius: var(--radius-card);
      border: 1px solid var(--border);
      margin-bottom: 8px;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      height: 88px;
    }

    .skeleton-strip {
      width: 4px;
      flex-shrink: 0;
      background: var(--surface-3);
      border-radius: 0 4px 4px 0;
    }

    .skeleton-body {
      flex: 1;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .skeleton-line {
      height: 12px;
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
      background-size: 200% 100%;
      border-radius: 6px;
      animation: shimmer 1.5s ease-in-out infinite;
    }

    .skeleton-line.w60 { width: 60%; }
    .skeleton-line.w80 { width: 80%; }
    .skeleton-line.w40 { width: 40%; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── FOCUS/A11Y ───────────────────────────────────── */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ── CARD EXPAND ──────────────────────────────────── */
    .msg-text.expanded {
      -webkit-line-clamp: unset;
      display: block;
    }

    /* ── STAGGER ANIMATION ───────────────────────────── */
    .card-animate {
      opacity: 0;
      transform: translateY(10px);
      animation: cardSlideIn 0.3s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    @keyframes cardSlideIn {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div id="app">

  <header class="app-header">
    <div class="header-brand">
      <span class="header-logo">FamilyOS</span>
      <div class="header-pulse" aria-hidden="true"></div>
    </div>
    <span id="header-meta" class="header-meta"></span>
  </header>

  <div id="filter-bar" class="filter-bar"></div>

  <div class="tab-area">
    <section id="tab-feed" class="tab-panel active" role="tabpanel"></section>
    <section id="tab-academics" class="tab-panel" role="tabpanel"></section>
    <section id="tab-calendar" class="tab-panel" role="tabpanel"></section>
    <section id="tab-pinned" class="tab-panel" role="tabpanel"></section>
  </div>

  <nav class="bottom-nav" role="tablist" aria-label="ניווט ראשי">
    <button class="nav-btn active" data-tab="feed" role="tab" aria-selected="true" aria-label="פיד הודעות">
      <div class="nav-pip"></div>
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
      <span class="nav-label">פיד</span>
    </button>
    <button class="nav-btn" data-tab="academics" role="tab" aria-selected="false" aria-label="לימודים">
      <div class="nav-pip"></div>
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
      <span class="nav-label">לימודים</span>
    </button>
    <button class="nav-btn" data-tab="calendar" role="tab" aria-selected="false" aria-label="לוח שנה">
      <div class="nav-pip"></div>
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
      <span class="nav-label">לוח שנה</span>
    </button>
    <button class="nav-btn" data-tab="pinned" role="tab" aria-selected="false" aria-label="נעוצים">
      <div class="nav-pip"></div>
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="17" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>
      <span class="nav-label">נעוצים</span>
    </button>
  </nav>

</div>
<script>
// ── SVG ICONS ──────────────────────────────────────────────────────────────
const IC = {
  pin: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="17" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>',
  cal: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>',
  chat56: '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>',
  book56: '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>',
  cal56: '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>',
  pin56: '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="17" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>',
  warn56: '<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>',
};

// ── CHILDREN ────────────────────────────────────────────────────────────────
const KIDS = {
  ran:   { name: 'רן',    color: '#6366f1' },
  itai:  { name: 'איתי', color: '#10b981' },
  noga:  { name: 'נוגה', color: '#f59e0b' },
  alon:  { name: 'אלון', color: '#f43f5e' },
  rinat: { name: 'רינת', color: '#ef4444' },
  all:   { name: 'כולם', color: '#7878a0' },
};

function kid(key) { return KIDS[key] || { name: key, color: '#7878a0' }; }

// ── UTILS ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function rgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── TIME ────────────────────────────────────────────────────────────────────
function fmtTime(iso) {
  const d = new Date(iso), now = new Date();
  const h = (now - d) / 36e5;
  if (h < 24) return d.toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' });
  if (h < 168) return d.toLocaleDateString('he-IL', { weekday:'short' });
  return d.toLocaleDateString('he-IL', { day:'numeric', month:'numeric' });
}

function fmtDateLabel(iso) {
  const d = new Date(iso), now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const msgDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff = Math.round((msgDay - today) / 864e5);
  if (diff === 0) return 'היום';
  if (diff === 1) return 'מחר';
  if (diff === -1) return 'אתמול';
  return d.toLocaleDateString('he-IL', { weekday:'long', day:'numeric', month:'long' });
}

function dateKey(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function groupByDate(items) {
  const m = new Map();
  for (const it of items) {
    const k = dateKey(it.date);
    if (!m.has(k)) m.set(k, { label: fmtDateLabel(it.date), items: [] });
    m.get(k).items.push(it);
  }
  return [...m.entries()].sort(([a],[b]) => a.localeCompare(b));
}

// ── FILTERS ─────────────────────────────────────────────────────────────────
function isEmojiOnly(t) {
  const s = t
    .replace(/[\u{1F000}-\u{1FFFF}]/gu, '')
    .replace(/[\u{2600}-\u{27BF}]/gu, '')
    .replace(/[\u{FE00}-\u{FEFF}]/gu, '')
    .replace(/[\u{1F900}-\u{1FAFF}]/gu, '')
    .replace(/\uFE0F/g, '')
    .replace(/[!\s.,;:'"()\-_*#@\u200f\u200e]/g, '');
  return s.length === 0;
}

function shouldShow(msg) {
  if (msg.isRinat) return true;
  const t = (msg.summary || msg.text || '').trim();
  if (!t || isEmojiOnly(t)) return false;
  return t.split(/\s+/).filter(Boolean).length >= 3;
}

// ── CHILD FILTER ────────────────────────────────────────────────────────────
let activeFilter = 'all';
let cachedData = null;

function buildFilterBar(data) {
  const bar = document.getElementById('filter-bar');
  const childKeys = ['all', 'ran', 'itai', 'noga', 'alon'];
  bar.innerHTML = childKeys.map(key => {
    const k = kid(key);
    return `<button class="filter-chip${key === 'all' ? ' active' : ''}" data-child="${key}"
      style="--chip-color:${k.color};--chip-bg:${rgba(k.color,0.13)};--chip-glow:${rgba(k.color,0.18)}">
      <span class="chip-dot" style="background:${k.color}"></span>${k.name}
    </button>`;
  }).join('');

  bar.querySelectorAll('.filter-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.child;
      bar.querySelectorAll('.filter-chip').forEach(b => b.classList.toggle('active', b.dataset.child === activeFilter));
      renderFeed(cachedData);
    });
  });
}

// ── SKELETON ────────────────────────────────────────────────────────────────
function skeletonCards(n) {
  let html = '<div class="skeleton-wrap">';
  for (let i = 0; i < n; i++) {
    html += `<div class="skeleton-card">
      <div class="skeleton-strip"></div>
      <div class="skeleton-body">
        <div class="skeleton-line w60"></div>
        <div class="skeleton-line w80"></div>
        <div class="skeleton-line w40"></div>
      </div>
    </div>`;
  }
  return html + '</div>';
}

// ── HTML BUILDERS ───────────────────────────────────────────────────────────
function divider(text) {
  return `<div class="divider"><span>${esc(text)}</span><div class="divider-line"></div></div>`;
}

function sourceLabel(msg) {
  if (msg.source === 'email') return 'מייל';
  if (msg.source === 'whatsapp') return 'WA';
  return '';
}

function msgCard(msg, idx) {
  const c = kid(msg.child);
  const txt = msg.summary || msg.text || '';
  const bg = rgba(c.color, 0.13);
  const cls = ['card', 'card-animate', !msg.read ? 'is-unread' : ''].filter(Boolean).join(' ');
  const src = sourceLabel(msg);
  const delay = Math.min((idx || 0) * 30, 300);

  return `<div class="${cls}" data-id="${msg.id}" style="animation-delay:${delay}ms">
    <div class="card-strip" style="background:${c.color}"></div>
    <div class="card-body">
      <div class="msg-top">
        <div class="msg-pills">
          <span class="child-pill" style="background:${bg};color:${c.color}">${c.name}</span>
          ${msg.pinned ? `<span class="pin-tag" style="color:${c.color}">${IC.pin} נעוץ</span>` : ''}
          ${!msg.read ? `<span class="dot-unread" style="background:${c.color};color:${c.color}"></span>` : ''}
        </div>
        <span class="msg-time">${fmtTime(msg.time)}</span>
      </div>
      <div class="msg-from">${esc(msg.from || msg.group || '')}${src ? `<span class="msg-source-badge">${src}</span>` : ''}</div>
      <div class="msg-text" onclick="this.classList.toggle('expanded')">${esc(txt)}</div>
    </div>
  </div>`;
}

function eventCard(ev, idx) {
  const c = kid(ev.child);
  const bg = rgba(c.color, 0.13);
  const delay = Math.min((idx || 0) * 30, 300);
  return `<div class="card card-animate" style="animation-delay:${delay}ms">
    <div class="card-strip" style="background:${c.color}"></div>
    <div class="card-body">
      <div class="item-title">${esc(ev.title)}</div>
      <div class="item-meta">
        <span class="child-pill-sm" style="background:${bg};color:${c.color}">${c.name}</span>
        <span class="meta-date">${IC.cal} ${fmtDateLabel(ev.date)}</span>
        ${ev.group ? `<span class="meta-group">${esc(ev.group)}</span>` : ''}
      </div>
    </div>
  </div>`;
}

function academicCard(it, idx) {
  const c = kid(it.child);
  const bg = rgba(c.color, 0.13);
  const delay = Math.min((idx || 0) * 30, 300);
  return `<div class="card card-animate" style="animation-delay:${delay}ms">
    <div class="card-strip" style="background:${c.color}"></div>
    <div class="card-body">
      <div class="item-title">${esc(it.title)}</div>
      <div class="item-meta">
        <span class="child-pill-sm" style="background:${bg};color:${c.color}">${c.name}</span>
        ${it.type ? `<span class="type-badge">${esc(it.type)}</span>` : ''}
        <span class="meta-date">${IC.cal} ${fmtDateLabel(it.date)}</span>
      </div>
    </div>
  </div>`;
}

function emptyState(icon, title, sub) {
  return `<div class="empty">
    <div class="empty-icon">${icon}</div>
    <div class="empty-title">${esc(title)}</div>
    <div class="empty-sub">${esc(sub)}</div>
  </div>`;
}

// ── RENDER ──────────────────────────────────────────────────────────────────
function renderFeed(data) {
  const el = document.getElementById('tab-feed');
  let msgs = (data.messages || []).filter(shouldShow);

  if (activeFilter !== 'all') {
    msgs = msgs.filter(m => m.child === activeFilter);
  }

  const rinat = msgs.filter(m => m.isRinat);
  const normal = msgs.filter(m => !m.isRinat);
  let html = '';
  let idx = 0;

  if (rinat.length > 0) {
    html += `<div class="rinat-zone">
      <div class="rinat-header"><div class="rinat-dot"></div>הודעות מרינת</div>
      ${rinat.map(m => msgCard(m, idx++)).join('')}
    </div>`;
  }

  if (normal.length === 0 && rinat.length === 0) {
    html += emptyState(IC.chat56, 'אין הודעות עדיין', 'הודעות מקבוצות ה-WhatsApp יופיעו כאן');
  } else {
    html += normal.map(m => msgCard(m, idx++)).join('');
  }

  el.innerHTML = html;

  const allMsgs = (data.messages || []).filter(shouldShow);
  const unread = allMsgs.filter(m => !m.read).length;
  const btn = document.querySelector('[data-tab="feed"]');
  btn.querySelector('.nav-badge')?.remove();
  if (unread > 0) btn.insertAdjacentHTML('beforeend', `<span class="nav-badge">${unread}</span>`);
}

function renderAcademics(data) {
  const el = document.getElementById('tab-academics');
  const items = data.academics || [];

  if (items.length === 0) {
    el.innerHTML = emptyState(IC.book56, 'אין מטלות קרובות', 'מבחנים, הכתבות ושיעורי בית יופיעו כאן');
    return;
  }

  const sorted = [...items].sort((a,b) => new Date(a.date) - new Date(b.date));
  let html = '';
  let idx = 0;
  for (const [, { label, items: g }] of groupByDate(sorted)) {
    html += divider(label) + g.map(it => academicCard(it, idx++)).join('');
  }
  el.innerHTML = html;
}

function renderCalendar(data) {
  const el = document.getElementById('tab-calendar');
  const events = data.events || [];

  if (events.length === 0) {
    el.innerHTML = emptyState(IC.cal56, 'אין אירועים קרובים', 'אירועי לוח השנה יופיעו כאן');
    return;
  }

  const sorted = [...events].sort((a,b) => new Date(a.date) - new Date(b.date));
  let html = '';
  let idx = 0;
  for (const [, { label, items }] of groupByDate(sorted)) {
    html += divider(label) + items.map(ev => eventCard(ev, idx++)).join('');
  }
  el.innerHTML = html;
}

function renderPinned(data) {
  const el = document.getElementById('tab-pinned');
  const pinned = (data.messages || []).filter(m => m.pinned);

  const btn = document.querySelector('[data-tab="pinned"]');
  btn.querySelector('.nav-badge')?.remove();
  if (pinned.length > 0) btn.insertAdjacentHTML('beforeend', `<span class="nav-badge">${pinned.length}</span>`);

  if (pinned.length === 0) {
    el.innerHTML = emptyState(IC.pin56, 'אין הודעות נעוצות', 'הודעות חשובות שתנעץ יופיעו כאן');
    return;
  }

  el.innerHTML = pinned.map((m, i) => msgCard(m, i)).join('');
}

// ── TAB SWITCHING ───────────────────────────────────────────────────────────
let activeTab = 'feed';

function switchTab(id) {
  if (id === activeTab) return;
  document.querySelector('.tab-panel.active')?.classList.remove('active');
  document.getElementById('tab-' + id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => {
    const on = b.dataset.tab === id;
    b.classList.toggle('active', on);
    b.setAttribute('aria-selected', on);
  });
  activeTab = id;

  const bar = document.getElementById('filter-bar');
  bar.classList.toggle('visible', id === 'feed');
}

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ── INIT ────────────────────────────────────────────────────────────────────
// Show skeleton loading immediately
document.querySelectorAll('.tab-panel').forEach(p => { p.innerHTML = skeletonCards(5); });

async function init() {
  try {
    const res = await fetch('./data.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    cachedData = data;

    document.getElementById('header-meta').textContent =
      data.updated_at ? ('עודכן ' + fmtTime(data.updated_at)) : '';

    buildFilterBar(data);
    document.getElementById('filter-bar').classList.add('visible');

    renderFeed(data);
    renderAcademics(data);
    renderCalendar(data);
    renderPinned(data);
  } catch (err) {
    console.error(err);
    document.getElementById('tab-feed').innerHTML = emptyState(IC.warn56, 'שגיאה בטעינה', err.message);
    document.getElementById('header-meta').textContent = 'שגיאה';
  }
}

init();
</script>
