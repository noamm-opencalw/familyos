<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#F8F9FA" />
  <title>FamilyOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    /* ── STEP 1: Design Tokens (Stitch Light) ── */
    :root {
      /* Core palette */
      --bg:          #F8F9FA;
      --surface:     #FFFFFF;
      --surface-2:   #F3F4F6;
      --surface-3:   #E9EAEC;
      --surface-hover: #F0F1F3;
      --border:      rgba(0,0,0,0.07);
      --border-hi:   rgba(0,0,0,0.13);
      --text-1:      #1F2937;
      --text-2:      #595959;
      --text-3:      #9CA3AF;
      --accent:      #4A90E2;
      --accent-dim:  rgba(74,144,226,0.10);
      /* Children colours — kept vivid for identity */
      --ran:   #6366f1;
      --itai:  #10b981;
      --noga:  #f59e0b;
      --alon:  #f43f5e;
      --rinat: #ef4444;
      --all:   #6B7280;
      /* Layout */
      --nav-h:      64px;
      --header-h:   56px;
      --safe-b:     env(safe-area-inset-bottom, 0px);
      --safe-t:     env(safe-area-inset-top, 0px);
      --radius-card: 16px;
      --radius-pill: 20px;
      --shadow-card: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.04);
      --shadow-card-hi: 0 8px 16px -4px rgba(0,0,0,0.10), 0 4px 6px -2px rgba(0,0,0,0.06);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* ── STEP 1: Typography + RTL ── */
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Rubik', 'Heebo', system-ui, -apple-system, sans-serif;
      background: #E5E7EB; /* outer backdrop on desktop */
      color: var(--text-1);
      direction: rtl;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── STEP 2: Mobile-first container ── */
    #app {
      display: flex; flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg);
      position: relative; overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.15);
    }

    /* ── STEP 2: Header ── */
    .app-header {
      height: calc(var(--header-h) + var(--safe-t));
      padding-top: var(--safe-t);
      display: flex; align-items: center; justify-content: space-between;
      padding-inline: 20px; flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: relative; z-index: 20;
    }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-logo {
      font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
      color: var(--accent);
    }
    .header-pulse {
      width: 7px; height: 7px; background: #10b981; border-radius: 50%;
      box-shadow: 0 0 6px rgba(16,185,129,0.5);
      animation: pulse-glow 3s ease-in-out infinite; flex-shrink: 0;
    }
    @keyframes pulse-glow {
      0%,100% { opacity:1; box-shadow:0 0 6px rgba(16,185,129,0.5); }
      50%      { opacity:.4; box-shadow:0 0 3px rgba(16,185,129,0.2); }
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .header-meta { font-size: 11px; color: var(--text-3); }
    .btn-refresh {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-2); transition: all .2s; flex-shrink: 0;
    }
    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }
    .btn-refresh.spinning svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── STEP 3: Filter Bar — smooth horizontal scroll ── */
    .filter-bar {
      display: none; flex-shrink: 0;
      padding: 10px 16px; gap: 8px;
      overflow-x: auto; scrollbar-width: none;
      background: var(--surface); border-bottom: 1px solid var(--border);
      /* smooth momentum scroll on iOS */
      -webkit-overflow-scrolling: touch;
      /* fade edges to hint scroll */
      mask-image: linear-gradient(to left, transparent 0, #000 24px, #000 calc(100% - 24px), transparent 100%);
      -webkit-mask-image: linear-gradient(to left, transparent 0, #000 24px, #000 calc(100% - 24px), transparent 100%);
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-bar.visible { display: flex; }

    .filter-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: var(--radius-pill);
      border: 1.5px solid var(--border); background: var(--surface-2);
      color: var(--text-2); font-family: inherit; font-size: 12.5px; font-weight: 600;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: all 0.2s cubic-bezier(0.22,1,0.36,1); min-height: 36px;
    }
    .filter-chip .chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; transition: transform .2s cubic-bezier(.34,1.56,.64,1); }
    .filter-chip:active { transform: scale(0.95); }
    .filter-chip.active {
      border-color: var(--chip-color, var(--accent));
      background: var(--chip-bg, var(--accent-dim));
      color: var(--text-1);
      box-shadow: 0 2px 8px var(--chip-glow, rgba(74,144,226,0.15));
    }
    .filter-chip.active .chip-dot { transform: scale(1.2); }

    /* ── STEP 2+3: Tab Area + whitespace ── */
    .tab-area { flex: 1; overflow: hidden; position: relative; background: var(--bg); }
    .tab-panel {
      display: none; height: 100%; overflow-y: auto;
      padding: 20px 14px calc(20px + var(--nav-h) + var(--safe-b));
      -webkit-overflow-scrolling: touch; overscroll-behavior: contain; scrollbar-width: none;
    }
    .tab-panel::-webkit-scrollbar { display: none; }
    .tab-panel.active { display: block; animation: panelIn 0.25s cubic-bezier(0.22,1,0.36,1) forwards; }
    @keyframes panelIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* ── STEP 2: Bottom Navigation ── */
    .bottom-nav {
      flex-shrink: 0;
      height: calc(var(--nav-h) + var(--safe-b));
      padding-bottom: var(--safe-b);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; z-index: 100;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
      background: none; border: none; cursor: pointer; color: var(--text-3); padding: 0; position: relative;
      transition: color .2s ease;
      -webkit-user-select: none; user-select: none; min-height: 48px; min-width: 48px;
    }
    .nav-btn:active { transform: scale(0.92); }
    .nav-btn.active { color: var(--accent); }
    /* active indicator: filled pill behind icon */
    .nav-pip {
      position: absolute; top: 6px;
      width: 40px; height: 28px;
      background: var(--accent-dim);
      border-radius: 14px;
      transform: scaleX(0); opacity: 0;
      transition: transform .25s cubic-bezier(.34,1.56,.64,1), opacity .2s;
    }
    .nav-btn.active .nav-pip { transform: scaleX(1); opacity: 1; }
    .nav-icon { width: 22px; height: 22px; position: relative; z-index: 1; transition: transform .2s cubic-bezier(.34,1.56,.64,1); }
    .nav-btn.active .nav-icon { transform: scale(1.08) translateY(-1px); }
    .nav-label { font-size: 10.5px; font-weight: 600; letter-spacing: .01em; position: relative; z-index: 1; }
    .nav-badge {
      position: absolute; top: 4px; left: calc(50% + 7px);
      background: var(--rinat); color: #fff; font-size: 9px; font-weight: 700;
      min-width: 17px; height: 17px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 4px; border: 2px solid var(--surface); line-height: 1;
      pointer-events: none; box-shadow: 0 2px 6px rgba(239,68,68,.3);
    }

    /* ── STEP 3: Cards — ample whitespace ── */
    .card {
      background: var(--surface); border-radius: var(--radius-card);
      border: 1px solid var(--border); margin-bottom: 12px;
      display: flex; align-items: stretch; overflow: hidden;
      transition: transform .15s cubic-bezier(.22,1,.36,1), box-shadow .15s ease;
      box-shadow: var(--shadow-card);
    }
    .card:active { transform: scale(0.985); box-shadow: var(--shadow-card-hi); }
    .card.is-unread { background: #F0F5FF; border-color: rgba(74,144,226,0.18); box-shadow: var(--shadow-card-hi); }
    .card-strip { width: 4px; flex-shrink: 0; border-radius: 0 4px 4px 0; }
    .card-body { flex: 1; padding: 14px 16px; min-width: 0; }

    /* ── MESSAGE CARD ── */
    .msg-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 5px; }
    .msg-pills { display: flex; align-items: center; gap: 7px; flex: 1; min-width: 0; flex-wrap: wrap; }
    .child-pill { font-size: 11.5px; font-weight: 700; padding: 2px 10px; border-radius: var(--radius-pill); flex-shrink: 0; }
    .pin-tag { display: flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 600; flex-shrink: 0; opacity: .7; }
    .dot-unread { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 6px currentColor; }
    .msg-time { font-size: 11px; color: var(--text-3); flex-shrink: 0; font-weight: 400; font-variant-numeric: tabular-nums; }
    .msg-from {
      font-size: 12px; color: var(--text-2); margin-bottom: 5px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
      max-width: 100%;
    }
    .msg-source-badge {
      font-size: 9.5px; font-weight: 600; color: var(--text-3);
      background: var(--surface-2); border: 1px solid var(--border);
      padding: 1px 6px; border-radius: 8px; flex-shrink: 0;
    }
    /* ── STEP 3: Text truncation — max 2 lines for uniform card height ── */
    .msg-text {
      font-size: 14px; color: var(--text-1); line-height: 1.55;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card.is-unread .msg-text { font-weight: 600; color: var(--text-1); }
    .msg-text.expanded { -webkit-line-clamp: unset; display: block; }

    /* full body expand */
    .msg-body-full {
      display: none; margin-top: 10px;
      font-size: 13px; color: var(--text-2); line-height: 1.75;
      white-space: pre-wrap; word-break: break-word;
      background: var(--surface-2); border-radius: 10px;
      padding: 10px 12px; max-height: 380px; overflow-y: auto;
    }
    .msg-body-full.open { display: block; }

    /* action row */
    .msg-actions {
      display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap;
    }
    .btn-ghost {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 11px; border-radius: 8px; font-family: inherit;
      font-size: 11.5px; font-weight: 600; cursor: pointer;
      border: 1px solid var(--border); background: var(--surface-2);
      color: var(--text-2); transition: all .2s;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .btn-ghost svg { width: 12px; height: 12px; }

    /* ── PRIORITY BADGE ── */
    .priority-badge {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 8px;
      letter-spacing: .3px; text-transform: uppercase; flex-shrink: 0;
    }
    .priority-badge.urgent { background: #FEE2E2; color: #DC2626; border: 1px solid #FCA5A5; }
    .priority-badge.high   { background: #FEF3C7; color: #D97706; border: 1px solid #FCD34D; }

    /* ── RINAT ZONE ── */
    .rinat-zone {
      background: #FFF5F5;
      border: 1.5px solid #FCA5A5;
      border-radius: 18px; padding: 12px; margin-bottom: 12px;
      position: sticky; top: 0; z-index: 5;
      box-shadow: 0 4px 12px rgba(239,68,68,.08);
    }
    .rinat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 12.5px; font-weight: 700; color: #f87171; }
    .rinat-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 0 0 rgba(239,68,68,.5); animation: rinat-pulse 2s ease-in-out infinite; flex-shrink: 0; }
    @keyframes rinat-pulse { 0% { box-shadow:0 0 0 0 rgba(239,68,68,.5); } 70% { box-shadow:0 0 0 10px rgba(239,68,68,0); } 100% { box-shadow:0 0 0 0 rgba(239,68,68,0); } }
    .rinat-zone .card { margin-bottom: 6px; background: #fff; border-color: #FCA5A5; }
    .rinat-zone .card:last-child { margin-bottom: 0; }

    /* ── STEP 3: Divider — generous whitespace ── */
    .divider { display: flex; align-items: center; gap: 10px; margin: 24px 0 12px; font-size: 11px; font-weight: 700; color: var(--text-3); letter-spacing: .08em; text-transform: uppercase; }
    .divider:first-child { margin-top: 0; }
    .divider-line { flex: 1; height: 1px; background: var(--border); }

    /* ── EVENT CARD ── */
    /* ── STEP 3: Event/academic item — 2-line clamp ── */
    .item-title {
      font-size: 14px; font-weight: 600; color: var(--text-1); margin-bottom: 7px; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .item-meta  { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .child-pill-sm { font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: var(--radius-pill); flex-shrink: 0; }
    .meta-date  { font-size: 11.5px; color: var(--text-3); display: flex; align-items: center; gap: 4px; }
    .meta-date svg { width: 13px; height: 13px; opacity: .5; }
    .meta-group { font-size: 10.5px; color: var(--text-3); background: var(--surface-3); padding: 2px 8px; border-radius: var(--radius-pill); }
    .type-badge { font-size: 10.5px; font-weight: 600; color: var(--text-2); background: var(--surface-3); border: 1px solid var(--border); padding: 2px 8px; border-radius: var(--radius-pill); }

    /* event extra info (expand) */
    .event-extra { display: none; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
    .event-extra.open { display: block; }
    .event-location { font-size: 12px; color: var(--text-3); margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
    .event-location svg { width: 12px; height: 12px; flex-shrink: 0; opacity: .6; }
    .event-desc { font-size: 12px; color: var(--text-2); line-height: 1.65; white-space: pre-wrap; }

    /* calendar action buttons */
    .btn-cal-add {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: 9px; font-family: inherit;
      font-size: 11.5px; font-weight: 700; cursor: pointer; text-decoration: none;
      background: var(--accent); color: #fff;
      border: none; transition: all .2s; box-shadow: 0 2px 6px rgba(74,144,226,.3);
    }
    .btn-cal-add svg { width: 13px; height: 13px; }
    .btn-cal-add:hover { background: #3a7fd5; box-shadow: 0 4px 10px rgba(74,144,226,.4); }
    .btn-cal-remove {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 10px; border-radius: 9px; font-family: inherit;
      font-size: 11.5px; font-weight: 700; cursor: pointer;
      background: #FEE2E2; color: #DC2626;
      border: 1px solid #FCA5A5; transition: all .2s;
    }
    .btn-cal-remove svg { width: 13px; height: 13px; }
    .btn-cal-remove:hover { background: #FCA5A5; }

    /* ── STEP 3: Tasks — whitespace ── */
    .task-card {
      background: var(--surface); border-radius: var(--radius-card);
      border: 1px solid var(--border); margin-bottom: 12px;
      display: flex; align-items: flex-start; overflow: hidden;
      box-shadow: var(--shadow-card); transition: opacity .3s;
    }
    .task-card.done { opacity: .4; }
    .task-strip { width: 4px; flex-shrink: 0; border-radius: 0 4px 4px 0; align-self: stretch; }
    .task-inner { flex: 1; padding: 14px 16px; display: flex; gap: 14px; align-items: flex-start; }
    .task-check {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid var(--border-hi); background: none; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; transition: all .2s;
      margin-top: 1px;
    }
    .task-check svg { width: 13px; height: 13px; display: none; }
    .task-check.checked { background: var(--itai); border-color: var(--itai); color: #fff; }
    .task-check.checked svg { display: block; }
    .task-info { flex: 1; }
    .task-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; line-height: 1.4; color: var(--text-1); }
    .task-meta  { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .task-due   { font-size: 11.5px; color: var(--text-3); display: flex; align-items: center; gap: 4px; }
    .task-due svg { width: 12px; height: 12px; opacity: .5; }
    .task-src   { font-size: 10.5px; color: var(--text-3); background: var(--surface-2); border: 1px solid var(--border); padding: 2px 8px; border-radius: var(--radius-pill); }

    /* ── CALENDAR GRID ── */
    .cal-grid-wrap { background: var(--surface); border-radius: var(--radius-card); padding: 14px; margin-bottom: 16px; border: 1px solid var(--border); box-shadow: var(--shadow-card); }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .cal-nav-btn {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text-2); cursor: pointer; font-size: 15px;
      display: flex; align-items: center; justify-content: center; transition: all .2s;
    }
    .cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .cal-month-title { font-size: 16px; font-weight: 800; color: var(--text-1); }
    .cal-days-hdr { display: grid; grid-template-columns: repeat(7,1fr); text-align: center; font-size: 11px; color: var(--text-3); font-weight: 700; margin-bottom: 6px; }
    .cal-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
    .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 12px; cursor: pointer; position: relative; transition: background .15s; color: var(--text-1); }
    .cal-day.other-month { color: var(--text-3); pointer-events: none; }
    .cal-day.today { background: var(--accent); color: #fff; font-weight: 800; box-shadow: 0 2px 8px rgba(74,144,226,.4); }
    .cal-day.has-event::after { content:''; position: absolute; bottom: 2px; width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
    .cal-day.today.has-event::after { background: #fff; }
    .cal-day.selected:not(.today) { outline: 2px solid var(--accent); outline-offset: -1px; background: var(--accent-dim); }
    .cal-day:not(.today):not(.other-month):hover { background: var(--surface-2); }

    /* ── STEP 3: Empty States — clean, informative ── */
    .empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 64px 28px; text-align: center; gap: 10px;
      background: var(--surface); border-radius: var(--radius-card);
      border: 1.5px dashed var(--border-hi);
      margin-top: 8px;
    }
    .empty-icon { width: 52px; height: 52px; color: var(--accent); margin-bottom: 6px; opacity: .35; }
    .empty-title { font-size: 16px; font-weight: 700; color: var(--text-1); }
    .empty-sub   { font-size: 13px; color: var(--text-3); line-height: 1.65; max-width: 240px; }

    /* ── SKELETON ── */
    .skeleton-card { background: var(--surface); border-radius: var(--radius-card); border: 1px solid var(--border); margin-bottom: 10px; display: flex; align-items: stretch; overflow: hidden; height: 88px; box-shadow: var(--shadow-card); }
    .skeleton-strip { width: 4px; flex-shrink: 0; background: var(--surface-3); border-radius: 0 4px 4px 0; }
    .skeleton-body  { flex:1; padding: 14px 14px; display: flex; flex-direction: column; gap: 8px; }
    .skeleton-line  { height: 12px; background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%); background-size: 200% 100%; border-radius: 6px; animation: shimmer 1.5s ease-in-out infinite; }
    .skeleton-line.w60 { width:60%; } .skeleton-line.w80 { width:80%; } .skeleton-line.w40 { width:40%; }
    @keyframes shimmer { 0% { background-position:200% 0; } 100% { background-position:-200% 0; } }

    /* ── CARD ANIMATE ── */
    .card-animate { opacity:0; transform:translateY(10px); animation: cardSlideIn .3s cubic-bezier(.22,1,.36,1) forwards; }
    @keyframes cardSlideIn { to { opacity:1; transform:translateY(0); } }

    /* ── STEP 3: Custody Banner — whitespace ── */
    .custody-banner {
      border-radius: var(--radius-card); padding: 16px 18px; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between;
      border: 1px solid var(--border); box-shadow: var(--shadow-card);

    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  </style>
</head>

<script>
// ─── SVG ICONS ────────────────────────────────────────────────────────────────
const IC = {
  pin:  '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="17" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>',

  loc:  '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>',

  book: '<svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h5a3 3 0 013 3v10a2 2 0 00-2-2H4V4z"/><path d="M16 4h-5a3 3 0 00-3 3v10a2 2 0 012-2h6V4z"/></svg>',
  add:  '<svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="2" y="4" width="16" height="14" rx="2.5" stroke-width="1.5"/><path d="M14 2v4M6 2v4M2 9h16"/><path d="M10 13v4M8 15h4"/></svg>',
  del:  '<svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h14M8 5V3h4v2M5 5l1 12h8l1-12"/></svg>',
  info: '<svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="10" cy="10" r="8" stroke-width="1.5"/><path d="M10 9v5M10 7v.5"/></svg>',
  warn56:'<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>',
  cal56:'<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>',
  chat56:'<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>',
  pin56:'<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="17" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>',
  task56:'<svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 5-5"/><rect width="18" height="18" x="3" y="3" rx="3"/></svg>',
};

// ─── CHILDREN ─────────────────────────────────────────────────────────────────
const KIDS = {
  ran:   { name:'רן',    color:'#6366f1' },
  itai:  { name:'איתי', color:'#10b981' },
  noga:  { name:'נוגה', color:'#f59e0b' },
  alon:  { name:'אלון', color:'#f43f5e' },
  rinat: { name:'רינת', color:'#ef4444' },
  all:   { name:'כולם', color:'#7878a0' },
};
function kid(k) { return KIDS[k] || { name:k, color:'#7878a0' }; }

const HE_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const HE_DAYS   = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

// ─── UTILS ────────────────────────────────────────────────────────────────────
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function rgba(hex,a) { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }
function pad(n) { return String(n).padStart(2,'0'); }

function ls(k)      { try { return JSON.parse(localStorage.getItem(k))||{}; } catch { return {}; } }
function lsSave(k,v){ try { localStorage.setItem(k,JSON.stringify(v)); } catch {} }

function isRead(id)         { return !!ls('fos_read')[id]; }
function markRead(id,v)     { const r=ls('fos_read'); r[id]=v; lsSave('fos_read',r); }
function isTaskDone(id)     { return !!ls('fos_tasks')[id]; }
function setTaskDone(id,v)  { const t=ls('fos_tasks'); t[id]=v; lsSave('fos_tasks',t); }
function addedCal()         { return ls('fos_cal'); }
function trackCal(id,link)  { const e=addedCal(); e[id]=link||true; lsSave('fos_cal',e); }
function untrackCal(id)     { const e=addedCal(); delete e[id]; lsSave('fos_cal',e); }

// ─── TIME ─────────────────────────────────────────────────────────────────────
function fmtTime(iso) {
  const d=new Date(iso), now=new Date(), h=(now-d)/36e5;
  if (h<24)  return d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
  if (h<168) return d.toLocaleDateString('he-IL',{weekday:'short'});
  return d.toLocaleDateString('he-IL',{day:'numeric',month:'numeric'});
}
function fmtDateLabel(iso) {
  const d=new Date(iso), today=new Date(); today.setHours(0,0,0,0);
  const msgDay=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff=Math.round((msgDay-today)/864e5);
  if (diff===0) return 'היום';
  if (diff===1) return 'מחר';
  if (diff===-1) return 'אתמול';
  return d.toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});
}
function fmtFull(iso) {
  const d=new Date(iso);
  if (isNaN(d)) return iso;
  const allDay=!iso.includes('T');
  if (allDay) return `${d.getDate()} ב${HE_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  return `${d.getDate()} ב${HE_MONTHS[d.getMonth()]} ${d.getFullYear()}, ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fmtDay(iso)  { const d=new Date(iso); return isNaN(d)?'':d.getDate(); }
function fmtMon(iso)  { const d=new Date(iso); return isNaN(d)?'':HE_MONTHS[d.getMonth()].slice(0,3); }
function fmtTime2(iso){ const d=new Date(iso); if(isNaN(d)||(!iso.includes('T')&&d.getHours()===0&&d.getMinutes()===0)) return 'כל היום'; return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function dateKey(iso) { const d=new Date(iso); return `${d.getFullYear()}-${pad(d.getMonth())}-${pad(d.getDate())}`; }
function groupByDate(items) {
  const m=new Map();
  for (const it of items) { const k=dateKey(it.date); if(!m.has(k)) m.set(k,{label:fmtDateLabel(it.date),items:[]}); m.get(k).items.push(it); }
  return [...m.entries()].sort(([a],[b])=>a.localeCompare(b));
}

// ─── FILTER ───────────────────────────────────────────────────────────────────
function isEmojiOnly(t) {
  const s=t.replace(/[\u{1F000}-\u{1FFFF}]/gu,'').replace(/[\u{2600}-\u{27BF}]/gu,'').replace(/[\u{FE00}-\u{FEFF}]/gu,'').replace(/[\u{1F900}-\u{1FAFF}]/gu,'').replace(/\uFE0F/g,'').replace(/[!\s.,;:'"()\-_*#@\u200f\u200e]/g,'');
  return s.length===0;
}
function shouldShow(msg) {
  if (msg.isRinat) return true;
  const t=(msg.summary||msg.text||'').trim();
  if (!t||isEmojiOnly(t)) return false;
  return t.split(/\s+/).filter(Boolean).length>=3;
}

let activeFilter='all';
let DATA=null;
let calViewDate=new Date();
let calSelected=null;

// ─── FILTER BAR ───────────────────────────────────────────────────────────────
function buildFilterBar() {
  const bar=document.getElementById('filter-bar');
  bar.innerHTML=['all','ran','itai','noga','alon'].map(key=>{
    const k=kid(key);
    return `<button class="filter-chip${key==='all'?' active':''}" data-child="${key}"
      style="--chip-color:${k.color};--chip-bg:${rgba(k.color,.13)};--chip-glow:${rgba(k.color,.18)}">
      <span class="chip-dot" style="background:${k.color}"></span>${k.name}
    </button>`;
  }).join('');
  bar.querySelectorAll('.filter-chip').forEach(btn=>{
    btn.addEventListener('click',()=>{
      activeFilter=btn.dataset.child;
      bar.querySelectorAll('.filter-chip').forEach(b=>b.classList.toggle('active',b.dataset.child===activeFilter));
      renderFeed(); renderCalendar(); renderTasks();
    });
  });
}

// ─── SKELETON ─────────────────────────────────────────────────────────────────
function skeleton(n) {
  let h='';
  for(let i=0;i<n;i++) h+=`<div class="skeleton-card"><div class="skeleton-strip"></div><div class="skeleton-body"><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div><div class="skeleton-line w40"></div></div></div>`;
  return h;
}

// ─── DIVIDER ──────────────────────────────────────────────────────────────────
function divider(t) { return `<div class="divider"><span>${esc(t)}</span><div class="divider-line"></div></div>`; }

// ─── CALENDAR DEEPLINK ────────────────────────────────────────────────────────
function calLink(ev) {
  const s=new Date(ev.date), e=ev.endDate?new Date(ev.endDate):s;
  if (isNaN(s)) return '#';
  const fmt=d=>{
    const allDay=!ev.date.includes('T');
    if (allDay) return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
    return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;
  };
  const p=new URLSearchParams({action:'TEMPLATE',text:ev.title,dates:`${fmt(s)}/${fmt(isNaN(e)?s:e)}`});
  if (ev.description) p.set('details',ev.description);
  if (ev.location)    p.set('location',ev.location);
  return 'https://calendar.google.com/calendar/render?'+p.toString();
}

// ─── CLEAN BODY ───────────────────────────────────────────────────────────────
function cleanBody(body) {
  if (!body) return '';
  if (/<[a-z][\s\S]*>/i.test(body)) { const d=document.createElement('div'); d.innerHTML=body; return (d.textContent||d.innerText||'').trim(); }
  return body.trim();
}

// ─── MESSAGE CARD ─────────────────────────────────────────────────────────────
function msgCard(msg, idx) {
  const c=kid(msg.child), txt=msg.summary||msg.text||'';
  const bg=rgba(c.color,.13);
  const body=cleanBody(msg.body);
  const hasBody=body.length>20;
  const cls=['card','card-animate',!isRead(msg.id)?'is-unread':''].filter(Boolean).join(' ');
  const src=msg.source==='email'?'מייל':msg.source==='whatsapp'?'WA':'';
  const delay=Math.min((idx||0)*30,300);
  const prio=msg.priority==='urgent'?'<span class="priority-badge urgent">דחוף</span>':msg.priority==='high'?'<span class="priority-badge high">חשוב</span>':'';

  return `<div class="${cls}" data-id="${msg.id}" style="animation-delay:${delay}ms" id="mc-${msg.id}">
  <div class="card-strip" style="background:${c.color}"></div>
  <div class="card-body">
    <div class="msg-top">
      <div class="msg-pills">
        <span class="child-pill" style="background:${bg};color:${c.color}">${c.name}</span>
        ${msg.pinned?`<span class="pin-tag" style="color:${c.color}">${IC.pin} נעוץ</span>`:''}
        ${!isRead(msg.id)?`<span class="dot-unread" style="background:${c.color};color:${c.color}"></span>`:''}
      </div>
      <span class="msg-time">${fmtTime(msg.time)}</span>
    </div>
    <div class="msg-from">${esc(msg.from||msg.group||'')}${src?`<span class="msg-source-badge">${src}</span>`:''}</div>
    <div class="msg-text" onclick="this.classList.toggle('expanded')">${esc(txt)}</div>
    ${hasBody?`<div class="msg-body-full" id="mb-${msg.id}">${esc(body)}</div>`:''}
    <div class="msg-actions">
      ${prio}
      ${hasBody?`<button class="btn-ghost" onclick="toggleBody('${msg.id}',this)">${IC.book}<span class="lbl">הרחב</span></button>`:''}
      <button class="btn-ghost" style="margin-right:auto" onclick="toggleRead('${msg.id}',this)">${IC.chk}<span class="lbl">${isRead(msg.id)?'לא נקרא':'סמן נקרא'}</span></button>
    </div>
  </div>
</div>`;
}

function toggleBody(id,btn) {
  const el=document.getElementById('mb-'+id);
  if (!el) return;
  const open=el.classList.toggle('open');
  btn.querySelector('.lbl').textContent=open?'הסתר':'הרחב';
}
function toggleRead(id,btn) {
  const now=!isRead(id); markRead(id,now);
  document.getElementById('mc-'+id)?.classList.toggle('is-unread',!now);
  btn.querySelector('.lbl').textContent=now?'לא נקרא':'סמן נקרא';
  updateBadge();
}

// ─── EVENT CARD ───────────────────────────────────────────────────────────────
function eventCard(ev, idx) {
  const c=kid(ev.child), bg=rgba(c.color,.13);
  const delay=Math.min((idx||0)*30,300);
  const added=addedCal()[ev.id];
  const link=calLink(ev);
  const hasExtra=(ev.description&&ev.description.trim())||(ev.location&&ev.location.trim());

  return `<div class="card card-animate" style="animation-delay:${delay}ms">
  <div class="card-strip" style="background:${c.color}"></div>
  <div class="card-body">
    <div class="item-title">${esc(ev.title)}</div>
    <div class="item-meta">
      <span class="child-pill-sm" style="background:${bg};color:${c.color}">${c.name}</span>
      <span class="meta-date">${IC.cal} ${fmtDateLabel(ev.date)}</span>
      ${fmtTime2(ev.date)!=='כל היום'?`<span class="meta-group">${fmtTime2(ev.date)}</span>`:''}
    </div>
    ${hasExtra?`<div class="event-extra" id="ee-${ev.id}">
      ${ev.location?`<div class="event-location">${IC.loc}${esc(ev.location)}</div>`:''}
      ${ev.description?`<div class="event-desc">${esc(ev.description)}</div>`:''}
    </div>`:''}
    <div class="msg-actions">
      <a class="btn-cal-add" href="${link}" target="_blank"
         onclick="trackCal('${ev.id}','${esc(link)}'); setTimeout(()=>renderCalendar(),600)">
        ${IC.add}הוסף ללוח שנה
      </a>
      ${added?`<button class="btn-cal-remove" onclick="doRemoveCal('${ev.id}','${esc(ev.htmlLink||link)}')">${IC.del}הסר</button>`:''}
      ${hasExtra?`<button class="btn-ghost" onclick="toggleExtra('${ev.id}',this)">${IC.info}<span class="lbl">פרטים</span></button>`:''}
    </div>
  </div>
</div>`;
}

function toggleExtra(id,btn) {
  const el=document.getElementById('ee-'+id);
  if (!el) return;
  const open=el.classList.toggle('open');
  btn.querySelector('.lbl').textContent=open?'סגור':'פרטים';
}
function doRemoveCal(id,link) {
  if (!confirm('להסיר מהמעקב?')) return;
  untrackCal(id); if(link) window.open(link,'_blank'); renderCalendar();
}

// ─── TASK CARD ────────────────────────────────────────────────────────────────
function taskCard(t, idx) {
  const c=kid(t.child||'all'), bg=rgba(c.color,.13);
  const done=isTaskDone(t.id), delay=Math.min(idx*30,300);
  return `<div class="task-card ${done?'done':''}" id="tc-${t.id}" style="animation-delay:${delay}ms">
  <div class="task-strip" style="background:${c.color}"></div>
  <div class="task-inner">
    <button class="task-check ${done?'checked':''}" onclick="toggleTask('${t.id}',this)">
      ${IC.chk}
    </button>
    <div class="task-info">
      <div class="task-title">${esc(t.title)}</div>
      <div class="task-meta">
        <span class="child-pill-sm" style="background:${bg};color:${c.color}">${c.name}</span>
        ${t.dueDate?`<span class="task-due">${IC.cal}${fmtDateLabel(t.dueDate)}</span>`:''}
        ${t.source?`<span class="task-src">${esc(t.source)}</span>`:''}
      </div>
    </div>
  </div>
</div>`;
}
function toggleTask(id,btn) {
  const done=!isTaskDone(id); setTaskDone(id,done);
  document.getElementById('tc-'+id)?.classList.toggle('done',done);
  btn.classList.toggle('checked',done);
}

// ─── EMPTY STATE ──────────────────────────────────────────────────────────────
function empty(icon,title,sub) {
  return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-title">${esc(title)}</div><div class="empty-sub">${esc(sub)}</div></div>`;
}

// ─── CUSTODY BANNER ───────────────────────────────────────────────────────────
function custodyBanner() {
  if (!DATA||!DATA.custody) return '';
  const c=DATA.custody;
  if (c.today&&c.current) {
    const end=c.current.end?fmtFull(c.current.end):'';
    return `<div class="custody-banner today"><div class="custody-text"><h3>ילדים אצלך היום 🏠</h3><p>עד ${end}</p></div><div class="custody-emoji">👨‍👧‍👦</div></div>`;
  }
  if (c.next) {
    return `<div class="custody-banner next"><div class="custody-text"><h3>הילדים מגיעים ${fmtDateLabel(c.next.start)}</h3><p>${fmtFull(c.next.start)}</p></div><div class="custody-emoji">🗓️</div></div>`;
  }
  return '';
}

// ─── RENDER FEED ──────────────────────────────────────────────────────────────
function renderFeed() {
  const el=document.getElementById('tab-feed');
  let msgs=(DATA.messages||[]).filter(shouldShow);
  if (activeFilter!=='all') msgs=msgs.filter(m=>m.child===activeFilter);
  const rinat=msgs.filter(m=>m.isRinat), normal=msgs.filter(m=>!m.isRinat);

  let html=custodyBanner();
  let idx=0;
  if (rinat.length) {
    html+=`<div class="rinat-zone"><div class="rinat-header"><div class="rinat-dot"></div>הודעות מרינת</div>${rinat.map(m=>msgCard(m,idx++)).join('')}</div>`;
  }
  if (!normal.length&&!rinat.length) html+=empty(IC.chat56,'אין הודעות עדיין','הודעות מבתי הספר יופיעו כאן');
  else html+=normal.map(m=>msgCard(m,idx++)).join('');
  el.innerHTML=html;
  updateBadge();
}

// ─── RENDER CALENDAR ──────────────────────────────────────────────────────────
function renderCalendar() {
  const panel=document.getElementById('tab-calendar');
  let events=(DATA.events||[]);
  if (activeFilter!=='all') events=events.filter(e=>e.child===activeFilter||e.child==='all');

  // mini grid
  const yr=calViewDate.getFullYear(), mo=calViewDate.getMonth();
  const firstDay=new Date(yr,mo,1).getDay();
  const daysInMo=new Date(yr,mo+1,0).getDate();
  const daysInPrev=new Date(yr,mo,0).getDate();
  const today=new Date();
  const evDates=new Set();
  events.forEach(e=>{ const d=new Date(e.date); if(d.getFullYear()===yr&&d.getMonth()===mo) evDates.add(d.getDate()); });

  let gridHtml='', total=Math.ceil((firstDay+daysInMo)/7)*7;
  for (let i=0;i<total;i++) {
    let d,other=false;
    if (i<firstDay) { d=daysInPrev-firstDay+i+1; other=true; }
    else if (i>=firstDay+daysInMo) { d=i-firstDay-daysInMo+1; other=true; }
    else d=i-firstDay+1;
    const isToday=!other&&yr===today.getFullYear()&&mo===today.getMonth()&&d===today.getDate();
    const hasEv=!other&&evDates.has(d);
    const isSel=calSelected&&!other&&yr===calSelected.yr&&mo===calSelected.mo&&d===calSelected.d;
    const cls=['cal-day',other?'other-month':'',isToday?'today':'',hasEv?'has-event':'',isSel?'selected':''].filter(Boolean).join(' ');
    gridHtml+=`<div class="${cls}"${other?'':` onclick="calSelectDay(${yr},${mo},${d})"`}>${d}</div>`;
  }

  // events list
  let listTitle='כל האירועים', listEvents=events;
  if (calSelected) {
    const {yr:sy,mo:sm,d:sd}=calSelected;
    listEvents=events.filter(e=>{ const dt=new Date(e.date); return dt.getFullYear()===sy&&dt.getMonth()===sm&&dt.getDate()===sd; });
    listTitle=`אירועים ל-${sd} ב${HE_MONTHS[sm]}`;
  }
  const sorted=[...listEvents].sort((a,b)=>new Date(a.date)-new Date(b.date));
  let evHtml=''; let idx=0;
  if (calSelected) {
    evHtml=sorted.length?sorted.map(e=>eventCard(e,idx++)).join(''):empty(IC.cal56,'אין אירועים ביום זה','');
  } else {
    for (const [,{label,items}] of groupByDate(sorted)) {
      evHtml+=divider(label)+items.map(e=>eventCard(e,idx++)).join('');
    }
    if (!evHtml) evHtml=empty(IC.cal56,'אין אירועים קרובים','אירועי לוח השנה יופיעו כאן');
  }

  panel.innerHTML=`
<div class="cal-grid-wrap">
  <div class="cal-nav">
    <button class="cal-nav-btn" onclick="calPrev()">‹</button>
    <span class="cal-month-title">${HE_MONTHS[mo]} ${yr}</span>
    <button class="cal-nav-btn" onclick="calNext()">›</button>
  </div>
  <div class="cal-days-hdr"><div>א׳</div><div>ב׳</div><div>ג׳</div><div>ד׳</div><div>ה׳</div><div>ו׳</div><div>ש׳</div></div>
  <div class="cal-days">${gridHtml}</div>
</div>
${divider(listTitle)}${evHtml}`;
}
function calSelectDay(yr,mo,d) { calSelected={yr,mo,d}; renderCalendar(); }
function calPrev() { calViewDate.setMonth(calViewDate.getMonth()-1); calSelected=null; renderCalendar(); }
function calNext() { calViewDate.setMonth(calViewDate.getMonth()+1); calSelected=null; renderCalendar(); }

// ─── RENDER TASKS ─────────────────────────────────────────────────────────────
function renderTasks() {
  const el=document.getElementById('tab-tasks');
  let tasks=(DATA.actions||[]);
  if (activeFilter!=='all') tasks=tasks.filter(t=>t.child===activeFilter||t.child==='all');
  if (!tasks.length) { el.innerHTML=empty(IC.task56,'אין משימות פתוחות','פעולות נדרשות יופיעו כאן'); return; }
  el.innerHTML=tasks.map((t,i)=>taskCard(t,i)).join('');
}

// ─── RENDER PINNED ────────────────────────────────────────────────────────────
function renderPinned() {
  const el=document.getElementById('tab-pinned');
  const pinned=(DATA.messages||[]).filter(m=>m.pinned);
  const btn=document.querySelector('[data-tab="pinned"]');
  btn.querySelector('.nav-badge')?.remove();
  if (pinned.length) btn.insertAdjacentHTML('beforeend',`<span class="nav-badge">${pinned.length}</span>`);
  el.innerHTML=pinned.length?pinned.map((m,i)=>msgCard(m,i)).join(''):empty(IC.pin56,'אין הודעות נעוצות','הודעות חשובות יופיעו כאן');
}

// ─── BADGE ────────────────────────────────────────────────────────────────────
function updateBadge() {
  const unread=(DATA.messages||[]).filter(shouldShow).filter(m=>!isRead(m.id)).length;
  const btn=document.querySelector('[data-tab="feed"]');
  btn.querySelector('.nav-badge')?.remove();
  if (unread>0) btn.insertAdjacentHTML('beforeend',`<span class="nav-badge">${unread}</span>`);
}

// ─── TAB SWITCHING ────────────────────────────────────────────────────────────
let activeTab='feed';
function switchTab(id) {
  if (id===activeTab) return;
  document.querySelector('.tab-panel.active')?.classList.remove('active');
  document.getElementById('tab-'+id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>{ const on=b.dataset.tab===id; b.classList.toggle('active',on); b.setAttribute('aria-selected',on); });
  activeTab=id;
  const bar=document.getElementById('filter-bar');
  bar.classList.toggle('visible',id==='feed'||id==='calendar'||id==='tasks');
  if (id==='calendar') renderCalendar();
}
document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)));

// ─── LOAD & REFRESH ───────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res=await fetch('./data.json?t='+Date.now());
    if (!res.ok) throw new Error('HTTP '+res.status);
    DATA=await res.json();
    const d=new Date(DATA.updated_at||0);
    document.getElementById('header-meta').textContent=DATA.updated_at?('עודכן '+fmtTime(DATA.updated_at)):'';
    buildFilterBar();
    document.getElementById('filter-bar').classList.add('visible');
    renderFeed(); renderCalendar(); renderTasks(); renderPinned();
  } catch(err) {
    console.error(err);
    document.getElementById('tab-feed').innerHTML=empty(IC.warn56,'שגיאה בטעינה',err.message);
    document.getElementById('header-meta').textContent='שגיאה';
  }
}
async function doRefresh() {
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning'); btn.disabled=true;
  await loadData();
  btn.classList.remove('spinning'); btn.disabled=false;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-panel').forEach(p=>p.innerHTML=skeleton(5));
loadData();
</script>
