<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FamilyOS</title>
<style>
:root {
  --ran:   #6366f1;
  --itai:  #10b981;
  --noga:  #f59e0b;
  --alon:  #f43f5e;
  --all:   #6b7280;
  --bg:    #0f172a;
  --card:  #1e293b;
  --card2: #263347;
  --border:#334155;
  --text:  #f1f5f9;
  --muted: #94a3b8;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  max-width: 430px;
  margin: 0 auto;
  overscroll-behavior: none;
}
/* ── Header ── */
.header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(15,23,42,0.95);
  backdrop-filter: blur(16px);
  padding: 12px 16px 8px;
  border-bottom: 1px solid var(--border);
}
.header-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.app-title { font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
.app-title span { color: #818cf8; }
.updated-info { font-size: 11px; color: var(--muted); text-align: center; }
.refresh-btn {
  background: none; border: 1px solid var(--border); border-radius: 20px;
  color: var(--muted); padding: 4px 10px; font-size: 12px; cursor: pointer;
  display: flex; align-items: center; gap: 4px; transition: all 0.2s;
}
.refresh-btn:hover { border-color: #818cf8; color: #818cf8; }
.refresh-btn.spinning .icon { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Filter chips ── */
.filter-row {
  display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: 2px solid transparent; transition: all 0.2s;
  background: var(--card); color: var(--muted);
}
.chip.active { color: #fff; }
.chip[data-child="all"].active  { background: #374151; border-color: #6b7280; }
.chip[data-child="ran"].active  { background: #4338ca; border-color: var(--ran); }
.chip[data-child="itai"].active { background: #065f46; border-color: var(--itai); }
.chip[data-child="noga"].active { background: #92400e; border-color: var(--noga); }
.chip[data-child="alon"].active { background: #9f1239; border-color: var(--alon); }

/* ── Bottom nav ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px; z-index: 50;
  background: rgba(15,23,42,0.97);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-bottom);
}
.nav-btn {
  flex: 1; padding: 10px 0; background: none; border: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  color: var(--muted); transition: color 0.2s; font-size: 10px;
}
.nav-btn .nav-icon { font-size: 20px; }
.nav-btn.active { color: #818cf8; }
.nav-btn:hover { color: var(--text); }

/* ── Screens ── */
.screen { display: none; padding: 12px 12px 88px; }
.screen.active { display: block; }

/* ── Custody banner ── */
.custody-banner {
  border-radius: 14px; padding: 14px 16px; margin-bottom: 14px;
  display: flex; align-items: center; justify-content: space-between;
}
.custody-banner.today { background: linear-gradient(135deg, #1e3a5f 0%, #1e4060 100%); border: 1px solid #3b82f6; }
.custody-banner.next  { background: var(--card); border: 1px solid var(--border); }
.custody-text h3 { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
.custody-text p  { font-size: 13px; color: var(--muted); }
.custody-icon { font-size: 32px; }

/* ── Section titles ── */
.section-title {
  font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.5px; margin: 16px 0 8px;
}

/* ── Message cards ── */
.msg-card {
  background: var(--card); border-radius: 14px; margin-bottom: 10px;
  border: 1px solid var(--border); overflow: hidden;
  transition: border-color 0.2s;
}
.msg-card.read { opacity: 0.6; }
.msg-card-header {
  padding: 12px 14px;
  display: flex; align-items: flex-start; gap: 10px;
}
.child-dot {
  width: 10px; height: 10px; border-radius: 50%;
  flex-shrink: 0; margin-top: 5px;
}
.msg-main { flex: 1; min-width: 0; }
.msg-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.msg-from { font-size: 12px; color: var(--muted); font-weight: 600; }
.msg-time { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
.msg-subject { font-size: 14px; font-weight: 600; margin: 3px 0; line-height: 1.3; }
.msg-preview { font-size: 12px; color: var(--muted); line-height: 1.4; overflow: hidden;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.msg-actions { display: flex; gap: 8px; align-items: center; padding: 0 14px 10px; }
.badge {
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
  text-transform: uppercase; letter-spacing: 0.3px;
}
.badge.urgent { background: #7f1d1d; color: #fca5a5; }
.badge.high   { background: #78350f; color: #fcd34d; }
.badge.normal { background: #1e293b; color: #94a3b8; }
.btn-expand {
  background: var(--card2); border: 1px solid var(--border); border-radius: 8px;
  color: var(--muted); padding: 4px 10px; font-size: 12px; cursor: pointer;
  display: flex; align-items: center; gap: 4px; transition: all 0.2s;
}
.btn-expand:hover { color: var(--text); border-color: #818cf8; }
.btn-read {
  margin-right: auto; background: none; border: none; color: var(--muted);
  font-size: 12px; cursor: pointer; padding: 4px 0;
}
.msg-body {
  display: none; padding: 0 14px 14px;
  font-size: 13px; color: #cbd5e1; line-height: 1.7;
  white-space: pre-wrap; word-break: break-word;
  border-top: 1px solid var(--border); padding-top: 12px; margin-top: 0;
  max-height: 400px; overflow-y: auto;
}
.msg-body.open { display: block; }
.msg-body.has-html { white-space: normal; }

/* ── Event cards ── */
.event-card {
  background: var(--card); border-radius: 12px; margin-bottom: 8px;
  border: 1px solid var(--border); overflow: hidden;
}
.event-header {
  padding: 10px 14px; display: flex; gap: 10px; align-items: flex-start;
}
.event-date-badge {
  background: var(--card2); border-radius: 8px;
  min-width: 44px; text-align: center; padding: 4px 6px;
  flex-shrink: 0;
}
.event-date-badge .day  { font-size: 18px; font-weight: 800; line-height: 1; }
.event-date-badge .mon  { font-size: 10px; color: var(--muted); font-weight: 600; }
.event-info { flex: 1; min-width: 0; }
.event-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.event-time  { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
.event-loc   { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
.event-actions { padding: 0 14px 10px; display: flex; gap: 8px; flex-wrap: wrap; }
.event-desc {
  display: none; padding: 8px 14px 12px;
  font-size: 12px; color: var(--muted); line-height: 1.6;
  border-top: 1px solid var(--border);
}
.event-desc.open { display: block; }
.btn-cal {
  background: #1d4ed8; color: #fff; border: none; border-radius: 8px;
  padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
  text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
  transition: background 0.2s;
}
.btn-cal:hover { background: #2563eb; }
.btn-remove {
  background: #7f1d1d; color: #fca5a5; border: none; border-radius: 8px;
  padding: 6px 12px; font-size: 12px; cursor: pointer; transition: background 0.2s;
}
.btn-remove:hover { background: #991b1b; }
.btn-sm {
  background: var(--card2); border: 1px solid var(--border); border-radius: 8px;
  color: var(--muted); padding: 4px 10px; font-size: 12px; cursor: pointer;
  transition: all 0.2s;
}
.btn-sm:hover { color: var(--text); }

/* ── Calendar grid ── */
.cal-grid-wrap { background: var(--card); border-radius: 14px; padding: 12px; margin-bottom: 14px; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cal-nav-btn { background: none; border: 1px solid var(--border); border-radius: 8px;
  color: var(--muted); padding: 4px 10px; cursor: pointer; font-size: 16px; }
.cal-month-title { font-size: 16px; font-weight: 700; }
.cal-days-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center;
  font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 6px; }
.cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-day {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; font-size: 12px; cursor: pointer; position: relative;
}
.cal-day.other-month { color: #374151; }
.cal-day.today { background: #1d4ed8; color: #fff; font-weight: 700; }
.cal-day.has-event::after {
  content: ''; position: absolute; bottom: 2px;
  width: 4px; height: 4px; border-radius: 50%; background: var(--noga);
}
.cal-day.selected { outline: 2px solid #818cf8; border-radius: 50%; }
.cal-day:hover:not(.today) { background: var(--card2); }

/* ── Tasks ── */
.task-card {
  background: var(--card); border-radius: 12px; margin-bottom: 8px;
  border: 1px solid var(--border); padding: 12px 14px;
  display: flex; align-items: flex-start; gap: 12px; transition: opacity 0.3s;
}
.task-card.done { opacity: 0.45; }
.task-check {
  width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border);
  cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; background: none;
}
.task-check.checked { background: var(--itai); border-color: var(--itai); color: #fff; }
.task-info { flex: 1; }
.task-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.task-meta  { font-size: 12px; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; }
.child-label {
  font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 8px;
}
.child-label.ran  { background: #1e1b4b; color: var(--ran); }
.child-label.itai { background: #022c22; color: var(--itai); }
.child-label.noga { background: #451a03; color: var(--noga); }
.child-label.alon { background: #4c0519; color: var(--alon); }
.child-label.all  { background: #111827; color: var(--muted); }

/* ── Messages screen group header ── */
.group-header {
  font-size: 13px; font-weight: 700; padding: 10px 4px 6px;
  display: flex; align-items: center; gap: 8px;
}
.group-dot { width: 8px; height: 8px; border-radius: 50%; }

/* ── Footer ── */
.data-footer {
  text-align: center; font-size: 11px; color: #475569; padding: 8px 16px;
  border-top: 1px solid var(--border); margin-top: 8px;
}

/* ── Empty state ── */
.empty { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty .icon { font-size: 40px; margin-bottom: 12px; }
.empty p { font-size: 14px; }

/* ── Animations ── */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.screen.active > * { animation: fadeIn 0.2s ease-out; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div class="app-title">Family<span>OS</span></div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="updated-info" id="updatedInfo">טוען...</div>
      <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">
        <span class="icon">🔄</span> רענן
      </button>
    </div>
  </div>
  <div class="filter-row" id="filterRow">
    <div class="chip active" data-child="all" onclick="setFilter('all')">הכל</div>
    <div class="chip" data-child="ran" onclick="setFilter('ran')" style="--c:var(--ran)">
      <span style="color:var(--ran)">●</span> רן
    </div>
    <div class="chip" data-child="itai" onclick="setFilter('itai')">
      <span style="color:var(--itai)">●</span> איתי
    </div>
    <div class="chip" data-child="noga" onclick="setFilter('noga')">
      <span style="color:var(--noga)">●</span> נוגה
    </div>
    <div class="chip" data-child="alon" onclick="setFilter('alon')">
      <span style="color:var(--alon)">●</span> אלון
    </div>
  </div>
</div>

<!-- Screens -->
<div id="screen-home" class="screen active">
  <div id="custodyBanner"></div>
  <div class="section-title">הודעות דחופות</div>
  <div id="homeMessages"></div>
  <div class="section-title">אירועים קרובים (7 ימים)</div>
  <div id="homeEvents"></div>
</div>

<div id="screen-calendar" class="screen">
  <div class="cal-grid-wrap">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calPrev()">›</button>
      <div class="cal-month-title" id="calMonthTitle"></div>
      <button class="cal-nav-btn" onclick="calNext()">‹</button>
    </div>
    <div class="cal-days-header">
      <div>א׳</div><div>ב׳</div><div>ג׳</div><div>ד׳</div><div>ה׳</div><div>ו׳</div><div>ש׳</div>
    </div>
    <div class="cal-days" id="calDays"></div>
  </div>
  <div class="section-title" id="calEventTitle">כל האירועים</div>
  <div id="calEvents"></div>
</div>

<div id="screen-tasks" class="screen">
  <div class="section-title">משימות ופעולות נדרשות</div>
  <div id="tasksList"></div>
</div>

<div id="screen-messages" class="screen">
  <div id="messagesList"></div>
</div>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <button class="nav-btn active" data-screen="home" onclick="switchScreen('home',this)">
    <span class="nav-icon">🏠</span>בית
  </button>
  <button class="nav-btn" data-screen="calendar" onclick="switchScreen('calendar',this)">
    <span class="nav-icon">📅</span>לוח שנה
  </button>
  <button class="nav-btn" data-screen="tasks" onclick="switchScreen('tasks',this)">
    <span class="nav-icon">✅</span>משימות
  </button>
  <button class="nav-btn" data-screen="messages" onclick="switchScreen('messages',this)">
    <span class="nav-icon">💬</span>הודעות
  </button>
</nav>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let appData = null;
let activeFilter = 'all';
let calViewDate = new Date();
let calSelectedDay = null;

const CHILD_COLORS = { ran:'#6366f1', itai:'#10b981', noga:'#f59e0b', alon:'#f43f5e', all:'#6b7280' };
const CHILD_NAMES  = { ran:'רן', itai:'איתי', noga:'נוגה', alon:'אלון', all:'הכל' };

const HE_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני',
                   'יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const HE_DAYS   = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const HE_SHORT  = ['א','ב','ג','ד','ה','ו','ש'];

// ── localStorage helpers ──────────────────────────────────────────────────────
function lsGet(key) { try { return JSON.parse(localStorage.getItem(key)) || {}; } catch { return {}; } }
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

function isRead(id) { return !!lsGet('familyos_read')[id]; }
function markRead(id, v=true) { const r = lsGet('familyos_read'); r[id]=v; lsSet('familyos_read',r); }
function isTaskDone(id) { return !!lsGet('familyos_tasks')[id]; }
function setTaskDone(id, v) { const t = lsGet('familyos_tasks'); t[id]=v; lsSet('familyos_tasks',t); }
function getAddedEvents() { return lsGet('familyos_cal_added'); }
function trackAddedEvent(id, link) { const e = getAddedEvents(); e[id]=link||true; lsSet('familyos_cal_added',e); }
function removeTrackedEvent(id) { const e = getAddedEvents(); delete e[id]; lsSet('familyos_cal_added',e); }

// ── Date formatting ───────────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    const day = HE_DAYS[d.getDay()];
    const dd = d.getDate();
    const mon = HE_MONTHS[d.getMonth()];
    const yr = d.getFullYear();
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    if (d.getHours() === 0 && d.getMinutes() === 0) return `יום ${day}, ${dd} ב${mon} ${yr}`;
    return `יום ${day}, ${dd} ב${mon} ${yr}, ${hh}:${mm}`;
  } catch { return iso; }
}

function fmtShort(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    if (isNaN(d)) return '';
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    const allDay = d.getHours() === 0 && d.getMinutes() === 0;
    const day = HE_DAYS[d.getDay()];
    const dd = d.getDate();
    const mon = HE_MONTHS[d.getMonth()];
    if (allDay) return `${dd} ב${mon}`;
    return `${dd} ב${mon}, ${hh}:${mm}`;
  } catch { return ''; }
}

function fmtDay(iso) {
  try { const d = new Date(iso); return d.getDate(); } catch { return ''; }
}
function fmtMon(iso) {
  try { const d = new Date(iso); return HE_MONTHS[d.getMonth()].slice(0,3); } catch { return ''; }
}
function fmtTime(iso) {
  try {
    const d = new Date(iso);
    if (d.getHours() === 0 && d.getMinutes() === 0) return 'כל היום';
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  } catch { return ''; }
}
function relativeDate(iso) {
  try {
    const d = new Date(iso);
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.round((new Date(d.getFullYear(),d.getMonth(),d.getDate()) - today) / 86400000);
    if (diff === 0) return 'היום';
    if (diff === 1) return 'מחר';
    if (diff < 7) return `בעוד ${diff} ימים`;
    return fmtShort(iso);
  } catch { return ''; }
}

// ── Body cleanup ──────────────────────────────────────────────────────────────
function cleanBody(body) {
  if (!body) return '';
  // detect HTML
  if (/<[a-z][\s\S]*>/i.test(body)) {
    const div = document.createElement('div');
    div.innerHTML = body;
    return div.textContent || div.innerText || '';
  }
  return body;
}

// ── Filter ────────────────────────────────────────────────────────────────────
function matchFilter(child) {
  if (activeFilter === 'all') return true;
  return child === activeFilter || child === 'all';
}
function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.child === f));
  renderAll();
}

// ── Screens ───────────────────────────────────────────────────────────────────
function switchScreen(name, btn) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'calendar') renderCalendar();
}

// ── Custody banner ────────────────────────────────────────────────────────────
function renderCustody() {
  const el = document.getElementById('custodyBanner');
  if (!appData) return;
  const c = appData.custody;
  if (c.today && c.current) {
    const end = c.current.end ? fmtShort(c.current.end) : '';
    el.innerHTML = `
      <div class="custody-banner today">
        <div class="custody-text">
          <h3>ילדים אצלך היום 🏠</h3>
          <p>עד ${end}</p>
        </div>
        <div class="custody-icon">👨‍👧‍👦</div>
      </div>`;
  } else if (c.next) {
    const next = relativeDate(c.next.start);
    el.innerHTML = `
      <div class="custody-banner next">
        <div class="custody-text">
          <h3>הילדים מגיעים ${next}</h3>
          <p>${fmtDate(c.next.start)}</p>
        </div>
        <div class="custody-icon">🗓️</div>
      </div>`;
  } else {
    el.innerHTML = '';
  }
}

// ── Message card HTML ─────────────────────────────────────────────────────────
function msgCardHTML(msg, compact=false) {
  const color = CHILD_COLORS[msg.child] || '#6b7280';
  const body  = cleanBody(msg.body);
  const preview = body.length > 80 ? body.slice(0,80) + '…' : body;
  const readClass = isRead(msg.id) ? 'read' : '';
  const badgeClass = msg.priority === 'urgent' ? 'urgent' : msg.priority === 'high' ? 'high' : 'normal';
  const badgeText  = msg.priority === 'urgent' ? 'דחוף' : msg.priority === 'high' ? 'חשוב' : '';

  return `
<div class="msg-card ${readClass}" id="msgcard-${msg.id}">
  <div class="msg-card-header">
    <div class="child-dot" style="background:${color}"></div>
    <div class="msg-main">
      <div class="msg-top">
        <span class="msg-from">${esc(msg.from)}</span>
        <span class="msg-time">${fmtShort(msg.time)}</span>
      </div>
      <div class="msg-subject">${esc(msg.text)}</div>
      ${preview ? `<div class="msg-preview">${esc(preview)}</div>` : ''}
    </div>
  </div>
  <div class="msg-actions">
    ${badgeText ? `<span class="badge ${badgeClass}">${badgeText}</span>` : ''}
    ${body.length > 10 ? `<button class="btn-expand" onclick="toggleBody('${msg.id}', this)">
      <span>📖</span> <span class="expand-label">הרחב</span>
    </button>` : ''}
    <button class="btn-read" onclick="toggleRead('${msg.id}', this)">
      ${isRead(msg.id) ? '○ לא נקרא' : '✓ נקרא'}
    </button>
  </div>
  <div class="msg-body" id="msgbody-${msg.id}">${esc(body)}</div>
</div>`;
}

function toggleBody(id, btn) {
  const bodyEl = document.getElementById('msgbody-' + id);
  const open = bodyEl.classList.toggle('open');
  btn.querySelector('.expand-label').textContent = open ? 'סגור' : 'הרחב';
}

function toggleRead(id, btn) {
  const isNowRead = !isRead(id);
  markRead(id, isNowRead);
  const card = document.getElementById('msgcard-' + id);
  if (card) card.classList.toggle('read', isNowRead);
  btn.textContent = isNowRead ? '○ לא נקרא' : '✓ נקרא';
}

// ── Event card HTML ───────────────────────────────────────────────────────────
function eventCardHTML(ev) {
  const color = CHILD_COLORS[ev.child] || '#6b7280';
  const added = getAddedEvents()[ev.id];
  const hasDesc = ev.description && ev.description.trim().length > 0;

  // Build Google Calendar deeplink
  const startDt = ev.date ? new Date(ev.date) : null;
  const endDt   = ev.endDate ? new Date(ev.endDate) : startDt;
  let calLink = '#';
  if (startDt && !isNaN(startDt)) {
    const fmt = d => {
      if (!d || isNaN(d)) return '';
      // all-day if time is midnight and it's a date-only event
      const isAllDay = d.getHours()===0 && d.getMinutes()===0 && ev.date && !ev.date.includes('T');
      if (isAllDay) {
        return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
      }
      return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;
    };
    const s = fmt(startDt);
    const e = endDt && !isNaN(endDt) ? fmt(endDt) : s;
    const params = new URLSearchParams({
      action: 'TEMPLATE',
      text: ev.title,
      dates: s + '/' + e,
    });
    if (ev.description) params.set('details', ev.description);
    if (ev.location) params.set('location', ev.location);
    calLink = 'https://calendar.google.com/calendar/render?' + params.toString();
  }

  return `
<div class="event-card">
  <div class="event-header">
    <div class="event-date-badge" style="border-left:3px solid ${color}">
      <div class="day">${fmtDay(ev.date)}</div>
      <div class="mon">${fmtMon(ev.date)}</div>
    </div>
    <div class="event-info">
      <div class="event-title">${esc(ev.title)}</div>
      <div class="event-time">${fmtTime(ev.date)}</div>
      ${ev.location ? `<div class="event-loc">📍 ${esc(ev.location)}</div>` : ''}
    </div>
  </div>
  <div class="event-actions">
    <a class="btn-cal" href="${calLink}" target="_blank" 
       onclick="trackAddedEvent('${ev.id}', '${(ev.htmlLink||'').replace(/'/g,"\\'")}'); setTimeout(()=>renderAll(),500)">
      📅 הוסף ללוח שנה
    </a>
    ${added ? `<button class="btn-remove" onclick="removeEvent('${ev.id}', '${(ev.htmlLink||'').replace(/'/g,"\\'")}')">🗑️ הסר</button>` : ''}
    ${hasDesc ? `<button class="btn-sm" onclick="toggleDesc('${ev.id}', this)">📄 פרטים</button>` : ''}
  </div>
  ${hasDesc ? `<div class="event-desc" id="evdesc-${ev.id}">${esc(ev.description)}</div>` : ''}
</div>`;
}

function toggleDesc(id, btn) {
  const el = document.getElementById('evdesc-' + id);
  if (el) {
    const open = el.classList.toggle('open');
    btn.textContent = open ? '🔼 סגור' : '📄 פרטים';
  }
}

function removeEvent(id, link) {
  if (!confirm('להסיר אירוע זה מהמעקב?')) return;
  removeTrackedEvent(id);
  if (link) window.open(link, '_blank');
  renderAll();
}

// ── Home screen ───────────────────────────────────────────────────────────────
function renderHome() {
  renderCustody();

  const msgs = (appData.messages || [])
    .filter(m => matchFilter(m.child))
    .filter(m => m.pinned || m.priority === 'urgent' || m.priority === 'high');

  const msgEl = document.getElementById('homeMessages');
  if (msgs.length === 0) {
    msgEl.innerHTML = '<div class="empty"><div class="icon">📭</div><p>אין הודעות דחופות</p></div>';
  } else {
    msgEl.innerHTML = msgs.slice(0,5).map(m => msgCardHTML(m)).join('');
  }

  const now = new Date();
  const in7 = new Date(now.getTime() + 7*24*3600*1000);
  const evts = (appData.events || [])
    .filter(e => matchFilter(e.child))
    .filter(e => {
      try {
        const d = new Date(e.date);
        return d >= now && d <= in7;
      } catch { return false; }
    })
    .sort((a,b) => new Date(a.date) - new Date(b.date));

  const evEl = document.getElementById('homeEvents');
  if (evts.length === 0) {
    evEl.innerHTML = '<div class="empty"><div class="icon">📅</div><p>אין אירועים בשבוע הקרוב</p></div>';
  } else {
    evEl.innerHTML = evts.map(e => eventCardHTML(e)).join('');
  }
}

// ── Calendar ──────────────────────────────────────────────────────────────────
function renderCalendar() {
  const yr = calViewDate.getFullYear();
  const mo = calViewDate.getMonth();
  document.getElementById('calMonthTitle').textContent = HE_MONTHS[mo] + ' ' + yr;

  // build grid
  const firstDay = new Date(yr, mo, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(yr, mo+1, 0).getDate();
  const daysInPrev = new Date(yr, mo, 0).getDate();
  const today = new Date();

  // get event dates for this month
  const eventDates = new Set();
  if (appData) {
    (appData.events || []).filter(e => matchFilter(e.child)).forEach(e => {
      try {
        const d = new Date(e.date);
        if (d.getFullYear() === yr && d.getMonth() === mo) {
          eventDates.add(d.getDate());
        }
      } catch {}
    });
  }

  let html = '';
  const total = Math.ceil((firstDay + daysInMonth) / 7) * 7;
  for (let i = 0; i < total; i++) {
    let d, isOther = false;
    if (i < firstDay) { d = daysInPrev - firstDay + i + 1; isOther = true; }
    else if (i >= firstDay + daysInMonth) { d = i - firstDay - daysInMonth + 1; isOther = true; }
    else { d = i - firstDay + 1; }

    const isToday = !isOther && yr === today.getFullYear() && mo === today.getMonth() && d === today.getDate();
    const hasEv = !isOther && eventDates.has(d);
    const isSelected = calSelectedDay && !isOther && yr === calSelectedDay.yr && mo === calSelectedDay.mo && d === calSelectedDay.d;
    const classes = ['cal-day', isOther?'other-month':'', isToday?'today':'', hasEv?'has-event':'', isSelected?'selected':''].filter(Boolean).join(' ');
    const click = isOther ? '' : `onclick="calSelectDay(${yr},${mo},${d})"`;
    html += `<div class="${classes}" ${click}>${d}</div>`;
  }
  document.getElementById('calDays').innerHTML = html;

  // render events
  renderCalEvents();
}

function calSelectDay(yr, mo, d) {
  calSelectedDay = { yr, mo, d };
  renderCalendar();
}

function calPrev() { calViewDate.setMonth(calViewDate.getMonth()-1); renderCalendar(); }
function calNext() { calViewDate.setMonth(calViewDate.getMonth()+1); renderCalendar(); }

function renderCalEvents() {
  if (!appData) return;
  let evts = (appData.events || []).filter(e => matchFilter(e.child));

  const title = document.getElementById('calEventTitle');
  if (calSelectedDay) {
    const {yr,mo,d} = calSelectedDay;
    evts = evts.filter(e => {
      try {
        const dt = new Date(e.date);
        return dt.getFullYear()===yr && dt.getMonth()===mo && dt.getDate()===d;
      } catch { return false; }
    });
    title.textContent = `אירועים ל-${d} ב${HE_MONTHS[mo]}`;
  } else {
    evts = evts.sort((a,b) => new Date(a.date)-new Date(b.date));
    title.textContent = 'כל האירועים';
  }

  const el = document.getElementById('calEvents');
  if (evts.length === 0) {
    el.innerHTML = '<div class="empty"><div class="icon">📅</div><p>אין אירועים</p></div>';
  } else {
    el.innerHTML = evts.map(e => eventCardHTML(e)).join('');
  }
}

// ── Tasks ─────────────────────────────────────────────────────────────────────
function renderTasks() {
  const tasks = (appData.actions || []).filter(t => matchFilter(t.child));
  const el = document.getElementById('tasksList');
  if (tasks.length === 0) {
    el.innerHTML = '<div class="empty"><div class="icon">✅</div><p>אין משימות פתוחות</p></div>';
    return;
  }
  el.innerHTML = tasks.map(t => {
    const done = isTaskDone(t.id);
    const color = CHILD_COLORS[t.child] || '#6b7280';
    const child = t.child || 'all';
    return `
<div class="task-card ${done?'done':''}" id="task-${t.id}">
  <button class="task-check ${done?'checked':''}" onclick="toggleTask('${t.id}', this)">
    ${done ? '✓' : ''}
  </button>
  <div class="task-info">
    <div class="task-title">${esc(t.title)}</div>
    <div class="task-meta">
      <span class="child-label ${child}">${CHILD_NAMES[child]||child}</span>
      ${t.dueDate ? `<span>📅 ${fmtShort(t.dueDate)}</span>` : ''}
      ${t.source ? `<span>📌 ${esc(t.source)}</span>` : ''}
    </div>
  </div>
</div>`;
  }).join('');
}

function toggleTask(id, btn) {
  const done = !isTaskDone(id);
  setTaskDone(id, done);
  const card = document.getElementById('task-' + id);
  if (card) card.classList.toggle('done', done);
  btn.classList.toggle('checked', done);
  btn.textContent = done ? '✓' : '';
}

// ── Messages screen ───────────────────────────────────────────────────────────
function renderMessages() {
  const msgs = (appData.messages || []).filter(m => matchFilter(m.child));
  const el = document.getElementById('messagesList');
  if (msgs.length === 0) {
    el.innerHTML = '<div class="empty"><div class="icon">📭</div><p>אין הודעות</p></div>';
    return;
  }

  // group by child
  const groups = {};
  msgs.forEach(m => {
    const k = m.child || 'all';
    if (!groups[k]) groups[k] = [];
    groups[k].push(m);
  });

  const order = ['ran','itai','noga','alon','all'];
  let html = '';
  for (const child of order) {
    if (!groups[child]) continue;
    const color = CHILD_COLORS[child];
    const name = CHILD_NAMES[child];
    html += `<div class="group-header">
      <div class="group-dot" style="background:${color}"></div>
      ${name}
    </div>`;
    html += groups[child].map(m => msgCardHTML(m)).join('');
  }
  el.innerHTML = html;
}

// ── Footer ────────────────────────────────────────────────────────────────────
function renderFooter() {
  if (!appData) return;
  const d = new Date(appData.updated_at);
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yy = d.getFullYear();
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  document.getElementById('updatedInfo').textContent =
    `עודכן: ${dd}/${mm}/${yy} ${hh}:${mi} | ${appData.messages.length} הודעות | ${appData.events.length} אירועים`;
}

// ── Main render ───────────────────────────────────────────────────────────────
function renderAll() {
  if (!appData) return;
  renderHome();
  renderTasks();
  renderMessages();
  renderCalendar();
}

// ── Data loading ──────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const ts = Date.now();
    const res = await fetch(`./data.json?t=${ts}`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    appData = await res.json();
    renderFooter();
    renderAll();
  } catch(e) {
    console.error('Failed to load data.json:', e);
    document.getElementById('updatedInfo').textContent = 'שגיאה בטעינה';
  }
}

async function refreshData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  btn.disabled = true;
  await loadData();
  btn.classList.remove('spinning');
  btn.disabled = false;
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}
function pad(n) { return String(n).padStart(2,'0'); }

// ── Init ──────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
