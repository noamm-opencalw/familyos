<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#F8F9FA" />
  <title>FamilyOS</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    /* ── WCAG: Base font on html so rem units cascade correctly ── */
    html { font-size: 18px; }

    /* ── STEP 1: Design Tokens (Stitch Light) ── */
    :root {
      /* Core palette */
      --bg:          #F8F9FA;
      --surface:     #FFFFFF;
      --surface-2:   #F3F4F6;
      --surface-3:   #E9EAEC;
      --surface-hover: #F0F1F3;
      --border:      rgba(0,0,0,0.07);
      --border-hi:   rgba(0,0,0,0.13);
      --text-1:      #1F2937;
      --text-2:      #595959;
      --text-3:      #9CA3AF;
      --accent:      #4A90E2;
      --accent-dim:  rgba(74,144,226,0.10);
      /* Children colours — kept vivid for identity */
      --ran:   #6366f1;
      --itai:  #10b981;
      --noga:  #f59e0b;
      --alon:  #f43f5e;
      --rinat: #ef4444;
      --all:   #6B7280;
      /* Layout — larger nav for 48px touch targets */
      --nav-h:      72px;
      --header-h:   64px;
      --safe-b:     env(safe-area-inset-bottom, 0px);
      --safe-t:     env(safe-area-inset-top, 0px);
      --radius-card: 16px;
      --radius-pill: 20px;
      --shadow-card: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.04);
      --shadow-card-hi: 0 8px 16px -4px rgba(0,0,0,0.10), 0 4px 6px -2px rgba(0,0,0,0.06);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* ── STEP 1: Typography + RTL ── */
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Rubik', 'Heebo', system-ui, -apple-system, sans-serif;
      font-size: 1rem;        /* 18px base */
      line-height: 1.6;       /* WCAG readability */
      background: #E5E7EB;
      color: var(--text-1);
      word-wrap: break-word;  /* graceful text wrap */
      overflow-wrap: break-word;
      direction: rtl;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── STEP 2: Mobile-first container ── */
    #app {
      display: flex; flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg);
      position: relative; overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.15);
    }

    /* ── STEP 2: Header ── */
    .app-header {
      height: calc(var(--header-h) + var(--safe-t));
      padding-top: var(--safe-t);
      display: flex; align-items: center; justify-content: space-between;
      padding-inline: 20px; flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: relative; z-index: 20;
    }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-logo {
      font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px;
      color: var(--accent);
    }
    .header-pulse {
      width: 7px; height: 7px; background: #10b981; border-radius: 50%;
      box-shadow: 0 0 6px rgba(16,185,129,0.5);
      animation: pulse-glow 3s ease-in-out infinite; flex-shrink: 0;
    }
    @keyframes pulse-glow {
      0%,100% { opacity:1; box-shadow:0 0 6px rgba(16,185,129,0.5); }
      50%      { opacity:.4; box-shadow:0 0 3px rgba(16,185,129,0.2); }
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .header-meta { font-size: 0.75rem; color: var(--text-3); }
    .btn-refresh {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-2); transition: all .2s; flex-shrink: 0;
    }
    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }
    .btn-refresh.spinning svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── STEP 3: Filter Bar — smooth horizontal scroll ── */
    .filter-bar {
      display: none; flex-shrink: 0;
      padding: 10px 16px; gap: 8px;
      overflow-x: auto; scrollbar-width: none;
      background: var(--surface); border-bottom: 1px solid var(--border);
      /* smooth momentum scroll on iOS */
      -webkit-overflow-scrolling: touch;
      /* fade edges to hint scroll */
      mask-image: linear-gradient(to left, transparent 0, #000 24px, #000 calc(100% - 24px), transparent 100%);
      -webkit-mask-image: linear-gradient(to left, transparent 0, #000 24px, #000 calc(100% - 24px), transparent 100%);
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-bar.visible { display: flex; }

    .filter-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 0.55rem 1rem; border-radius: var(--radius-pill);
      border: 1.5px solid var(--border); background: var(--surface-2);
      color: var(--text-2); font-family: inherit; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: all 0.2s cubic-bezier(0.22,1,0.36,1); min-height: 48px;
    }
    .filter-chip .chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; transition: transform .2s cubic-bezier(.34,1.56,.64,1); }
    .filter-chip:active { transform: scale(0.95); }
    .filter-chip.active {
      border-color: var(--chip-color, var(--accent));
      background: var(--chip-bg, var(--accent-dim));
      color: var(--text-1);
      box-shadow: 0 2px 8px var(--chip-glow, rgba(74,144,226,0.15));
    }
    .filter-chip.active .chip-dot { transform: scale(1.2); }

    /* ── STEP 2+3: Tab Area + whitespace ── */
    .tab-area { flex: 1; overflow: hidden; position: relative; background: var(--bg); }
    .tab-panel {
      display: none; height: 100%; overflow-y: auto;
      padding: 1.2rem 0.9rem calc(1.5rem + var(--nav-h) + var(--safe-b));
      -webkit-overflow-scrolling: touch; overscroll-behavior: contain; scrollbar-width: none;
    }
    .tab-panel::-webkit-scrollbar { display: none; }
    .tab-panel.active { display: block; animation: panelIn 0.25s cubic-bezier(0.22,1,0.36,1) forwards; }
    @keyframes panelIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* ── STEP 2: Bottom Navigation ── */
    .bottom-nav {
      flex-shrink: 0;
      height: calc(var(--nav-h) + var(--safe-b));
      padding-bottom: var(--safe-b);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; z-index: 100;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
      background: none; border: none; cursor: pointer; color: var(--text-3); padding: 0.5rem 0; position: relative;
      transition: color .2s ease;
      -webkit-user-select: none; user-select: none; min-height: 72px; min-width: 48px;
    }
    .nav-btn:active { transform: scale(0.92); }
    .nav-btn.active { color: var(--accent); }
    /* active indicator: filled pill behind icon */
    .nav-pip {
      position: absolute; top: 8px;
      width: 48px; height: 32px;
      background: var(--accent-dim);
      border-radius: 16px;
      transform: scaleX(0); opacity: 0;
      transition: transform .25s cubic-bezier(.34,1.56,.64,1), opacity .2s;
    }
    .nav-btn.active .nav-pip { transform: scaleX(1); opacity: 1; }
    .nav-icon { width: 28px; height: 28px; position: relative; z-index: 1; transition: transform .2s cubic-bezier(.34,1.56,.64,1); }
    .nav-btn.active .nav-icon { transform: scale(1.08) translateY(-1px); }
    .nav-label { font-size: 0.72rem; font-weight: 700; letter-spacing: .01em; position: relative; z-index: 1; }
    .nav-badge {
      position: absolute; top: 6px; left: calc(50% + 9px);
      background: var(--rinat); color: #fff; font-size: 0.6rem; font-weight: 700;
      min-width: 20px; height: 20px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px; border: 2px solid var(--surface); line-height: 1;
      pointer-events: none; box-shadow: 0 2px 6px rgba(239,68,68,.3);
    }

    /* ── STEP 3: Cards — ample whitespace ── */
    .card {
      background: var(--surface); border-radius: var(--radius-card);
      border: 1px solid var(--border); margin-bottom: 12px;
      display: flex; align-items: stretch; overflow: hidden;
      transition: transform .15s cubic-bezier(.22,1,.36,1), box-shadow .15s ease;
      box-shadow: var(--shadow-card);
    }
    .card:active { transform: scale(0.985); box-shadow: var(--shadow-card-hi); }
    .card.is-unread { background: #F0F5FF; border-color: rgba(74,144,226,0.18); box-shadow: var(--shadow-card-hi); }
    .card-strip { width: 4px; flex-shrink: 0; border-radius: 0 4px 4px 0; }
    .card-body { flex: 1; padding: 1rem 1.1rem; min-width: 0; }

    /* ── MESSAGE CARD ── */
    .msg-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 0.4rem; }
    .msg-pills { display: flex; align-items: center; gap: 7px; flex: 1; min-width: 0; flex-wrap: wrap; }
    .child-pill { font-size: 0.78rem; font-weight: 700; padding: 0.25rem 0.75rem; border-radius: var(--radius-pill); flex-shrink: 0; }
    .pin-tag { display: flex; align-items: center; gap: 3px; font-size: 0.72rem; font-weight: 600; flex-shrink: 0; opacity: .7; }
    .dot-unread { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 6px currentColor; }
    .msg-time { font-size: 0.75rem; color: var(--text-3); flex-shrink: 0; font-weight: 500; font-variant-numeric: tabular-nums; }
    .msg-from {
      font-size: 0.9rem; color: var(--text-2); margin-bottom: 0.2rem;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      display: flex; align-items: center; gap: 6px;
      max-width: 100%; font-weight: 700;
    }
    .msg-datetime {
      font-size: 0.72rem; color: var(--text-3); margin-bottom: 0.5rem;
      font-weight: 500; letter-spacing: .01em; line-height: 1.4;
    }
    .msg-source-badge {
      font-size: 0.65rem; font-weight: 700; color: var(--text-3);
      background: var(--surface-2); border: 1px solid var(--border);
      padding: 0.15rem 0.45rem; border-radius: 8px; flex-shrink: 0;
      display: inline-flex; align-items: center; gap: 3px;
    }
    .msg-source-badge.wa    { background: #E8F5E9; color: #2E7D32; border-color: #A5D6A7; }
    .msg-source-badge.email { background: #E3F2FD; color: #1565C0; border-color: #90CAF9; }

    /* ── Main message text — large, readable ── */
    .msg-text {
      font-size: 1rem; color: var(--text-1); line-height: 1.65;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
      word-wrap: break-word; overflow-wrap: break-word;
      transition: max-height 0.3s ease;
    }
    .card.is-unread .msg-text { font-weight: 600; color: var(--text-1); }
    .msg-text.expanded { -webkit-line-clamp: unset; display: block; }

    /* full body expand */
    .msg-body-full {
      display: none; margin-top: 0.7rem;
      font-size: 0.9rem; color: var(--text-2); line-height: 1.8;
      white-space: pre-wrap; word-break: break-word; overflow-wrap: break-word;
      background: var(--surface-2); border-radius: 10px;
      padding: 0.7rem 0.85rem; max-height: 380px; overflow-y: auto;
    }
    .msg-body-full.open { display: block; }

    /* ── EXPAND BUTTON ── */
    .expand-btn {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 6px; padding: 4px 10px; border-radius: 8px;
      font-family: inherit; font-size: 0.78rem; font-weight: 700;
      color: var(--accent); background: var(--accent-dim);
      border: none; cursor: pointer; transition: all .15s;
      line-height: 1;
    }
    .expand-btn:hover { background: rgba(74,144,226,0.18); }
    .expand-btn .expand-arrow {
      display: inline-block; transition: transform .25s cubic-bezier(.34,1.56,.64,1);
      font-size: 0.7rem;
    }
    .expand-btn.open .expand-arrow { transform: rotate(180deg); }

    /* ── CATEGORY BADGE ── */
    .cat-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.72rem; font-weight: 700;
      padding: 0.2rem 0.55rem; border-radius: 8px;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text-2); flex-shrink: 0;
    }
    .cat-badge.school  { background: #EFF6FF; color: #1D4ED8; border-color: #BFDBFE; }
    .cat-badge.payment { background: #F0FDF4; color: #15803D; border-color: #BBF7D0; }
    .cat-badge.medical { background: #FFF1F2; color: #BE123C; border-color: #FECDD3; }
    .cat-badge.sport   { background: #FFF7ED; color: #C2410C; border-color: #FED7AA; }
    .cat-badge.trip    { background: #F5F3FF; color: #6D28D9; border-color: #DDD6FE; }
    .cat-badge.other   { background: var(--surface-2); color: var(--text-3); border-color: var(--border); }

    /* action row — 48px touch targets */
    .msg-actions {
      display: flex; align-items: center; gap: 8px; margin-top: 0.75rem; flex-wrap: wrap;
    }
    .btn-ghost {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0.6rem 1rem; border-radius: 10px; font-family: inherit;
      font-size: 0.8rem; font-weight: 600; cursor: pointer; min-height: 44px;
      border: 1px solid var(--border); background: var(--surface-2);
      color: var(--text-2); transition: all .2s;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .btn-ghost svg { width: 15px; height: 15px; }

    /* ── PRIORITY BADGE ── */
    .priority-badge {
      font-size: 0.7rem; font-weight: 700; padding: 0.25rem 0.6rem; border-radius: 8px;
      letter-spacing: .3px; text-transform: uppercase; flex-shrink: 0;
    }
    .priority-badge.urgent { background: #FEE2E2; color: #DC2626; border: 1px solid #FCA5A5; }
    .priority-badge.high   { background: #FEF3C7; color: #D97706; border: 1px solid #FCD34D; }

    /* ── RINAT ZONE ── */
    .rinat-zone {
      background: #FFF5F5;
      border: 1.5px solid #FCA5A5;
      border-radius: 18px; padding: 12px; margin-bottom: 12px;
      position: sticky; top: 0; z-index: 5;
      box-shadow: 0 4px 12px rgba(239,68,68,.08);
    }
    .rinat-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 0.82rem; font-weight: 700; color: #f87171; }
    .rinat-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 0 0 rgba(239,68,68,.5); animation: rinat-pulse 2s ease-in-out infinite; flex-shrink: 0; }
    @keyframes rinat-pulse { 0% { box-shadow:0 0 0 0 rgba(239,68,68,.5); } 70% { box-shadow:0 0 0 10px rgba(239,68,68,0); } 100% { box-shadow:0 0 0 0 rgba(239,68,68,0); } }
    .rinat-zone .card { margin-bottom: 6px; background: #fff; border-color: #FCA5A5; }
    .rinat-zone .card:last-child { margin-bottom: 0; }

    /* ── STEP 3: Divider — generous whitespace ── */
    .divider { display: flex; align-items: center; gap: 10px; margin: 1.6rem 0 0.9rem; font-size: 0.7rem; font-weight: 700; color: var(--text-3); letter-spacing: .08em; text-transform: uppercase; }
    .divider:first-child { margin-top: 0; }
    .divider-line { flex: 1; height: 1px; background: var(--border); }

    /* ── EVENT CARD ── */
    /* ── STEP 3: Event/academic item — 2-line clamp ── */
    .item-title {
      font-size: 0.95rem; font-weight: 600; color: var(--text-1); margin-bottom: 0.5rem; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      word-wrap: break-word; overflow-wrap: break-word;
    }
    .item-meta  { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .child-pill-sm { font-size: 0.72rem; font-weight: 700; padding: 0.2rem 0.6rem; border-radius: var(--radius-pill); flex-shrink: 0; }
    .meta-date  { font-size: 0.75rem; color: var(--text-3); display: flex; align-items: center; gap: 4px; }
    .meta-date svg { width: 14px; height: 14px; opacity: .5; }
    .meta-group { font-size: 0.72rem; color: var(--text-3); background: var(--surface-3); padding: 0.2rem 0.6rem; border-radius: var(--radius-pill); }
    .type-badge { font-size: 0.72rem; font-weight: 600; color: var(--text-2); background: var(--surface-3); border: 1px solid var(--border); padding: 0.2rem 0.6rem; border-radius: var(--radius-pill); }

    /* event extra info (expand) */
    .event-extra { display: none; margin-top: 0.7rem; border-top: 1px solid var(--border); padding-top: 0.7rem; }
    .event-extra.open { display: block; }
    .event-location { font-size: 0.78rem; color: var(--text-3); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 5px; }
    .event-location svg { width: 14px; height: 14px; flex-shrink: 0; opacity: .6; }
    .event-desc { font-size: 0.82rem; color: var(--text-2); line-height: 1.7; white-space: pre-wrap; word-wrap: break-word; }

    /* calendar action buttons — 44px min touch target */
    .btn-cal-add {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0.55rem 1rem; border-radius: 9px; font-family: inherit;
      font-size: 0.8rem; font-weight: 700; cursor: pointer; text-decoration: none; min-height: 44px;
      background: var(--accent); color: #fff;
      border: none; transition: all .2s; box-shadow: 0 2px 6px rgba(74,144,226,.3);
    }
    .btn-cal-add svg { width: 15px; height: 15px; }
    .btn-cal-add:hover { background: #3a7fd5; box-shadow: 0 4px 10px rgba(74,144,226,.4); }
    .btn-cal-remove {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0.55rem 0.8rem; border-radius: 9px; font-family: inherit;
      font-size: 0.8rem; font-weight: 700; cursor: pointer; min-height: 44px;
      background: #FEE2E2; color: #DC2626;
      border: 1px solid #FCA5A5; transition: all .2s;
    }
    .btn-cal-remove svg { width: 15px; height: 15px; }
    .btn-cal-remove:hover { background: #FCA5A5; }

    /* ── STEP 3: Tasks — whitespace ── */
    .task-card {
      background: var(--surface); border-radius: var(--radius-card);
      border: 1px solid var(--border); margin-bottom: 12px;
      display: flex; align-items: flex-start; overflow: hidden;
      box-shadow: var(--shadow-card); transition: opacity .3s;
    }
    .task-card.done { opacity: .4; }
    .task-strip { width: 4px; flex-shrink: 0; border-radius: 0 4px 4px 0; align-self: stretch; }
    .task-inner { flex: 1; padding: 1rem 1.1rem; display: flex; gap: 1rem; align-items: flex-start; }
    .task-check {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid var(--border-hi); background: none; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; transition: all .2s;
      margin-top: 2px; /* WCAG 2.5.5 — large enough touch target */
    }
    .task-check svg { width: 16px; height: 16px; display: none; }
    .task-check.checked { background: var(--itai); border-color: var(--itai); color: #fff; }
    .task-check.checked svg { display: block; }
    .task-info { flex: 1; min-width: 0; }
    .task-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.45rem; line-height: 1.5; color: var(--text-1); word-wrap: break-word; }
    .task-meta  { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .task-due   { font-size: 0.78rem; color: var(--text-3); display: flex; align-items: center; gap: 4px; }
    .task-due svg { width: 14px; height: 14px; opacity: .5; }
    .task-src   { font-size: 0.7rem; color: var(--text-3); background: var(--surface-2); border: 1px solid var(--border); padding: 0.2rem 0.6rem; border-radius: var(--radius-pill); }

    /* ── CALENDAR GRID ── */
    .cal-grid-wrap { background: var(--surface); border-radius: var(--radius-card); padding: 1rem; margin-bottom: 1rem; border: 1px solid var(--border); box-shadow: var(--shadow-card); }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.8rem; }
    .cal-nav-btn {
      width: 48px; height: 48px; border-radius: 10px;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text-2); cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center; transition: all .2s;
    }
    .cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .cal-month-title { font-size: 1.05rem; font-weight: 800; color: var(--text-1); }
    .cal-days-hdr { display: grid; grid-template-columns: repeat(7,1fr); text-align: center; font-size: 0.72rem; color: var(--text-3); font-weight: 700; margin-bottom: 6px; }
    .cal-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.82rem; cursor: pointer; position: relative; transition: background .15s; color: var(--text-1); min-height: 36px; }
    .cal-day.other-month { color: var(--text-3); pointer-events: none; }
    .cal-day.today { background: var(--accent); color: #fff; font-weight: 800; box-shadow: 0 2px 8px rgba(74,144,226,.4); }
    .cal-day.has-event::after { content:''; position: absolute; bottom: 2px; width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
    .cal-day.today.has-event::after { background: #fff; }
    .cal-day.selected:not(.today) { outline: 2px solid var(--accent); outline-offset: -1px; background: var(--accent-dim); }
    .cal-day:not(.today):not(.other-month):hover { background: var(--surface-2); }

    /* ── STEP 4: Calendar View Toggle ── */
    .cal-view-toggle {
      display: flex; gap: 4px; background: var(--surface-2);
      border: 1px solid var(--border); border-radius: 10px; padding: 3px;
    }
    .cal-view-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: 7px; border: none;
      background: transparent; font-family: inherit;
      font-size: 0.78rem; font-weight: 600; color: var(--text-2);
      cursor: pointer; transition: all .18s; white-space: nowrap;
    }
    .cal-view-btn svg { width: 14px; height: 14px; }
    .cal-view-btn.active {
      background: var(--surface); color: var(--accent);
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    /* ── STEP 4: Agenda Timeline ── */
    .agenda-wrap { display: flex; flex-direction: column; gap: 0; }
    .agenda-day-block { margin-bottom: 16px; }
    .agenda-day-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 8px; padding: 0 4px;
    }
    .agenda-day-dot {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 800;
    }
    .agenda-day-dot.today-dot {
      background: var(--accent); color: #fff;
      box-shadow: 0 2px 8px rgba(74,144,226,.4);
    }
    .agenda-day-dot.past-dot { background: var(--surface-3); color: var(--text-3); }
    .agenda-day-dot.future-dot { background: var(--surface-2); color: var(--text-1); border: 1.5px solid var(--border-hi); }
    .agenda-day-label { font-size: 0.88rem; font-weight: 700; color: var(--text-1); }
    .agenda-day-label span { color: var(--text-3); font-weight: 500; font-size: 0.8rem; margin-right: 4px; }
    .agenda-day-line {
      flex: 1; height: 1px; background: var(--border);
    }
    .agenda-events { margin-right: 46px; display: flex; flex-direction: column; gap: 8px; }
    .agenda-card {
      background: var(--surface); border-radius: 12px;
      border: 1px solid var(--border); padding: 12px 14px;
      box-shadow: var(--shadow-card);
      display: flex; align-items: flex-start; gap: 10px;
      transition: box-shadow .2s;
      animation: cardSlideIn .3s cubic-bezier(.22,1,.36,1) both;
    }
    .agenda-card:hover { box-shadow: var(--shadow-card-hi); }
    .agenda-time-col {
      display: flex; flex-direction: column; align-items: center;
      min-width: 44px; flex-shrink: 0;
    }
    .agenda-time {
      font-size: 0.78rem; font-weight: 700; color: var(--text-2); white-space: nowrap;
    }
    .agenda-time.all-day { font-size: 0.7rem; color: var(--text-3); }
    .agenda-time-bar {
      width: 2px; flex: 1; min-height: 12px; margin-top: 4px;
      border-radius: 2px;
    }
    .agenda-content { flex: 1; min-width: 0; }
    .agenda-title {
      font-size: 0.95rem; font-weight: 600; color: var(--text-1);
      line-height: 1.4; margin-bottom: 4px;
      word-wrap: break-word; overflow-wrap: break-word;
    }
    .agenda-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .agenda-source-badge {
      font-size: 0.68rem; font-weight: 600; padding: 2px 7px;
      border-radius: 99px; background: var(--surface-2);
      border: 1px solid var(--border); color: var(--text-3);
    }
    .agenda-source-badge.whatsapp { background: #e6f4ea; color: #1a7f37; border-color: #a8d5b5; }
    .agenda-source-badge.manual   { background: var(--accent-dim); color: var(--accent); border-color: rgba(74,144,226,.3); }
    .agenda-source-badge.gcal     { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
    .agenda-gcal-btn {
      display: inline-flex; align-items: center; gap: 5px;
      margin-top: 8px; padding: 5px 10px; border-radius: 8px;
      font-family: inherit; font-size: 0.75rem; font-weight: 700;
      background: var(--accent); color: #fff; border: none; cursor: pointer;
      text-decoration: none; transition: background .15s;
    }
    .agenda-gcal-btn:hover { background: #3a7fd5; }
    .agenda-gcal-btn svg { width: 12px; height: 12px; }
    .agenda-empty {
      text-align: center; padding: 40px 20px;
      color: var(--text-3); font-size: 0.9rem; font-weight: 500;
    }

    /* ── STEP 3: Empty States — clean, informative ── */
    .empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 64px 28px; text-align: center; gap: 10px;
      background: var(--surface); border-radius: var(--radius-card);
      border: 1.5px dashed var(--border-hi);
      margin-top: 8px;
    }
    .empty-icon { width: 52px; height: 52px; color: var(--accent); margin-bottom: 6px; opacity: .35; }
    .empty-title { font-size: 1.05rem; font-weight: 700; color: var(--text-1); }
    .empty-sub   { font-size: 0.88rem; color: var(--text-3); line-height: 1.7; max-width: 260px; }

    /* ── SKELETON ── */
    .skeleton-card { background: var(--surface); border-radius: var(--radius-card); border: 1px solid var(--border); margin-bottom: 10px; display: flex; align-items: stretch; overflow: hidden; height: 88px; box-shadow: var(--shadow-card); }
    .skeleton-strip { width: 4px; flex-shrink: 0; background: var(--surface-3); border-radius: 0 4px 4px 0; }
    .skeleton-body  { flex:1; padding: 14px 14px; display: flex; flex-direction: column; gap: 8px; }
    .skeleton-line  { height: 12px; background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%); background-size: 200% 100%; border-radius: 6px; animation: shimmer 1.5s ease-in-out infinite; }
    .skeleton-line.w60 { width:60%; } .skeleton-line.w80 { width:80%; } .skeleton-line.w40 { width:40%; }
    @keyframes shimmer { 0% { background-position:200% 0; } 100% { background-position:-200% 0; } }

    /* ── CARD ANIMATE ── */
    .card-animate { opacity:0; transform:translateY(10px); animation: cardSlideIn .3s cubic-bezier(.22,1,.36,1) forwards; }
    @keyframes cardSlideIn { to { opacity:1; transform:translateY(0); } }

    /* ── STEP 3: Custody Banner — whitespace ── */
    .custody-banner {
      border-radius: var(--radius-card); padding: 16px 18px; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between;
      border: 1px solid var(--border); box-shadow: var(--shadow-card);
    }
    .custody-banner.today { background: linear-gradient(135deg, rgba(74,144,226,.12) 0%, rgba(74,144,226,.04) 100%); border-color: rgba(74,144,226,.3); }
    .custody-banner.next  { background: var(--surface); }
    .custody-text h3 { font-size: 1rem; font-weight: 700; margin-bottom: 3px; color: var(--text-1); }
    .custody-text p  { font-size: 0.82rem; color: var(--text-2); line-height: 1.5; }
    .custody-emoji   { font-size: 2rem; }

    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ── MSG CARD EXPAND ── */
    .msg-preview {
      font-size: 1rem; color: var(--text-1); line-height: 1.65;
      word-wrap: break-word; overflow-wrap: break-word;
      white-space: pre-wrap;
    }
    .msg-preview.hidden { display: none; }

    .msg-full {
      display: none; margin-top: 0.7rem;
      border-top: 1px solid var(--border); padding-top: 0.7rem;
    }
    .msg-full.open { display: block; }
    .msg-full-text {
      font-size: 1rem; color: var(--text-1); line-height: 1.75;
      white-space: pre-wrap; word-break: break-word; overflow-wrap: break-word;
    }

    /* attachment chip */
    .msg-attach {
      display: inline-flex; align-items: center; gap: 0.4rem;
      margin-top: 0.6rem; padding: 0.4rem 0.8rem;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 10px; font-size: 0.82rem; color: var(--text-2);
      font-weight: 600; max-width: 100%; overflow: hidden; text-overflow: ellipsis;
    }
    .attach-icon { font-size: 1rem; flex-shrink: 0; }
    .attach-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* card clickable cursor */
    .msg-card-expand { cursor: pointer; }
    .msg-card-expand.expanded { box-shadow: var(--shadow-card-hi); }

    /* ── QUICK ADD FAB ── */
    .quick-add-fab {
      background: linear-gradient(135deg, #6366f1, #a855f7) !important;
      border-radius: 50% !important;
      width: 52px !important; height: 52px !important;
      min-width: 52px;
      box-shadow: 0 4px 14px rgba(99,102,241,0.45);
      margin-bottom: 2px;
      transition: transform .2s, box-shadow .2s;
    }
    .quick-add-fab:active { transform: scale(0.92); }
    .quick-add-fab .nav-icon { stroke: white; width: 22px; height: 22px; }
    .quick-add-fab .nav-label { color: white; font-weight: 700; font-size: 0.65rem; }
    .quick-add-fab .nav-pip  { display: none; }

    /* ── QUICK ADD OVERLAY ── */
    .qa-overlay {
      position: absolute; inset: 0; z-index: 100;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .qa-backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .qa-sheet {
      position: relative; z-index: 1;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(209,213,219,0.4);
      border-radius: 28px 28px 0 0;
      padding: 20px 20px calc(20px + var(--safe-b));
      max-height: 88vh; overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.38s cubic-bezier(0.16,1,0.3,1);
    }
    .qa-overlay.open .qa-sheet { transform: translateY(0); }
    .qa-pull-bar {
      width: 40px; height: 5px; background: #d1d5db;
      border-radius: 99px; margin: 0 auto 18px;
    }
    .qa-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
    }
    .qa-title {
      font-size: 1.35rem; font-weight: 800;
      background: linear-gradient(to left, #6366f1, #a855f7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .qa-close {
      width: 36px; height: 36px; border-radius: 50%;
      background: #f3f4f6; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #6b7280; transition: background .15s;
    }
    .qa-close:hover { background: #e5e7eb; }
    .qa-form { display: flex; flex-direction: column; gap: 16px; }
    .qa-field-wrap {
      background: rgba(255,255,255,0.6);
      border: 1.5px solid #e5e7eb; border-radius: 16px; overflow: hidden;
    }
    .qa-field-wrap.qa-field-icon { position: relative; }
    .qa-field-svg {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: #9ca3af; pointer-events: none;
      stroke: #9ca3af;
    }
    .qa-input {
      width: 100%; padding: 14px 16px; background: transparent;
      border: none; font-family: inherit; font-size: 1rem; color: #1f2937;
      direction: rtl;
    }
    .qa-input.qa-input-icon { padding-right: 42px; }
    .qa-input:focus { outline: none; }
    .qa-field-wrap:focus-within { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
    .qa-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .qa-section-label {
      display: block; font-size: 0.8rem; font-weight: 700;
      color: #6b7280; margin-bottom: 10px; padding-right: 4px;
    }
    /* Kid Pills */
    .qa-pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .qa-pill {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 14px; border-radius: 99px;
      border: 2px solid #e5e7eb; background: rgba(255,255,255,0.5);
      font-family: inherit; font-size: 0.88rem; font-weight: 600;
      color: #4b5563; cursor: pointer; transition: all .18s;
    }
    .qa-pill.active {
      border-color: var(--kc); background: color-mix(in srgb, var(--kc) 12%, transparent);
      color: var(--kc);
    }
    .qa-avatar {
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 800; color: white; flex-shrink: 0;
    }
    /* Category grid */
    .qa-cats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .qa-cat {
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 8px; border-radius: 14px;
      background: rgba(255,255,255,0.4); border: 1.5px solid #e5e7eb;
      cursor: pointer; font-family: inherit; gap: 5px; transition: all .18s;
    }
    .qa-cat svg { width: 22px; height: 22px; stroke: #9ca3af; transition: stroke .18s; }
    .qa-cat span { font-size: 0.72rem; font-weight: 600; color: #6b7280; }
    .qa-cat.active {
      border-color: rgba(168,85,247,0.4); background: rgba(168,85,247,0.08);
    }
    .qa-cat.active svg  { stroke: #a855f7; }
    .qa-cat.active span { color: #a855f7; }
    .qa-textarea {
      width: 100%; padding: 12px 14px; border-radius: 14px;
      border: 1.5px solid #e5e7eb; background: rgba(255,255,255,0.5);
      font-family: inherit; font-size: 0.9rem; color: #374151;
      resize: none; direction: rtl;
    }
    .qa-textarea:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
    .qa-submit {
      width: 100%; padding: 16px;
      background: linear-gradient(to left, #6366f1, #a855f7);
      color: white; font-family: inherit; font-size: 1.05rem; font-weight: 700;
      border: none; border-radius: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 6px 20px rgba(99,102,241,0.35);
      transition: transform .15s, box-shadow .15s;
    }
    .qa-submit:active { transform: scale(0.97); box-shadow: 0 3px 10px rgba(99,102,241,0.25); }
    .qa-toast {
      position: absolute; bottom: calc(var(--nav-h) + 16px + var(--safe-b));
      left: 50%; transform: translateX(-50%);
      background: #1f2937; color: white;
      padding: 10px 20px; border-radius: 99px;
      font-size: 0.9rem; font-weight: 600; white-space: nowrap;
      opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 200;
    }
    .qa-toast.show { opacity: 1; }

    /* ── OLDER MESSAGES SECTION ── */
    .older-section {
      margin-bottom: 1rem; border-radius: var(--radius-card);
      border: 1px solid var(--border); overflow: hidden;
      background: var(--surface);
    }
    .older-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.85rem 1rem; cursor: pointer;
      font-size: 0.88rem; font-weight: 600; color: var(--text-2);
      background: var(--surface-2); user-select: none;
      transition: background .15s;
    }
    .older-toggle:hover { background: var(--surface-3); }
    .older-arrow { transition: transform .25s; flex-shrink: 0; color: var(--text-3); }
    .older-section.open .older-arrow { transform: rotate(180deg); }
    .older-body { display: none; padding: 0.75rem; }
    .older-section.open .older-body { display: block; }

    /* empty recent */
    .empty-recent {
      text-align: center; padding: 1.5rem; font-size: 0.88rem;
      color: var(--text-3); font-weight: 500;
    }
  </style>
</head>
<body>
<div id="app">

  <header class="app-header">
    <div class="header-brand">
      <span class="header-logo">FamilyOS</span>
      <div class="header-pulse" aria-hidden="true"></div>
    </div>
    <div class="header-right">
      <span id="header-meta" class="header-meta"></span>
      <button class="btn-refresh" id="refreshBtn" onclick="doRefresh()" title="רענן">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M4 10a6 6 0 016-6c2 0 3.8.9 5 2.3L17 8"/><path d="M16 10a6 6 0 01-6 6c-2 0-3.8-.9-5-2.3L3 12"/>
          <path d="M17 4v4h-4" stroke-linejoin="round"/><path d="M3 16v-4h4" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </header>

  <div id="filter-bar" class="filter-bar"></div>

  <div class="tab-area">
    <section id="tab-feed"     class="tab-panel active" role="tabpanel"></section>
    <section id="tab-calendar" class="tab-panel"        role="tabpanel"></section>
    <section id="tab-tasks"    class="tab-panel"        role="tabpanel"></section>
    <section id="tab-pinned"   class="tab-panel"        role="tabpanel"></section>
  </div>

  <nav class="bottom-nav" role="tablist" aria-label="ניווט ראשי">
    <button class="nav-btn active" data-tab="feed" role="tab" aria-selected="true">
      <div class="nav-pip"></div>
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
      <span class="nav-label">פיד</span>
    </button>
    <button class="nav-btn" data-tab="calendar" role="tab" aria-selected="false">
      <div class="nav-pip"></div>
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
      <span class="nav-label">לוח שנה</span>
    </button>
    <button class="nav-btn" data-tab="tasks" role="tab" aria-selected="false">
      <div class="nav-pip"></div>
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3 5-5"/><rect width="18" height="18" x="3" y="3" rx="3"/></svg>
      <span class="nav-label">משימות</span>
    </button>
    <button class="nav-btn" data-tab="pinned" role="tab" aria-selected="false">
      <div class="nav-pip"></div>
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="17" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>
      <span class="nav-label">נעוצים</span>
    </button>
    <!-- Quick Add FAB -->
    <button class="nav-btn quick-add-fab" onclick="openQuickAdd()" aria-label="הוספה מהירה">
      <div class="nav-pip"></div>
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span class="nav-label">הוסף</span>
    </button>
  </nav>

  <!-- ── QUICK ADD OVERLAY ── -->
  <div id="quick-add-overlay" class="qa-overlay" aria-modal="true" role="dialog" aria-label="הוספה מהירה" style="display:none">
    <div class="qa-backdrop" onclick="closeQuickAdd()"></div>
    <div class="qa-sheet" id="qa-sheet">
      <div class="qa-pull-bar"></div>
      <div class="qa-header">
        <h2 class="qa-title">הוספה מהירה</h2>
        <button class="qa-close" onclick="closeQuickAdd()" aria-label="סגור">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form class="qa-form" onsubmit="handleQuickAdd(event)">
        <!-- Title -->

// ─── CHILDREN ─────────────────────────────────────────────────────────────────
const KIDS = {

};
function kid(k) { return KIDS[k] || { name:k, color:'#7878a0' }; }

const HE_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const HE_DAYS   = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

// ─── UTILS ────────────────────────────────────────────────────────────────────
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function rgba(hex,a) { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }
function pad(n) { return String(n).padStart(2,'0'); }

function ls(k)      { try { return JSON.parse(localStorage.getItem(k))||{}; } catch { return {}; } }
function lsSave(k,v){ try { localStorage.setItem(k,JSON.stringify(v)); } catch {} }

function isRead(id)         { return !!ls('fos_read')[id]; }
function markRead(id,v)     { const r=ls('fos_read'); r[id]=v; lsSave('fos_read',r); }
function isTaskDone(id)     { return !!ls('fos_tasks')[id]; }
function setTaskDone(id,v)  { const t=ls('fos_tasks'); t[id]=v; lsSave('fos_tasks',t); }
function addedCal()         { return ls('fos_cal'); }
function trackCal(id,link)  { const e=addedCal(); e[id]=link||true; lsSave('fos_cal',e); }
function untrackCal(id)     { const e=addedCal(); delete e[id]; lsSave('fos_cal',e); }

// ─── TIME ─────────────────────────────────────────────────────────────────────
function fmtTime(iso) {
  const d=new Date(iso), now=new Date(), h=(now-d)/36e5;
  if (h<24)  return d.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
  if (h<168) return d.toLocaleDateString('he-IL',{weekday:'short'});
  return d.toLocaleDateString('he-IL',{day:'numeric',month:'numeric'});
}
function fmtMsgDateTime(iso) {
  /* מחזיר: "יום שלישי, 4.3 | 19:00 — לפני 4 ימים" */
  const d=new Date(iso); if(isNaN(d)) return '';
  const now=new Date();
  const diffMs = now - d;
  const diffH  = diffMs / 36e5;
  const diffD  = Math.floor(diffMs / 864e5);
  const HE_DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const dayName = HE_DAYS[d.getDay()];
  const dateStr = `${d.getDate()}.${d.getMonth()+1}`;
  const timeStr = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  let ago;
  if      (diffH < 1)  ago = 'לפני פחות משעה';
  else if (diffH < 24) ago = `לפני ${Math.round(diffH)} שעות`;
  else if (diffD === 1) ago = 'אתמול';
  else if (diffD < 7)  ago = `לפני ${diffD} ימים`;
  else                 ago = `לפני ${Math.round(diffD/7)} שבועות`;
  return `יום ${dayName} ${dateStr} | ${timeStr} · ${ago}`;
}
function fmtDateLabel(iso) {
  const d=new Date(iso), today=new Date(); today.setHours(0,0,0,0);
  const msgDay=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const diff=Math.round((msgDay-today)/864e5);
  if (diff===0) return 'היום';
  if (diff===1) return 'מחר';
  if (diff===-1) return 'אתמול';
  return d.toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'});
}
function fmtFull(iso) {
  const d=new Date(iso);
  if (isNaN(d)) return iso;
  const allDay=!iso.includes('T');
  if (allDay) return `${d.getDate()} ב${HE_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
  return `${d.getDate()} ב${HE_MONTHS[d.getMonth()]} ${d.getFullYear()}, ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fmtDay(iso)  { const d=new Date(iso); return isNaN(d)?'':d.getDate(); }
function fmtMon(iso)  { const d=new Date(iso); return isNaN(d)?'':HE_MONTHS[d.getMonth()].slice(0,3); }
function fmtTime2(iso){ const d=new Date(iso); if(isNaN(d)||(!iso.includes('T')&&d.getHours()===0&&d.getMinutes()===0)) return 'כל היום'; return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function dateKey(iso) { const d=new Date(iso); return `${d.getFullYear()}-${pad(d.getMonth())}-${pad(d.getDate())}`; }
function groupByDate(items) {
  const m=new Map();
  for (const it of items) { const k=dateKey(it.date); if(!m.has(k)) m.set(k,{label:fmtDateLabel(it.date),items:[]}); m.get(k).items.push(it); }
  return [...m.entries()].sort(([a],[b])=>a.localeCompare(b));
}

// ─── FILTER ───────────────────────────────────────────────────────────────────
function isEmojiOnly(t) {
  const s=t.replace(/[\u{1F000}-\u{1FFFF}]/gu,'').replace(/[\u{2600}-\u{27BF}]/gu,'').replace(/[\u{FE00}-\u{FEFF}]/gu,'').replace(/[\u{1F900}-\u{1FAFF}]/gu,'').replace(/\uFE0F/g,'').replace(/[!\s.,;:'"()\-_*#@\u200f\u200e]/g,'');
  return s.length===0;
}
function shouldShow(msg) {
  if (msg.isRinat) return true;
  const t=(msg.summary||msg.text||'').trim();
  if (!t||isEmojiOnly(t)) return false;
  return t.split(/\s+/).filter(Boolean).length>=3;
}

let activeFilter='all';
let DATA=null;
let calViewDate=new Date();
let calSelected=null;

// ─── FILTER BAR ───────────────────────────────────────────────────────────────
function buildFilterBar() {
  const bar=document.getElementById('filter-bar');
  bar.innerHTML=['all','ran','itai','noga','alon'].map(key=>{
    const k=kid(key);
    return `<button class="filter-chip${key==='all'?' active':''}" data-child="${key}"
      style="--chip-color:${k.color};--chip-bg:${rgba(k.color,.13)};--chip-glow:${rgba(k.color,.18)}">
      <span class="chip-dot" style="background:${k.color}"></span>${k.name}
    </button>`;
  }).join('');
  bar.querySelectorAll('.filter-chip').forEach(btn=>{
    btn.addEventListener('click',()=>{
      activeFilter=btn.dataset.child;
      bar.querySelectorAll('.filter-chip').forEach(b=>b.classList.toggle('active',b.dataset.child===activeFilter));
      renderFeed(); renderCalendar(); renderTasks();
    });

// ─── SKELETON ─────────────────────────────────────────────────────────────────
function skeleton(n) {
  let h='';
  for(let i=0;i<n;i++) h+=`<div class="skeleton-card"><div class="skeleton-strip"></div><div class="skeleton-body"><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div><div class="skeleton-line w40"></div></div></div>`;
  return h;
}

// ─── DIVIDER ──────────────────────────────────────────────────────────────────
function divider(t) { return `<div class="divider"><span>${esc(t)}</span><div class="divider-line"></div></div>`; }

// ─── CALENDAR DEEPLINK ────────────────────────────────────────────────────────
function calLink(ev) {
  const s=new Date(ev.date), e=ev.endDate?new Date(ev.endDate):s;
  if (isNaN(s)) return '#';
  const fmt=d=>{
    const allDay=!ev.date.includes('T');
    if (allDay) return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
    return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;
  };
  const p=new URLSearchParams({action:'TEMPLATE',text:ev.title,dates:`${fmt(s)}/${fmt(isNaN(e)?s:e)}`});
  if (ev.description) p.set('details',ev.description);
  if (ev.location)    p.set('location',ev.location);
  return 'https://calendar.google.com/calendar/render?'+p.toString();
}

// ─── CLEAN BODY ───────────────────────────────────────────────────────────────
function cleanBody(body) {
  if (!body) return '';
  if (/<[a-z][\s\S]*>/i.test(body)) { const d=document.createElement('div'); d.innerHTML=body; return (d.textContent||d.innerText||'').trim(); }
  return body.trim();
}

// ─── MESSAGE CARD ─────────────────────────────────────────────────────────────
// ── Category label map ──
const CAT_LABELS = {
  school:'לימודים', payment:'תשלום', medical:'רפואה',
  sport:'ספורט', trip:'טיול', other:'כללי'
};

function msgCard(msg, idx) {
  const c   = kid(msg.child);
  const bg  = rgba(c.color, .13);

  const fullText = msg.text || msg.body || '';
  const preview  = msg.summary || fullText;
  // האם יש תוכן מעבר ל-preview?
  const hasMore  = fullText && fullText !== preview && fullText.length > (msg.summary||'').length + 20;

  const cls = ['card','card-animate',!isRead(msg.id)?'is-unread':''].filter(Boolean).join(' ');
  const isWA    = msg.source==='whatsapp';
  const isEmail = msg.source==='email';
  const srcLabel = isWA ? '📱 WA' : isEmail ? '✉️ מייל' : '';
  const srcClass = isWA ? 'wa'    : isEmail ? 'email'   : '';
  const delay = Math.min((idx||0)*30, 300);
  const prio  = msg.priority==='urgent' ? '<span class="priority-badge urgent">דחוף</span>'
              : msg.priority==='high'   ? '<span class="priority-badge high">חשוב</span>' : '';

  // Category badge
  const cat = msg.category || 'other';
  const catIcon = msg.categoryIcon || '📌';
  const catLabel = CAT_LABELS[cat] || 'כללי';
  const catBadge = `<span class="cat-badge ${cat}">${catIcon} ${catLabel}</span>`;

  // קובץ מצורף
  const attach = msg.hasAttachment && msg.attachmentName
    ? `<div class="msg-attach"><span class="attach-icon">📎</span><span class="attach-name">${esc(msg.attachmentName)}</span></div>` : '';

  // כפתור expand — מוצג רק אם יש טקסט ארוך
  const expandBtn = hasMore
    ? `<button class="expand-btn" id="ebtn-${msg.id}" onclick="toggleCard('${msg.id}',event)">
        קרא עוד <span class="expand-arrow">▾</span>
       </button>` : '';

  return `<div class="${cls}" data-id="${msg.id}" style="animation-delay:${delay}ms" id="mc-${msg.id}">
  <div class="card-strip" style="background:${c.color}"></div>
  <div class="card-body">
    <div class="msg-top">
      <div class="msg-pills">
        <span class="child-pill" style="background:${bg};color:${c.color}">${c.name}</span>
        ${catBadge}
        ${msg.pinned ? `<span class="pin-tag" style="color:${c.color}">${IC.pin} נעוץ</span>` : ''}
        ${!isRead(msg.id) ? `<span class="dot-unread" style="background:${c.color};color:${c.color}"></span>` : ''}
      </div>
      <span class="msg-time">${fmtTime(msg.time)}</span>
    </div>
    <div class="msg-from">${esc(msg.from||msg.group||'')}${srcLabel?`<span class="msg-source-badge ${srcClass}">${srcLabel}</span>`:''}</div>
    <div class="msg-datetime">📅 ${fmtMsgDateTime(msg.time)}</div>

    <!-- preview: 3-line clamp -->
    <div class="msg-text" id="mt-${msg.id}">${esc(preview)}</div>

    <!-- full text (נסתר בהתחלה) -->
    ${hasMore ? `<div class="msg-body-full" id="mf-${msg.id}"><div class="msg-full-text">${esc(fullText)}</div>${attach}</div>` : attach}

    ${expandBtn}

    <div class="msg-actions">
      ${prio}
      <button class="btn-ghost" style="margin-right:auto" onclick="toggleRead('${msg.id}',this)">${IC.chk}<span class="lbl">${isRead(msg.id)?'לא נקרא':'סמן נקרא'}</span></button>
    </div>
  </div>
</div>`;
}

function toggleCard(id, e) {
  e.stopPropagation();
  const full = document.getElementById('mf-'+id);
  const preview = document.getElementById('mt-'+id);
  const btn = document.getElementById('ebtn-'+id);
  const card = document.getElementById('mc-'+id);
  if (!full || !btn) return;

  const open = full.classList.toggle('open');
  // collapse/expand preview clamp
  if (preview) preview.classList.toggle('expanded', open);
  // rotate arrow
  btn.classList.toggle('open', open);
  btn.innerHTML = open
    ? 'סגור <span class="expand-arrow">▾</span>'
    : 'קרא עוד <span class="expand-arrow">▾</span>';

  if (open) {
    markRead(id, true);
    card?.classList.remove('is-unread');
    updateBadge();
    setTimeout(() => card?.scrollIntoView({behavior:'smooth', block:'nearest'}), 60);
  }
}
function toggleRead(id,btn) {
  const now=!isRead(id); markRead(id,now);
  document.getElementById('mc-'+id)?.classList.toggle('is-unread',!now);
  btn.querySelector('.lbl').textContent=now?'לא נקרא':'סמן נקרא';

// ─── RENDER FEED ──────────────────────────────────────────────────────────────
function renderFeed() {
  const el=document.getElementById('tab-feed');
  const now=new Date();
  const cutoff24h=new Date(now-24*60*60*1000);

  let msgs=(DATA.messages||[]).filter(shouldShow);
  if (activeFilter!=='all') msgs=msgs.filter(m=>m.child===activeFilter);

  // מיון: חדש → ישן (הכי חדש בראש)
  msgs=[...msgs].sort((a,b)=>new Date(b.time)-new Date(a.time));

  // סינון 24 שעות
  const recent=msgs.filter(m=>new Date(m.time)>=cutoff24h);
  const older =msgs.filter(m=>new Date(m.time)<cutoff24h);

  const rinat=recent.filter(m=>m.isRinat), normal=recent.filter(m=>!m.isRinat);

  let html=custodyBanner();
  let idx=0;

  // הודעות ישנות (מעל 24 שעות) — מקופלות
  if (older.length) {
    const olderRinat=older.filter(m=>m.isRinat), olderNormal=older.filter(m=>!m.isRinat);
    html+=`<div class="older-section">
      <div class="older-toggle" onclick="this.parentElement.classList.toggle('open')" role="button" aria-expanded="false">
        <span>📂 הודעות ישנות (${older.length})</span>
        <svg class="older-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <div class="older-body">
        ${olderRinat.length?`<div class="rinat-zone">${olderRinat.map(m=>msgCard(m,idx++)).join('')}</div>`:''}
        ${olderNormal.map(m=>msgCard(m,idx++)).join('')}
      </div>
    </div>`;
  }

  // הודעות 24 שעות אחרונות
  if (rinat.length) {
    html+=`<div class="rinat-zone"><div class="rinat-header"><div class="rinat-dot"></div>הודעות מרינת</div>${rinat.map(m=>msgCard(m,idx++)).join('')}</div>`;
  }
  if (!recent.length&&!older.length) html+=empty(IC.chat56,'אין הודעות עדיין','הודעות מבתי הספר יופיעו כאן');
  else if (!recent.length) html+=`<div class="empty-recent">אין הודעות חדשות ב-24 השעות האחרונות</div>`;
  else html+=normal.map(m=>msgCard(m,idx++)).join('');
  el.innerHTML=html;
  updateBadge();
}

// ─── STEP 4: Agenda helpers ───────────────────────────────────────────────────
const HE_DAYS_SHORT = ['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
const HE_DAYS_FULL  = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

function agendaDayKey(dateStr) {
  const d = new Date(dateStr);
  return isNaN(d) ? '?' : `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function agendaDayLabel(key) {
  const [y,m,d] = key.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const today = new Date();
  const isToday = y===today.getFullYear()&&(m-1)===today.getMonth()&&d===today.getDate();
  const isTomorrow = !isToday && (new Date(y,m-1,d) - new Date(today.getFullYear(),today.getMonth(),today.getDate()) === 86400000);
  const dow = HE_DAYS_FULL[dt.getDay()];
  const suffix = isToday ? ' — היום' : isTomorrow ? ' — מחר' : '';
  return { day: d, monthLabel: HE_MONTHS[m-1], dow, suffix, isToday, isPast: dt < new Date(today.getFullYear(),today.getMonth(),today.getDate()) };
}

function sourceLabel(ev) {
  const s = ev.source || 'manual';
  if (s === 'whatsapp' || s === 'whatsapp-pdf') return ['whatsapp','📱 WA'];
  if (s === 'gcal') return ['gcal','📅 Google'];
  return ['manual','➕ ידני'];
}

function renderAgenda(events) {
  const panel = document.getElementById('tab-calendar');
  const today = new Date();
  const todayKey = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

  // Group by day
  const byDay = new Map();
  const sorted = [...events].sort((a,b) => new Date(a.date)-new Date(b.date));

  // Show upcoming 30 days if no events, still show today
  sorted.forEach(ev => {
    const key = agendaDayKey(ev.date);
    if (!byDay.has(key)) byDay.set(key, []);
    byDay.get(key).push(ev);
  });

  // Ensure today is always present
  if (!byDay.has(todayKey)) byDay.set(todayKey, []);

  // Sort keys
  const dayKeys = [...byDay.keys()].sort();

  if (dayKeys.length === 0) {
    panel.innerHTML = `
    <div class="cal-grid-wrap">
      <div class="cal-nav">
        <div></div>
        <span class="cal-month-title">ציר זמן</span>
        ${calViewToggleHtml()}
      </div>
    </div>
    <div class="agenda-empty">אין אירועים קרובים<br><span style="font-size:2rem;margin-top:8px;display:block">📅</span></div>`;
    return;
  }

  let blocksHtml = '';
  for (const key of dayKeys) {
    const evs = byDay.get(key);
    const { day, monthLabel, dow, suffix, isToday, isPast } = agendaDayLabel(key);
    const dotCls = isToday ? 'today-dot' : isPast ? 'past-dot' : 'future-dot';

    let evHtml = '';
    if (evs.length === 0) {
      evHtml = `<div style="font-size:0.8rem;color:var(--text-3);padding:8px 0">אין אירועים</div>`;
    } else {
      evHtml = evs.map((ev, i) => agendaCard(ev, i)).join('');
    }

    blocksHtml += `
    <div class="agenda-day-block">
      <div class="agenda-day-header">
        <div class="agenda-day-dot ${dotCls}">${day}</div>
        <div class="agenda-day-label">${dow} ${monthLabel}${suffix?`<span>${suffix}</span>`:''}</div>
        <div class="agenda-day-line"></div>
      </div>
      <div class="agenda-events">${evHtml}</div>
    </div>`;
  }

  panel.innerHTML = `
<div class="cal-grid-wrap">
  <div class="cal-nav">
    <button class="cal-nav-btn" onclick="agendaScrollToday()" title="היום" style="font-size:0.75rem;font-weight:700;width:auto;padding:0 12px">היום</button>
    <span class="cal-month-title">ציר זמן</span>
    ${calViewToggleHtml()}
  </div>
</div>
<div class="agenda-wrap" id="agenda-wrap">${blocksHtml}</div>`;
}

function renderCalendar() {
  const panel=document.getElementById('tab-calendar');
  let events=(DATA.events||[]);
  if (activeFilter!=='all') events=events.filter(e=>e.child===activeFilter||e.child==='all');

  // ── Agenda view ──
  if (calView === 'agenda') {
    renderAgenda(events);
    return;
  }

  // ── Grid view (original) ──
  const yr=calViewDate.getFullYear(), mo=calViewDate.getMonth();
  const firstDay=new Date(yr,mo,1).getDay();
  const daysInMo=new Date(yr,mo+1,0).getDate();
  const daysInPrev=new Date(yr,mo,0).getDate();
  const today=new Date();
  const evDates=new Set();
  events.forEach(e=>{ const d=new Date(e.date); if(d.getFullYear()===yr&&d.getMonth()===mo) evDates.add(d.getDate()); });

  let gridHtml='', total=Math.ceil((firstDay+daysInMo)/7)*7;
  for (let i=0;i<total;i++) {
    let d,other=false;
    if (i<firstDay) { d=daysInPrev-firstDay+i+1; other=true; }
    else if (i>=firstDay+daysInMo) { d=i-firstDay-daysInMo+1; other=true; }
    else d=i-firstDay+1;
    const isToday=!other&&yr===today.getFullYear()&&mo===today.getMonth()&&d===today.getDate();
    const hasEv=!other&&evDates.has(d);
    const isSel=calSelected&&!other&&yr===calSelected.yr&&mo===calSelected.mo&&d===calSelected.d;
    const cls=['cal-day',other?'other-month':'',isToday?'today':'',hasEv?'has-event':'',isSel?'selected':''].filter(Boolean).join(' ');
    gridHtml+=`<div class="${cls}"${other?'':` onclick="calSelectDay(${yr},${mo},${d})"`}>${d}</div>`;
  }

  // events list
  let listTitle='כל האירועים', listEvents=events;
  if (calSelected) {
    const {yr:sy,mo:sm,d:sd}=calSelected;
    listEvents=events.filter(e=>{ const dt=new Date(e.date); return dt.getFullYear()===sy&&dt.getMonth()===sm&&dt.getDate()===sd; });
    listTitle=`אירועים ל-${sd} ב${HE_MONTHS[sm]}`;
  }
  const sorted=[...listEvents].sort((a,b)=>new Date(a.date)-new Date(b.date));
  let evHtml=''; let idx=0;
  if (calSelected) {
    evHtml=sorted.length?sorted.map(e=>eventCard(e,idx++)).join(''):empty(IC.cal56,'אין אירועים ביום זה','');
  } else {
    for (const [,{label,items}] of groupByDate(sorted)) {
      evHtml+=divider(label)+items.map(e=>eventCard(e,idx++)).join('');
    }
    if (!evHtml) evHtml=empty(IC.cal56,'אין אירועים קרובים','אירועי לוח השנה יופיעו כאן');
  }

  panel.innerHTML=`
<div class="cal-grid-wrap">
  <div class="cal-nav">
    <button class="cal-nav-btn" onclick="calPrev()">‹</button>
    <span class="cal-month-title">${HE_MONTHS[mo]} ${yr}</span>
    <button class="cal-nav-btn" onclick="calNext()">›</button>
  </div>
  <div class="cal-nav" style="margin-top:-4px;margin-bottom:8px;justify-content:flex-end;">
    ${calViewToggleHtml()}
  </div>
  <div class="cal-days-hdr"><div>א׳</div><div>ב׳</div><div>ג׳</div><div>ד׳</div><div>ה׳</div><div>ו׳</div><div>ש׳</div></div>
  <div class="cal-days">${gridHtml}</div>
</div>
${divider(listTitle)}${evHtml}`;
}
function calSelectDay(yr,mo,d) { calSelected={yr,mo,d}; renderCalendar(); }
function calPrev() { calViewDate.setMonth(calViewDate.getMonth()-1); calSelected=null; renderCalendar(); }
function calNext() { calViewDate.setMonth(calViewDate.getMonth()+1); calSelected=null; renderCalendar(); }

let activeTab='feed';
function switchTab(id) {
  const alreadyActive = (id === activeTab);
  document.querySelector('.tab-panel.active')?.classList.remove('active');
  document.getElementById('tab-'+id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>{ const on=b.dataset.tab===id; b.classList.toggle('active',on); b.setAttribute('aria-selected',on); });
  activeTab=id;
  const bar=document.getElementById('filter-bar');
  bar.classList.toggle('visible',id==='feed'||id==='calendar'||id==='tasks');

  // לחיצה על הטאב הפעיל → חזרה ל"הכל"
  if (alreadyActive && id==='feed') {
    activeFilter='all';
    bar.querySelectorAll('.filter-chip').forEach(b=>b.classList.toggle('active',b.dataset.child==='all'));
    renderFeed(); renderCalendar(); renderTasks();
    document.getElementById('tab-feed').scrollTo({top:0,behavior:'smooth'});
    return;
  }

  if (id==='calendar') renderCalendar();
}
document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)));

async function loadData() {
  try {

    if (!res.ok) throw new Error('HTTP '+res.status);
    DATA=await res.json();
    const d=new Date(DATA.updated_at||0);
    document.getElementById('header-meta').textContent=DATA.updated_at?('עודכן '+fmtTime(DATA.updated_at)):'';
    buildFilterBar();
    document.getElementById('filter-bar').classList.add('visible');
    renderFeed(); renderCalendar(); renderTasks(); renderPinned();
  } catch(err) {
    console.error(err);
    document.getElementById('tab-feed').innerHTML=empty(IC.warn56,'שגיאה בטעינה',err.message);
    document.getElementById('header-meta').textContent='שגיאה';
  }
}
async function doRefresh() {
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning'); btn.disabled=true;
  const meta=document.getElementById('header-meta');
  const origMeta=meta.textContent;
  meta.textContent='מרענן נתונים...';
  try {
    // trigger push script via local refresh server
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),3000);
    await fetch('http://192.168.68.60:19876/refresh',{method:'POST',signal:ctrl.signal}).catch(()=>{});
    clearTimeout(timer);
    // wait for push to complete (~12s), then reload data
    await new Promise(r=>setTimeout(r,12000));
  } catch(e){}
  await loadData();
  btn.classList.remove('spinning'); btn.disabled=false;
}

// ─── QUICK ADD ────────────────────────────────────────────────────────────────
function openQuickAdd() {
  const overlay = document.getElementById('quick-add-overlay');
  overlay.style.display = 'flex';
  // scroll-lock
  document.getElementById('app').style.overflow = 'hidden';
  // set today as default date
  const today = new Date();
  const p2 = n => String(n).padStart(2,'0');
  document.getElementById('qa-date').value = `${today.getFullYear()}-${p2(today.getMonth()+1)}-${p2(today.getDate())}`;
  // reset form state
  document.getElementById('qa-title').value = '';
  document.getElementById('qa-time').value = '';
  document.getElementById('qa-notes').value = '';
  document.querySelectorAll('#qa-kids .qa-pill, #qa-cats .qa-cat').forEach(el => el.classList.remove('active'));
  requestAnimationFrame(() => {
    overlay.classList.add('open');
    setTimeout(() => document.getElementById('qa-title').focus(), 400);
  });
}
function closeQuickAdd() {
  const overlay = document.getElementById('quick-add-overlay');
  overlay.classList.remove('open');
  document.getElementById('app').style.overflow = '';
  overlay.addEventListener('transitionend', () => {
    overlay.style.display = 'none';
  }, { once: true });
}

// Kid pills
document.addEventListener('click', e => {
  const pill = e.target.closest('#qa-kids .qa-pill');
  if (!pill) return;
  if (pill.dataset.kid === 'all') {
    const allActive = !pill.classList.contains('active');
    document.querySelectorAll('#qa-kids .qa-pill').forEach(p => p.classList.toggle('active', allActive));
    return;
  }
  pill.classList.toggle('active');
  const allPill = document.querySelector('#qa-kids .qa-pill[data-kid="all"]');
  const allSelected = [...document.querySelectorAll('#qa-kids .qa-pill:not([data-kid="all"])')].every(p=>p.classList.contains('active'));
  allPill.classList.toggle('active', allSelected);
});

// Category buttons
document.addEventListener('click', e => {
  const cat = e.target.closest('#qa-cats .qa-cat');
  if (!cat) return;
  document.querySelectorAll('#qa-cats .qa-cat').forEach(c => c.classList.remove('active'));
  cat.classList.add('active');
});

function handleQuickAdd(e) {
  e.preventDefault();
  const title    = document.getElementById('qa-title').value.trim();
  const date     = document.getElementById('qa-date').value;
  const time     = document.getElementById('qa-time').value;
  const notes    = document.getElementById('qa-notes').value.trim();
  const kids     = [...document.querySelectorAll('#qa-kids .qa-pill.active')].map(p=>p.dataset.kid);
  const catEl    = document.querySelector('#qa-cats .qa-cat.active');
  const category = catEl?.dataset.cat || 'other';
  const child    = kids.includes('all') ? 'all' : (kids[0] || 'all');

  const entry = {
    id: 'qa_' + Date.now(),
    title,
    date: time ? `${date}T${time}:00` : date,
    child,
    kids,
    category,
    notes,
    source: 'quick-add',
    createdAt: new Date().toISOString()
  };

  // שמור ב-DATA.events ורנדר מחדש
  if (!DATA) DATA = {};
  if (!DATA.events) DATA.events = [];
  DATA.events.unshift(entry);

  renderCalendar();
  renderTasks();
  closeQuickAdd();

  // toast
  const toast = document.getElementById('qa-toast');
  toast.textContent = `✅ ${title} נוסף`;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);

  // reset form
  e.target.reset();
  document.querySelectorAll('#qa-kids .qa-pill, #qa-cats .qa-cat').forEach(el=>el.classList.remove('active'));
}

// ─── PWA: Service Worker ──────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-panel').forEach(p=>p.innerHTML=skeleton(5));
loadData();
</script>
