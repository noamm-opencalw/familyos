<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>FamilyOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg:           #0f0f13;
      --surface:      #16161e;
      --surface-2:    #1e1e2a;
      --surface-3:    #252532;
      --border:       rgba(255,255,255,0.07);
      --border-hi:    rgba(255,255,255,0.13);
      --text-1:       #f0f0f6;
      --text-2:       #9090aa;
      --text-3:       #5a5a72;
      --accent:       #6366f1;
      --nav-h:        68px;
      --header-h:     58px;
      --safe-b:       env(safe-area-inset-bottom, 0px);
      --safe-t:       env(safe-area-inset-top, 0px);
      --ran:   #6366f1;
      --itai:  #10b981;
      --noga:  #f59e0b;
      --alon:  #f43f5e;
      --rinat: #ef4444;
      --all:   #7878a0;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Heebo', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      direction: rtl;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    .app-header {
      height: var(--header-h);
      padding-top: var(--safe-t);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-inline: 20px;
      flex-shrink: 0;
      background: rgba(15,15,19,0.94);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      position: relative;
      z-index: 20;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-logo {
      font-size: 21px;
      font-weight: 800;
      letter-spacing: -0.6px;
      background: linear-gradient(130deg, #a5b4fc 0%, #c4b5fd 45%, #fda4af 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-dot {
      width: 7px;
      height: 7px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 7px #10b981;
      animation: breathe 3s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes breathe {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.55; transform: scale(0.82); }
    }

    .header-meta {
      font-size: 11px;
      color: var(--text-3);
      background: var(--surface-2);
      padding: 4px 11px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-weight: 400;
    }

    /* ── TAB CONTAINER ── */
    .tab-container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .tab {
      display: none;
      height: 100%;
      overflow-y: auto;
      padding: 14px 14px calc(14px + var(--safe-b));
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      scrollbar-width: none;
    }
    .tab::-webkit-scrollbar { display: none; }

    .tab.active {
      display: block;
      animation: tabIn 0.22s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    @keyframes tabIn {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      flex-shrink: 0;
      height: calc(var(--nav-h) + var(--safe-b));
      padding-bottom: var(--safe-b);
      background: rgba(14,14,20,0.97);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-3);
      padding: 0;
      position: relative;
      transition: color 0.18s ease;
      -webkit-user-select: none;
      user-select: none;
    }

    .nav-item.active { color: var(--text-1); }

    .nav-pill {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%) scaleX(0);
      width: 30px;
      height: 3px;
      background: var(--accent);
      border-radius: 0 0 4px 4px;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    .nav-item.active .nav-pill { transform: translateX(-50%) scaleX(1); }

    .nav-emoji {
      font-size: 21px;
      line-height: 1;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }

    .nav-item.active .nav-emoji { transform: scale(1.14) translateY(-1px); }

    .nav-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .nav-badge {
      position: absolute;
      top: 6px;
      left: calc(50% + 6px);
      background: #ef4444;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      min-width: 17px;
      height: 17px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      border: 2px solid var(--bg);
      line-height: 1;
      pointer-events: none;
    }

    /* ── CARD BASE ── */
    .card {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      margin-bottom: 10px;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      transition: transform 0.13s ease, border-color 0.13s ease;
    }

    .card:active { transform: scale(0.982); }

    .card.unread {
      background: var(--surface-2);
      border-color: rgba(255,255,255,0.1);
    }

    .card.pinned {
      box-shadow: 0 0 0 1px rgba(99,102,241,0.14),
                  0 2px 14px rgba(99,102,241,0.07);
    }

    .strip {
      width: 4px;
      flex-shrink: 0;
    }

    .card-body {
      flex: 1;
      padding: 13px 13px 13px 12px;
      min-width: 0;
    }

    /* ── MESSAGE CARD ── */
    .msg-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 5px;
    }

    .msg-chips {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
      flex-wrap: wrap;
    }

    .child-chip {
      font-size: 11.5px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 20px;
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }

    .child-chip-sm {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .unread-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .pin-marker {
      font-size: 11px;
      color: var(--accent);
      font-weight: 600;
      flex-shrink: 0;
    }

    .card-time {
      font-size: 11px;
      color: var(--text-3);
      flex-shrink: 0;
      font-weight: 400;
    }

    .msg-from {
      font-size: 12px;
      color: var(--text-2);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .msg-text {
      font-size: 13.5px;
      color: var(--text-1);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card.unread .msg-text { font-weight: 500; color: #f5f5ff; }

    /* ── RINAT STICKY SECTION ── */
    .rinat-section {
      background: linear-gradient(135deg,
        rgba(239,68,68,0.1) 0%,
        rgba(239,68,68,0.04) 100%);
      border: 1px solid rgba(239,68,68,0.28);
      border-radius: 18px;
      padding: 12px;
      margin-bottom: 14px;
      position: sticky;
      top: 0;
      z-index: 5;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 4px 24px rgba(239,68,68,0.08);
    }

    .rinat-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 700;
      color: #f87171;
    }

    .rinat-pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 0 0 rgba(239,68,68,0.6);
      animation: ping 1.8s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes ping {
      0%   { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); }
      70%  { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    }

    /* ── SECTION LABEL ── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 18px 0 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .section-label:first-child { margin-top: 0; }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── EVENT / ACADEMIC CARDS ── */
    .ev-title {
      font-size: 14.5px;
      font-weight: 500;
      color: var(--text-1);
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .ev-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    .ev-date { font-size: 12px; color: var(--text-3); }

    .ev-group {
      font-size: 11px;
      color: var(--text-3);
      background: var(--surface-3);
      padding: 2px 8px;
      border-radius: 20px;
    }

    .type-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-2);
      background: var(--surface-3);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* ── EMPTY STATE ── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
      text-align: center;
      gap: 10px;
    }

    .empty-icon { font-size: 52px; margin-bottom: 6px; }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--text-2); }
    .empty-sub   { font-size: 13px; color: var(--text-3); line-height: 1.6; }

    /* ── LOADING ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 64px 24px;
      color: var(--text-3);
      font-size: 14px;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="app">

  <header class="app-header">
    <div class="header-brand">
      <span class="header-logo">FamilyOS</span>
      <div class="header-dot"></div>
    </div>
    <div id="header-meta" class="header-meta">טוען...</div>
  </header>

  <div class="tab-container">
    <section id="tab-feed"      class="tab active"><div class="loading"><div class="spinner"></div>טוען...</div></section>
    <section id="tab-academics" class="tab"><div class="loading"><div class="spinner"></div></div></section>
    <section id="tab-calendar"  class="tab"><div class="loading"><div class="spinner"></div></div></section>
    <section id="tab-pinned"    class="tab"><div class="loading"><div class="spinner"></div></div></section>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="feed">
      <div class="nav-pill"></div>
      <span class="nav-emoji">💬</span>
      <span class="nav-label">פיד</span>
    </button>
    <button class="nav-item" data-tab="academics">
      <div class="nav-pill"></div>
      <span class="nav-emoji">📚</span>
      <span class="nav-label">לימודים</span>
    </button>
    <button class="nav-item" data-tab="calendar">
      <div class="nav-pill"></div>
      <span class="nav-emoji">📅</span>
      <span class="nav-label">לוח שנה</span>
    </button>
    <button class="nav-item" data-tab="pinned">
      <div class="nav-pill"></div>
      <span class="nav-emoji">📌</span>
      <span class="nav-label">נעוצים</span>
    </button>
  </nav>

</div>
<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────
const CHILDREN = {
  ran:   { name: 'רן',    color: '#6366f1' },
  itai:  { name: 'איתי', color: '#10b981' },
  noga:  { name: 'נוגה', color: '#f59e0b' },
  alon:  { name: 'אלון', color: '#f43f5e' },
  rinat: { name: 'רינת', color: '#ef4444' },
  all:   { name: 'כולם', color: '#7878a0' },
};

function child(key) {
  return CHILDREN[key] || { name: key, color: '#7878a0' };
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function rgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── TIME / DATE ────────────────────────────────────────────────────────────
function fmtTime(iso) {
  const d = new Date(iso), now = new Date();
  const diffH = (now - d) / 36e5;
  if (diffH < 24)  return d.toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' });
  if (diffH < 168) return d.toLocaleDateString('he-IL', { weekday:'short' });
  return d.toLocaleDateString('he-IL', { day:'numeric', month:'numeric' });
}

function fmtDateLabel(iso) {
  const d = new Date(iso), now = new Date();
  const today  = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const msgDay = new Date(d.getFullYear(),   d.getMonth(),   d.getDate());
  const diff   = Math.round((msgDay - today) / 864e5);
  if (diff === 0)  return 'היום';
  if (diff === 1)  return 'מחר';
  if (diff === -1) return 'אתמול';
  return d.toLocaleDateString('he-IL', { weekday:'long', day:'numeric', month:'long' });
}

function dateKey(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function groupByDate(items) {
  const map = new Map();
  for (const item of items) {
    const k = dateKey(item.date);
    if (!map.has(k)) map.set(k, { label: fmtDateLabel(item.date), items: [] });
    map.get(k).items.push(item);
  }
  return [...map.entries()].sort(([a],[b]) => a.localeCompare(b));
}

// ── MESSAGE FILTERS ────────────────────────────────────────────────────────
function isEmojiOnly(text) {
  const stripped = text
    .replace(/[\u{1F000}-\u{1FFFF}]/gu, '')
    .replace(/[\u{2600}-\u{27BF}]/gu,   '')
    .replace(/[\u{FE00}-\u{FEFF}]/gu,   '')
    .replace(/[\u{1F900}-\u{1FAFF}]/gu, '')
    .replace(/\uFE0F/g, '')
    .replace(/[!\s.,;:'"()\-_*#@\u200f\u200e]/g, '');
  return stripped.length === 0;
}

function wordCount(text) {
  return text.trim().split(/\s+/).filter(Boolean).length;
}

function shouldShow(msg) {
  if (msg.isRinat) return true;
  const t = (msg.summary || msg.text || '').trim();
  if (!t) return false;
  if (isEmojiOnly(t)) return false;
  if (wordCount(t) < 3) return false;
  return true;
}

// ── HTML BUILDERS ──────────────────────────────────────────────────────────
function sectionLabel(text) {
  return `<div class="section-label"><span>${esc(text)}</span><div class="section-line"></div></div>`;
}

function msgCard(msg) {
  const c   = child(msg.child);
  const txt = msg.summary || msg.text || '';
  const bg  = rgba(c.color, 0.14);
  const classes = ['card',
    !msg.read  ? 'unread' : '',
    msg.pinned ? 'pinned' : '',
  ].filter(Boolean).join(' ');

  return `
    <div class="${classes}" data-id="${msg.id}">
      <div class="strip" style="background:${c.color}"></div>
      <div class="card-body">
        <div class="msg-top">
          <div class="msg-chips">
            <span class="child-chip" style="background:${bg};color:${c.color}">${c.name}</span>
            ${msg.pinned  ? '<span class="pin-marker">📌 נעוץ</span>' : ''}
            ${!msg.read   ? '<span class="unread-dot"></span>' : ''}
          </div>
          <span class="card-time">${fmtTime(msg.time)}</span>
        </div>
        <div class="msg-from">${esc(msg.from || msg.group || '')}</div>
        <div class="msg-text">${esc(txt)}</div>
      </div>
    </div>`;
}

function eventCard(ev) {
  const c  = child(ev.child);
  const bg = rgba(c.color, 0.14);
  return `
    <div class="card">
      <div class="strip" style="background:${c.color}"></div>
      <div class="card-body">
        <div class="ev-title">${esc(ev.title)}</div>
        <div class="ev-meta">
          <span class="child-chip-sm" style="background:${bg};color:${c.color}">${c.name}</span>
          <span class="ev-date">${fmtDateLabel(ev.date)}</span>
          ${ev.group ? `<span class="ev-group">${esc(ev.group)}</span>` : ''}
        </div>
      </div>
    </div>`;
}

function academicCard(item) {
  const c  = child(item.child);
  const bg = rgba(c.color, 0.14);
  return `
    <div class="card">
      <div class="strip" style="background:${c.color}"></div>
      <div class="card-body">
        <div class="ev-title">${esc(item.title)}</div>
        <div class="ev-meta">
          <span class="child-chip-sm" style="background:${bg};color:${c.color}">${c.name}</span>
          ${item.type ? `<span class="type-badge">${esc(item.type)}</span>` : ''}
          <span class="ev-date">${fmtDateLabel(item.date)}</span>
        </div>
      </div>
    </div>`;
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function renderFeed(data) {
  const tab  = document.getElementById('tab-feed');
  const msgs = (data.messages || []).filter(shouldShow);
  const rinat  = msgs.filter(m => m.isRinat);
  const normal = msgs.filter(m => !m.isRinat);

  let html = '';

  if (rinat.length > 0) {
    html += `<div class="rinat-section">
      <div class="rinat-header"><div class="rinat-pulse"></div>הודעות מרינת</div>
      ${rinat.map(msgCard).join('')}
    </div>`;
  }

  if (normal.length === 0 && rinat.length === 0) {
    html += `<div class="empty">
      <div class="empty-icon">💬</div>
      <div class="empty-title">אין הודעות עדיין</div>
      <div class="empty-sub">הודעות מקבוצות ה-WhatsApp יופיעו כאן</div>
    </div>`;
  } else {
    html += normal.map(msgCard).join('');
  }

  tab.innerHTML = html;

  const unread = msgs.filter(m => !m.read).length;
  const btn = document.querySelector('[data-tab="feed"]');
  btn.querySelector('.nav-badge')?.remove();
  if (unread > 0) btn.insertAdjacentHTML('beforeend', `<span class="nav-badge">${unread}</span>`);
}

function renderAcademics(data) {
  const tab   = document.getElementById('tab-academics');
  const items = data.academics || [];

  if (items.length === 0) {
    tab.innerHTML = `<div class="empty">
      <div class="empty-icon">📚</div>
      <div class="empty-title">אין מטלות קרובות</div>
      <div class="empty-sub">מבחנים, הכתבות ושיעורי בית יופיעו כאן</div>
    </div>`;
    return;
  }

  const sorted = [...items].sort((a,b) => new Date(a.date) - new Date(b.date));
  let html = '';
  for (const [, { label, items: grp }] of groupByDate(sorted)) {
    html += sectionLabel(label) + grp.map(academicCard).join('');
  }
  tab.innerHTML = html;
}

function renderCalendar(data) {
  const tab    = document.getElementById('tab-calendar');
  const events = data.events || [];

  if (events.length === 0) {
    tab.innerHTML = `<div class="empty">
      <div class="empty-icon">📅</div>
      <div class="empty-title">אין אירועים קרובים</div>
      <div class="empty-sub">אירועי לוח השנה יופיעו כאן</div>
    </div>`;
    return;
  }

  const sorted = [...events].sort((a,b) => new Date(a.date) - new Date(b.date));
  let html = '';
  for (const [, { label, items }] of groupByDate(sorted)) {
    html += sectionLabel(label) + items.map(eventCard).join('');
  }
  tab.innerHTML = html;
}

function renderPinned(data) {
  const tab    = document.getElementById('tab-pinned');
  const pinned = (data.messages || []).filter(m => m.pinned);

  const btn = document.querySelector('[data-tab="pinned"]');
  btn.querySelector('.nav-badge')?.remove();
  if (pinned.length > 0) btn.insertAdjacentHTML('beforeend', `<span class="nav-badge">${pinned.length}</span>`);

  if (pinned.length === 0) {
    tab.innerHTML = `<div class="empty">
      <div class="empty-icon">📌</div>
      <div class="empty-title">אין הודעות נעוצות</div>
      <div class="empty-sub">הודעות חשובות שתנעץ יופיעו כאן</div>
    </div>`;
    return;
  }

  tab.innerHTML = pinned.map(msgCard).join('');
}

// ── TAB SWITCHING ──────────────────────────────────────────────────────────
let activeTab = 'feed';

function switchTab(id) {
  if (id === activeTab) return;
  document.querySelector('.tab.active')?.classList.remove('active');
  document.getElementById('tab-' + id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === id);
  });
  activeTab = id;
}

document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ── INIT ───────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res  = await fetch('./data.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    const meta = document.getElementById('header-meta');
    meta.textContent = data.updated_at ? ('עודכן ' + fmtTime(data.updated_at)) : '';

    renderFeed(data);
    renderAcademics(data);
    renderCalendar(data);
    renderPinned(data);
  } catch (err) {
    console.error(err);
    document.getElementById('tab-feed').innerHTML = `<div class="empty">
      <div class="empty-icon">⚠️</div>
      <div class="empty-title">שגיאה בטעינה</div>
      <div class="empty-sub">${esc(err.message)}</div>
    </div>`;
    document.getElementById('header-meta').textContent = 'שגיאה';
  }
}

init();
</script>
</body>
</html>
