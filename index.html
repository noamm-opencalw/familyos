<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0d0d14" />
  <title>FamilyOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #0d0d14;
      --surface: #111120;
      --surface-2: #16162a;
      --surface-3: #1c1c34;
      --border: rgba(255,255,255,0.05);
      --border-hi: rgba(255,255,255,0.10);
      --text-1: #eeeef5;
      --text-2: #8888a4;
      --text-3: #55556e;
      --accent: #818cf8;
      --accent-dim: rgba(129,140,248,0.12);
      --ran: #6366f1;
      --itai: #10b981;
      --noga: #f59e0b;
      --alon: #f43f5e;
      --rinat: #ef4444;
      --all: #7878a0;
      --nav-h: 60px;
      --header-h: 54px;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Heebo', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      direction: rtl;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 500px;
      margin: 0 auto;
      position: relative;
    }

    /* ── HEADER ──────────────────────────────────────── */
    .app-header {
      height: var(--header-h);
      padding-top: var(--safe-t);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-inline: 18px;
      flex-shrink: 0;
      background: rgba(13,13,20,0.88);
      backdrop-filter: blur(30px) saturate(1.4);
      -webkit-backdrop-filter: blur(30px) saturate(1.4);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 20;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #818cf8 0%, #a78bfa 50%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-pulse {
      width: 6px;
      height: 6px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(16,185,129,0.5);
      animation: pulse-glow 3s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px rgba(16,185,129,0.5); }
      50% { opacity: 0.4; box-shadow: 0 0 3px rgba(16,185,129,0.2); }
    }

    .header-meta {
      font-size: 11px;
      color: var(--text-3);
      font-weight: 400;
    }

    /* ── CHILD FILTER CHIPS ──────────────────────────── */
    .filter-bar {
      display: none;
      flex-shrink: 0;
      padding: 8px 14px;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-bar.visible { display: flex; }

    .filter-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-2);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .filter-chip .chip-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .filter-chip.active {
      border-color: var(--chip-color, var(--accent));
      background: var(--chip-bg, var(--accent-dim));
      color: var(--text-1);
    }

    /* ── TAB PANELS ──────────────────────────────────── */
    .tab-area {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .tab-panel {
      display: none;
      height: 100%;
      overflow-y: auto;
      padding: 10px 12px calc(10px + var(--safe-b));
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      scrollbar-width: none;
    }
    .tab-panel::-webkit-scrollbar { display: none; }

    .tab-panel.active {
      display: block;
      animation: panelIn 0.2s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    @keyframes panelIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── BOTTOM NAV ──────────────────────────────────── */
    .bottom-nav {
      flex-shrink: 0;
      height: calc(var(--nav-h) + var(--safe-b));
      padding-bottom: var(--safe-b);
      background: rgba(13,13,20,0.94);
      backdrop-filter: blur(30px) saturate(1.4);
      -webkit-backdrop-filter: blur(30px) saturate(1.4);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }

    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-3);
      padding: 0;
      position: relative;
      transition: color 0.2s ease;
      -webkit-user-select: none;
      user-select: none;
      min-height: 44px;
      min-width: 44px;
    }

    .nav-btn.active { color: var(--accent); }

    .nav-pip {
      position: absolute;
      top: 0;
      left: 50%;
      width: 22px;
      height: 2.5px;
      background: var(--accent);
      border-radius: 0 0 3px 3px;
      transform: translateX(-50%) scaleX(0);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    .nav-btn.active .nav-pip { transform: translateX(-50%) scaleX(1); }

    .nav-icon {
      width: 20px;
      height: 20px;
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }

    .nav-btn.active .nav-icon { transform: scale(1.08) translateY(-1px); }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .nav-badge {
      position: absolute;
      top: 4px;
      left: calc(50% + 6px);
      background: var(--rinat);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      border: 2px solid var(--bg);
      line-height: 1;
      pointer-events: none;
    }

    /* ── CARDS ────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: 14px;
      border: 1px solid var(--border);
      margin-bottom: 6px;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      transition: transform 0.12s ease;
      cursor: pointer;
    }

    .card:active { transform: scale(0.985); }

    .card.is-unread {
      background: var(--surface-2);
      border-color: var(--border-hi);
    }

    .card-strip {
      width: 4px;
      flex-shrink: 0;
      border-radius: 0 4px 4px 0;
    }

    .card-body {
      flex: 1;
      padding: 11px 13px;
      min-width: 0;
    }

    /* ── MESSAGE CARD ────────────────────────────────── */
    .msg-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }

    .msg-pills {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
      flex-wrap: wrap;
    }

    .child-pill {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .pin-tag {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 600;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .dot-unread {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .msg-time {
      font-size: 10.5px;
      color: var(--text-3);
      flex-shrink: 0;
      font-weight: 400;
      font-variant-numeric: tabular-nums;
    }

    .msg-source {
      font-size: 10px;
      color: var(--text-3);
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .msg-source-icon {
      width: 11px;
      height: 11px;
      opacity: 0.5;
    }

    .msg-from {
      font-size: 12px;
      color: var(--text-2);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .msg-text {
      font-size: 14px;
      color: var(--text-1);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card.is-unread .msg-text {
      font-weight: 500;
      color: #f5f5ff;
    }

    /* ── RINAT ZONE ──────────────────────────────────── */
    .rinat-zone {
      background: linear-gradient(135deg, rgba(239,68,68,0.07) 0%, rgba(239,68,68,0.02) 100%);
      border: 1px solid rgba(239,68,68,0.18);
      border-radius: 16px;
      padding: 10px;
      margin-bottom: 10px;
      position: sticky;
      top: 0;
      z-index: 5;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 30px rgba(239,68,68,0.04),
        0 0 0 1px rgba(239,68,68,0.05),
        inset 0 1px 0 rgba(239,68,68,0.05);
    }

    .rinat-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 700;
      color: #f87171;
    }

    .rinat-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ef4444;
      box-shadow: 0 0 0 0 rgba(239,68,68,0.5);
      animation: rinat-pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes rinat-pulse {
      0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
      70% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
      100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    }

    .rinat-zone .card {
      margin-bottom: 5px;
      background: rgba(239,68,68,0.05);
      border-color: rgba(239,68,68,0.10);
    }
    .rinat-zone .card:last-child { margin-bottom: 0; }

    /* ── SECTION DIVIDER ─────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 16px 0 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      letter-spacing: 0.05em;
    }

    .divider:first-child { margin-top: 2px; }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── EVENT / ACADEMIC CARDS ──────────────────────── */
    .item-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-1);
      margin-bottom: 6px;
      line-height: 1.45;
    }

    .item-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    .child-pill-sm {
      font-size: 10.5px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .meta-date {
      font-size: 11.5px;
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .meta-date svg { width: 12px; height: 12px; opacity: 0.5; }

    .meta-group {
      font-size: 10.5px;
      color: var(--text-3);
      background: var(--surface-3);
      padding: 2px 8px;
      border-radius: 20px;
    }

    .type-badge {
      font-size: 10.5px;
      font-weight: 600;
      color: var(--text-2);
      background: var(--surface-3);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* ── EMPTY STATE ──────────────────────────────────── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 28px;
      text-align: center;
      gap: 6px;
    }

    .empty-icon {
      width: 48px;
      height: 48px;
      color: var(--text-3);
      margin-bottom: 8px;
      opacity: 0.3;
    }

    .empty-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-2);
    }

    .empty-sub {
      font-size: 13px;
      color: var(--text-3);
      line-height: 1.6;
    }

    /* ── LOADING ──────────────────────────────────────── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 80px 24px;
      color: var(--text-3);
      font-size: 13px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOCUS/A11Y ───────────────────────────────────── */
    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ── CARD EXPAND ──────────────────────────────────── */
    .msg-text.expanded {
      -webkit-line-clamp: unset;
      display: block;
    }
  </style>
</head>
<body>
<div id="app">

  <header class="app-header">
    <div class="header-brand">
      <span class="header-logo">FamilyOS</span>

    <button class="nav-btn" data-tab="calendar" role="tab" aria-selected="false" aria-label="\u05DC\u05D5\u05D7 \u05E9\u05E0\u05D4">
      <div class="nav-pip"></div>
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>

      <div class="nav-pip"></div>

      <span class="nav-label">\u05E0\u05E2\u05D5\u05E6\u05D9\u05DD</span>
    </button>
  </nav>

</div>

  itai:  { name: '\u05D0\u05D9\u05EA\u05D9', color: '#10b981' },
  noga:  { name: '\u05E0\u05D5\u05D2\u05D4', color: '#f59e0b' },
  alon:  { name: '\u05D0\u05DC\u05D5\u05DF', color: '#f43f5e' },
  rinat: { name: '\u05E8\u05D9\u05E0\u05EA', color: '#ef4444' },
  all:   { name: '\u05DB\u05D5\u05DC\u05DD', color: '#7878a0' },
};

function kid(key) { return KIDS[key] || { name: key, color: '#7878a0' }; }

// ── UTILS ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function rgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── TIME ────────────────────────────────────────────────────────────────────
function fmtTime(iso) {
  const d = new Date(iso), now = new Date();
  const h = (now - d) / 36e5;
  if (h < 24) return d.toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' });
  if (h < 168) return d.toLocaleDateString('he-IL', { weekday:'short' });
  return d.toLocaleDateString('he-IL', { day:'numeric', month:'numeric' });
}

function fmtDateLabel(iso) {
  const d = new Date(iso), now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const msgDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff = Math.round((msgDay - today) / 864e5);
  if (diff === 0) return '\u05D4\u05D9\u05D5\u05DD';
  if (diff === 1) return '\u05DE\u05D7\u05E8';
  if (diff === -1) return '\u05D0\u05EA\u05DE\u05D5\u05DC';
  return d.toLocaleDateString('he-IL', { weekday:'long', day:'numeric', month:'long' });
}

function dateKey(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function groupByDate(items) {
  const m = new Map();
  for (const it of items) {
    const k = dateKey(it.date);
    if (!m.has(k)) m.set(k, { label: fmtDateLabel(it.date), items: [] });
    m.get(k).items.push(it);
  }
  return [...m.entries()].sort(([a],[b]) => a.localeCompare(b));
}

// ── FILTERS ─────────────────────────────────────────────────────────────────
function isEmojiOnly(t) {
  const s = t
    .replace(/[\u{1F000}-\u{1FFFF}]/gu, '')
    .replace(/[\u{2600}-\u{27BF}]/gu, '')
    .replace(/[\u{FE00}-\u{FEFF}]/gu, '')
    .replace(/[\u{1F900}-\u{1FAFF}]/gu, '')
    .replace(/\uFE0F/g, '')
    .replace(/[!\s.,;:'"()\-_*#@\u200f\u200e]/g, '');
  return s.length === 0;
}

function shouldShow(msg) {
  if (msg.isRinat) return true;
  const t = (msg.summary || msg.text || '').trim();
  if (!t || isEmojiOnly(t)) return false;
  return t.split(/\s+/).filter(Boolean).length >= 3;
}

// ── CHILD FILTER ────────────────────────────────────────────────────────────
let activeFilter = 'all';
let cachedData = null;

function buildFilterBar(data) {
  const bar = document.getElementById('filter-bar');
  const childKeys = ['all', 'ran', 'itai', 'noga', 'alon'];
  bar.innerHTML = childKeys.map(key => {
    const k = kid(key);
    return `<button class="filter-chip${key === 'all' ? ' active' : ''}" data-child="${key}"
      style="--chip-color:${k.color};--chip-bg:${rgba(k.color,0.13)}">
      <span class="chip-dot" style="background:${k.color}"></span>${k.name}
    </button>`;
  }).join('');

  bar.querySelectorAll('.filter-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.child;
      bar.querySelectorAll('.filter-chip').forEach(b => b.classList.toggle('active', b.dataset.child === activeFilter));
      renderFeed(cachedData);
    });
  });
}

// ── HTML BUILDERS ───────────────────────────────────────────────────────────
function divider(text) {
  return `<div class="divider"><span>${esc(text)}</span><div class="divider-line"></div></div>`;
}

function sourceLabel(msg) {
  if (msg.source === 'email') return '\u05DE\u05D9\u05D9\u05DC';
  if (msg.source === 'whatsapp') return 'WhatsApp';
  return '';
}

function msgCard(msg) {
  const c = kid(msg.child);
  const txt = msg.summary || msg.text || '';
  const bg = rgba(c.color, 0.13);
  const cls = ['card', !msg.read ? 'is-unread' : ''].filter(Boolean).join(' ');
  const src = sourceLabel(msg);

  return `<div class="${cls}" data-id="${msg.id}">
    <div class="card-strip" style="background:${c.color}"></div>
    <div class="card-body">
      <div class="msg-top">
        <div class="msg-pills">
          <span class="child-pill" style="background:${bg};color:${c.color}">${c.name}</span>
          ${msg.pinned ? `<span class="pin-tag" style="color:${c.color}">${IC.pin} \u05E0\u05E2\u05D5\u05E5</span>` : ''}
          ${!msg.read ? `<span class="dot-unread" style="background:${c.color}"></span>` : ''}
        </div>
        <span class="msg-time">${fmtTime(msg.time)}</span>
      </div>
      <div class="msg-from">${esc(msg.from || msg.group || '')}${src ? ` \u00B7 ${src}` : ''}</div>
      <div class="msg-text" onclick="this.classList.toggle('expanded')">${esc(txt)}</div>
    </div>
  </div>`;
}

function eventCard(ev) {
  const c = kid(ev.child);
  const bg = rgba(c.color, 0.13);
  return `<div class="card">
    <div class="card-strip" style="background:${c.color}"></div>
    <div class="card-body">
      <div class="item-title">${esc(ev.title)}</div>
      <div class="item-meta">
        <span class="child-pill-sm" style="background:${bg};color:${c.color}">${c.name}</span>
        <span class="meta-date">${IC.cal} ${fmtDateLabel(ev.date)}</span>
        ${ev.group ? `<span class="meta-group">${esc(ev.group)}</span>` : ''}
      </div>
    </div>
  </div>`;
}

function academicCard(it) {
  const c = kid(it.child);
  const bg = rgba(c.color, 0.13);
  return `<div class="card">
    <div class="card-strip" style="background:${c.color}"></div>
    <div class="card-body">
      <div class="item-title">${esc(it.title)}</div>
      <div class="item-meta">
        <span class="child-pill-sm" style="background:${bg};color:${c.color}">${c.name}</span>
        ${it.type ? `<span class="type-badge">${esc(it.type)}</span>` : ''}
        <span class="meta-date">${IC.cal} ${fmtDateLabel(it.date)}</span>
      </div>
    </div>
  </div>`;
}

function emptyState(icon, title, sub) {
  return `<div class="empty">
    <div class="empty-icon">${icon}</div>
    <div class="empty-title">${esc(title)}</div>
    <div class="empty-sub">${esc(sub)}</div>
  </div>`;
}

// ── RENDER ──────────────────────────────────────────────────────────────────
function renderFeed(data) {
  const el = document.getElementById('tab-feed');
  let msgs = (data.messages || []).filter(shouldShow);

  if (activeFilter !== 'all') {
    msgs = msgs.filter(m => m.child === activeFilter);
  }

  const rinat = msgs.filter(m => m.isRinat);
  const normal = msgs.filter(m => !m.isRinat);
  let html = '';

  if (rinat.length > 0) {
    html += `<div class="rinat-zone">
      <div class="rinat-header"><div class="rinat-dot"></div>\u05D4\u05D5\u05D3\u05E2\u05D5\u05EA \u05DE\u05E8\u05D9\u05E0\u05EA</div>
      ${rinat.map(msgCard).join('')}
    </div>`;
  }

  if (normal.length === 0 && rinat.length === 0) {
    html += emptyState(IC.chat48, '\u05D0\u05D9\u05DF \u05D4\u05D5\u05D3\u05E2\u05D5\u05EA \u05E2\u05D3\u05D9\u05D9\u05DF', '\u05D4\u05D5\u05D3\u05E2\u05D5\u05EA \u05DE\u05E7\u05D1\u05D5\u05E6\u05D5\u05EA \u05D4-WhatsApp \u05D9\u05D5\u05E4\u05D9\u05E2\u05D5 \u05DB\u05D0\u05DF');
  } else {
    html += normal.map(msgCard).join('');
  }

  el.innerHTML = html;

  const allMsgs = (data.messages || []).filter(shouldShow);
  const unread = allMsgs.filter(m => !m.read).length;
  const btn = document.querySelector('[data-tab="feed"]');
  btn.querySelector('.nav-badge')?.remove();
  if (unread > 0) btn.insertAdjacentHTML('beforeend', `<span class="nav-badge">${unread}</span>`);
}

function renderAcademics(data) {
  const el = document.getElementById('tab-academics');
  const items = data.academics || [];

  if (items.length === 0) {
    el.innerHTML = emptyState(IC.book48, '\u05D0\u05D9\u05DF \u05DE\u05D8\u05DC\u05D5\u05EA \u05E7\u05E8\u05D5\u05D1\u05D5\u05EA', '\u05DE\u05D1\u05D7\u05E0\u05D9\u05DD, \u05D4\u05DB\u05EA\u05D1\u05D5\u05EA \u05D5\u05E9\u05D9\u05E2\u05D5\u05E8\u05D9 \u05D1\u05D9\u05EA \u05D9\u05D5\u05E4\u05D9\u05E2\u05D5 \u05DB\u05D0\u05DF');
    return;
  }

  const sorted = [...items].sort((a,b) => new Date(a.date) - new Date(b.date));
  let html = '';
  for (const [, { label, items: g }] of groupByDate(sorted)) {
    html += divider(label) + g.map(academicCard).join('');
  }
  el.innerHTML = html;
}

function renderCalendar(data) {
  const el = document.getElementById('tab-calendar');
  const events = data.events || [];

  if (events.length === 0) {
    el.innerHTML = emptyState(IC.cal48, '\u05D0\u05D9\u05DF \u05D0\u05D9\u05E8\u05D5\u05E2\u05D9\u05DD \u05E7\u05E8\u05D5\u05D1\u05D9\u05DD', '\u05D0\u05D9\u05E8\u05D5\u05E2\u05D9 \u05DC\u05D5\u05D7 \u05D4\u05E9\u05E0\u05D4 \u05D9\u05D5\u05E4\u05D9\u05E2\u05D5 \u05DB\u05D0\u05DF');
    return;
  }

  const sorted = [...events].sort((a,b) => new Date(a.date) - new Date(b.date));
  let html = '';
  for (const [, { label, items }] of groupByDate(sorted)) {
    html += divider(label) + items.map(eventCard).join('');
  }
  el.innerHTML = html;
}

function renderPinned(data) {
  const el = document.getElementById('tab-pinned');
  const pinned = (data.messages || []).filter(m => m.pinned);

  const btn = document.querySelector('[data-tab="pinned"]');
  btn.querySelector('.nav-badge')?.remove();
  if (pinned.length > 0) btn.insertAdjacentHTML('beforeend', `<span class="nav-badge">${pinned.length}</span>`);

  if (pinned.length === 0) {
    el.innerHTML = emptyState(IC.pin48, '\u05D0\u05D9\u05DF \u05D4\u05D5\u05D3\u05E2\u05D5\u05EA \u05E0\u05E2\u05D5\u05E6\u05D5\u05EA', '\u05D4\u05D5\u05D3\u05E2\u05D5\u05EA \u05D7\u05E9\u05D5\u05D1\u05D5\u05EA \u05E9\u05EA\u05E0\u05E2\u05E5 \u05D9\u05D5\u05E4\u05D9\u05E2\u05D5 \u05DB\u05D0\u05DF');
    return;
  }

  el.innerHTML = pinned.map(msgCard).join('');
}

// ── TAB SWITCHING ───────────────────────────────────────────────────────────
let activeTab = 'feed';

function switchTab(id) {
  if (id === activeTab) return;
  document.querySelector('.tab-panel.active')?.classList.remove('active');
  document.getElementById('tab-' + id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => {
    const on = b.dataset.tab === id;
    b.classList.toggle('active', on);
    b.setAttribute('aria-selected', on);
  });
  activeTab = id;

  const bar = document.getElementById('filter-bar');
  bar.classList.toggle('visible', id === 'feed');
}

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ── INIT ────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('./data.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    cachedData = data;

    document.getElementById('header-meta').textContent =
      data.updated_at ? ('\u05E2\u05D5\u05D3\u05DB\u05DF ' + fmtTime(data.updated_at)) : '';

    buildFilterBar(data);
    document.getElementById('filter-bar').classList.add('visible');

    renderFeed(data);
    renderAcademics(data);
    renderCalendar(data);
    renderPinned(data);
  } catch (err) {
    console.error(err);
    document.getElementById('tab-feed').innerHTML = emptyState(IC.warn48, '\u05E9\u05D2\u05D9\u05D0\u05D4 \u05D1\u05D8\u05E2\u05D9\u05E0\u05D4', err.message);
    document.getElementById('header-meta').textContent = '\u05E9\u05D2\u05D9\u05D0\u05D4';
  }
}

init();
</script>
